# --8<-- [start:full_file]
# MCP Mesh Development Docker Compose
# Generated by: meshctl scaffold --compose --observability
# Then manually extended with: gateway (FastAPI), mesh-ui, API key env vars
#
# Usage:
#   docker compose up -d
#
# Services:
#   - postgres: PostgreSQL database for registry
#   - registry: MCP Mesh registry service
#   - mesh-ui: Mesh Dashboard UI on port 3080
#   - redis: Redis for state/tracing
#   - tempo: Distributed tracing backend
#   - grafana: Observability dashboard
#   - gateway: FastAPI gateway on port 8080
#   - adventure-advisor: Agent on port 9111
#   - budget-analyst: Agent on port 9110
#   - chat-history-agent: Agent on port 9109
#   - claude-provider: Agent on port 9106
#   - flight-agent: Agent on port 9101
#   - hotel-agent: Agent on port 9102
#   - logistics-planner: Agent on port 9112
#   - openai-provider: Agent on port 9108
#   - planner-agent: Agent on port 9107
#   - poi-agent: Agent on port 9104
#   - user-prefs-agent: Agent on port 9105
#   - weather-agent: Agent on port 9103

services:
  # ===== INFRASTRUCTURE =====

  postgres:
    image: postgres:15-alpine
    container_name: trip-planner-postgres
    hostname: postgres
    environment:
      POSTGRES_USER: mcpmesh
      POSTGRES_PASSWORD: mcpmesh
      POSTGRES_DB: mcpmesh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcpmesh"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trip-planner-network

  registry:
    image: mcpmesh/registry:1.3.0
    container_name: trip-planner-registry
    hostname: registry
    ports:
      - "8000:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      DATABASE_URL: postgresql://mcpmesh:mcpmesh@postgres:5432/mcpmesh?sslmode=disable
      REDIS_URL: redis://redis:6379
      MCP_MESH_DISTRIBUTED_TRACING_ENABLED: "true"
      TRACE_EXPORTER_TYPE: otlp
      TELEMETRY_ENDPOINT: tempo:4317
      TELEMETRY_PROTOCOL: grpc
      TEMPO_URL: http://tempo:3200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - trip-planner-network

  # --8<-- [start:mesh_ui]
  mesh-ui:
    image: mcpmesh/ui:1.3.0
    container_name: trip-planner-mesh-ui
    hostname: mesh-ui
    ports:
      - "3080:3080"
    environment:
      MCP_MESH_REGISTRY_URL: http://registry:8000
      DATABASE_URL: postgresql://mcpmesh:mcpmesh@postgres:5432/mcpmesh?sslmode=disable
      REDIS_URL: redis://redis:6379
      TEMPO_URL: http://tempo:3200
    depends_on:
      registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - trip-planner-network
  # --8<-- [end:mesh_ui]

  # ===== OBSERVABILITY =====

  redis:
    image: redis:7-alpine
    container_name: trip-planner-redis
    hostname: redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trip-planner-network

  tempo:
    image: grafana/tempo:2.9.0
    container_name: trip-planner-tempo
    hostname: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - trip-planner-network

  grafana:
    image: grafana/grafana:12.3.1
    container_name: trip-planner-grafana
    hostname: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - trip-planner-network

  # ===== AGENTS =====

  # --8<-- [start:gateway]
  # FastAPI Gateway: manually added (scaffold detects @mesh.agent, not @mesh.route)
  gateway:
    image: mcpmesh/python-runtime:1.3.0
    container_name: trip-planner-gateway
    hostname: gateway
    user: root
    ports:
      - "8080:8080"
    volumes:
      - ./gateway:/app:ro
      - gateway-packages:/packages
    working_dir: /app
    entrypoint: ["sh", "-c"]
    command: ["chown -R mcp-mesh:mcp-mesh /packages && su mcp-mesh -c 'if [ -f /app/requirements.txt ]; then pip install --target /packages -q -r /app/requirements.txt 2>/dev/null; fi && python main.py'"]
    environment:
      PYTHONPATH: /packages
      MCP_MESH_REGISTRY_URL: http://registry:8000
      HOST: "0.0.0.0"
      MCP_MESH_HTTP_HOST: gateway
      MCP_MESH_HTTP_PORT: "8080"
      POD_IP: gateway
      MCP_MESH_HTTP_ENABLED: "true"
      MCP_MESH_AGENT_NAME: gateway
      MCP_MESH_ENABLED: "true"
      MCP_MESH_LOG_LEVEL: DEBUG
      MCP_MESH_DEBUG_MODE: "true"
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379
      MCP_MESH_DISTRIBUTED_TRACING_ENABLED: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
