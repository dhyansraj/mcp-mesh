  #       In production (Dockerfile), base image ENTRYPOINT ["python"] is used with CMD ["main.py"]
  poi-agent:
    image: mcpmesh/python-runtime:1.3.0
    container_name: trip-planner-poi-agent
    hostname: poi-agent
    user: root
    ports:
      - "9104:9104"
    volumes:
      - ./poi-agent:/app:ro
      - poi-agent-packages:/packages
    working_dir: /app
    entrypoint: ["sh", "-c"]
    command: ["chown -R mcp-mesh:mcp-mesh /packages && su mcp-mesh -c 'if [ -f /app/requirements.txt ]; then pip install --target /packages -q -r /app/requirements.txt 2>/dev/null; fi && python main.py'"]
    environment:
      PYTHONPATH: /packages
      MCP_MESH_REGISTRY_URL: http://registry:8000
      AGENT_NAME: poi-agent
      AGENT_PORT: "9104"
      HOST: "0.0.0.0"
      MCP_MESH_HTTP_HOST: poi-agent
      MCP_MESH_HTTP_PORT: "9104"
      POD_IP: poi-agent
      MCP_MESH_HTTP_ENABLED: "true"
      MCP_MESH_AGENT_NAME: poi-agent
      MCP_MESH_ENABLED: "true"
      MCP_MESH_AUTO_RUN: "true"
      MCP_MESH_LOG_LEVEL: DEBUG
      MCP_MESH_DEBUG_MODE: "true"
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379
      MCP_MESH_DISTRIBUTED_TRACING_ENABLED: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9104/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - trip-planner-network

