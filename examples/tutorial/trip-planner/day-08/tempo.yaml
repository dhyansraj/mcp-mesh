# Tempo configuration for MCP Mesh distributed tracing
# Generated by: meshctl scaffold --compose --observability

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

memberlist:
  abort_if_cluster_join_fails: false
  bind_addr:
    - '0.0.0.0'
  bind_port: 7946

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s
