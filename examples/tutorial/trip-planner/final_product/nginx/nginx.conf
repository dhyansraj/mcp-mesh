worker_processes auto;

env GOOGLE_CLIENT_ID;
env GOOGLE_CLIENT_SECRET;
env REDIS_HOST;
env REDIS_PORT;
env REDIS_PASSWORD;
env DEV_MODE;
env API_BACKEND;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    lua_package_path '/etc/nginx/lua/?.lua;;';
    lua_shared_dict oauth_states 1m;

    init_by_lua_block {
        _G.GOOGLE_CLIENT_ID = os.getenv("GOOGLE_CLIENT_ID") or ""
        _G.GOOGLE_CLIENT_SECRET = os.getenv("GOOGLE_CLIENT_SECRET") or ""
        _G.DEV_MODE = os.getenv("DEV_MODE") == "true"

        _G.REDIS_CONFIG = {
            host = os.getenv("REDIS_HOST") or "redis",
            port = tonumber(os.getenv("REDIS_PORT")) or 6379,
            password = os.getenv("REDIS_PASSWORD")
        }

        _G.API_BACKEND = os.getenv("API_BACKEND") or "http://host.docker.internal:8080"

        -- Resolve host.docker.internal from /etc/hosts since nginx resolver bypasses it
        if _G.API_BACKEND:find("host.docker.internal") then
            local f = io.open("/etc/hosts", "r")
            if f then
                for line in f:lines() do
                    local ip = line:match("^(%S+)%s+.*host%.docker%.internal")
                    if ip and ip ~= "#" then
                        _G.API_BACKEND = _G.API_BACKEND:gsub("host%.docker%.internal", ip)
                        ngx.log(ngx.NOTICE, "Resolved host.docker.internal to " .. ip .. ", API_BACKEND=" .. _G.API_BACKEND)
                        break
                    end
                end
                f:close()
            end
        end
    }

    # External DNS for Google OAuth
    resolver 8.8.8.8 8.8.4.4 ipv6=off;

    server {
        listen 80;
        server_name localhost;

        # Static frontend (built UI mounted here)
        root /usr/share/nginx/html;
        index index.html;

        # Auth endpoints
        location = /auth/google {
            content_by_lua_file /etc/nginx/lua/oauth_initiate.lua;
        }

        location = /auth/callback {
            resolver 127.0.0.11 valid=30s ipv6=off;
            content_by_lua_file /etc/nginx/lua/oauth_callback.lua;
        }

        location = /auth/logout {
            resolver 127.0.0.11 valid=30s ipv6=off;
            content_by_lua_file /etc/nginx/lua/logout.lua;
        }

        location = /auth/me {
            resolver 127.0.0.11 valid=30s ipv6=off;
            content_by_lua_file /etc/nginx/lua/auth_me.lua;
        }

        # API: trip planning endpoint (protected)
        location = /api/plan {
            resolver 127.0.0.11 valid=30s ipv6=off;
            resolver_timeout 5s;
            access_by_lua_file /etc/nginx/lua/auth_check.lua;

            set_by_lua_block $api_backend {
                return _G.API_BACKEND or "http://host.docker.internal:8080"
            }

            proxy_pass $api_backend/plan;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # API: user profile endpoints (protected)
        location /api/user/ {
            resolver 127.0.0.11 valid=30s ipv6=off;
            resolver_timeout 5s;
            access_by_lua_file /etc/nginx/lua/auth_check.lua;

            set_by_lua_block $api_backend {
                return _G.API_BACKEND or "http://host.docker.internal:8080"
            }

            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # API: catch-all for other API routes (protected)
        location /api/ {
            resolver 127.0.0.11 valid=30s ipv6=off;
            resolver_timeout 5s;
            access_by_lua_file /etc/nginx/lua/auth_check.lua;

            set_by_lua_block $api_backend {
                return _G.API_BACKEND or "http://host.docker.internal:8080"
            }

            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Health check (unprotected)
        location = /health {
            resolver 127.0.0.11 valid=30s ipv6=off;
            set_by_lua_block $api_backend {
                return _G.API_BACKEND or "http://host.docker.internal:8080"
            }
            proxy_pass $api_backend/health;
        }

        # SPA catch-all
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
