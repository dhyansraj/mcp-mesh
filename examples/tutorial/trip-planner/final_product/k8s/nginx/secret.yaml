# Nginx OAuth Secret — TEMPLATE
# Fill in your own credentials before applying.
#
# Alternatively, create the secret imperatively:
#   kubectl -n trip-planner create secret generic nginx-oauth \
#     --from-literal=GOOGLE_CLIENT_ID=your-id.apps.googleusercontent.com \
#     --from-literal=GOOGLE_CLIENT_SECRET=your-secret \
#     --from-literal=DEV_MODE=false
---
apiVersion: v1
kind: Secret
metadata:
  name: nginx-oauth
  labels:
    app: nginx
type: Opaque
stringData:
  # Replace with your Google OAuth credentials
  GOOGLE_CLIENT_ID: "REPLACE_WITH_YOUR_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "REPLACE_WITH_YOUR_GOOGLE_CLIENT_SECRET"
  # Set to "true" to bypass Google OAuth (uses demo@tripplanner.dev)
  DEV_MODE: "false"
