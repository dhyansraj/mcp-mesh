# Ingress for TripPlanner nginx frontend
# Uncomment and configure for your cluster's ingress controller
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx
  labels:
    app: nginx
  annotations:
    # nginx ingress controller
    # kubernetes.io/ingress.class: nginx
    # cert-manager TLS
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  # ingressClassName: nginx
  rules:
    - host: tripplanner.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
  # TLS termination (uncomment and configure)
  # tls:
  #   - secretName: tripplanner-tls
  #     hosts:
  #       - tripplanner.example.com
