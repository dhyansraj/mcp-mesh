# Helm values for logistics-planner — TripPlanner Final Product (with SPIRE mTLS)

image:
  repository: trip-planner/logistics-planner
  tag: "latest"
  pullPolicy: IfNotPresent

agent:
  name: logistics-planner
  runtime: python

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

mesh:
  enabled: true
  tls:
    mode: "auto"
    provider: "spire"
    spire:
      enabled: true
      socketPath: "/run/spire/agent/sockets/agent.sock"

registry:
  host: "mcp-core-mcp-mesh-registry"
  port: "8000"

env:
  - name: ANTHROPIC_API_KEY
    valueFrom:
      secretKeyRef:
        name: llm-keys
        key: ANTHROPIC_API_KEY
        optional: true
  - name: OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: llm-keys
        key: OPENAI_API_KEY
        optional: true
