# Helm values for chat-history-agent — TripPlanner Final Product (with SPIRE mTLS)

image:
  repository: trip-planner/chat-history-agent
  tag: "latest"
  pullPolicy: IfNotPresent

agent:
  name: chat-history-agent
  runtime: python

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

mesh:
  enabled: true
  tls:
    mode: "auto"
    provider: "spire"
    spire:
      enabled: true
      socketPath: "/run/spire/agent/sockets/agent.sock"

registry:
  host: "mcp-core-mcp-mesh-registry"
  port: "8000"

# chat-history-agent reads REDIS_HOST to connect to Redis
env:
  - name: REDIS_HOST
    value: "mcp-core-mcp-mesh-redis"
  - name: REDIS_PORT
    value: "6379"
