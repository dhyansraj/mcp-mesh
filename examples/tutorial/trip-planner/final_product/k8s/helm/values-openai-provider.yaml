# Helm values for openai-provider — TripPlanner Final Product (with SPIRE mTLS)

image:
  repository: trip-planner/openai-provider
  tag: "latest"
  pullPolicy: IfNotPresent

agent:
  name: openai-provider
  runtime: python

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

mesh:
  enabled: true
  tls:
    mode: "auto"
    provider: "spire"
    spire:
      enabled: true
      socketPath: "/run/spire/agent/sockets/agent.sock"

registry:
  host: "mcp-core-mcp-mesh-registry"
  port: "8000"

# API key injected from the llm-keys Secret
env:
  - name: OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: llm-keys
        key: OPENAI_API_KEY
        optional: true
