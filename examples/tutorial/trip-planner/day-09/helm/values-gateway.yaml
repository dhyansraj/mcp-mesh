# --8<-- [start:full_file]
# Helm values for gateway — scaffolded by meshctl, adapted for k8s
# The gateway is a FastAPI app using @mesh.route, not a @mesh.agent.
# It still deploys with the mcp-mesh-agent chart.

image:
  repository: trip-planner/gateway
  tag: "latest"
  pullPolicy: IfNotPresent  # Use Never for minikube local builds

agent:
  name: gateway
  runtime: python

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

mesh:
  enabled: true

registry:
  host: "mcp-core-mcp-mesh-registry"
  port: "8000"

# Expose the gateway via a LoadBalancer (or NodePort on minikube)
service:
  type: NodePort
  port: 8080
  targetPort: 8080
# --8<-- [end:full_file]
