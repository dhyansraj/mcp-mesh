# --8<-- [start:full_file]
# Helm values for mcp-mesh-core in the trip-planner namespace
# Deploys: registry, PostgreSQL, Redis, Tempo, Grafana
#
# Usage:
#   helm install mcp-core oci://ghcr.io/dhyansraj/mcp-mesh/mcp-mesh-core \
#     --version 1.2.0 -n trip-planner -f values-core.yaml

global:
  namespace: trip-planner
  coreReleaseName: "mcp-core"

# All components enabled
postgres:
  enabled: true

redis:
  enabled: true

registry:
  enabled: true

grafana:
  enabled: true

tempo:
  enabled: true

ui:
  enabled: true

# Lighter resource limits for minikube
mcp-mesh-postgres:
  persistence:
    enabled: true
    size: 2Gi

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

mcp-mesh-redis:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

mcp-mesh-registry:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

mcp-mesh-grafana:
  grafana:
    persistence:
      enabled: false

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

mcp-mesh-tempo:
  tempo:
    persistence:
      enabled: false

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

mcp-mesh-ui:
  ui:
    registryURL: "http://mcp-core-mcp-mesh-registry:8000"
# --8<-- [end:full_file]
