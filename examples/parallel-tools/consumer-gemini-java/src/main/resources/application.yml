spring:
  application:
    name: consumer-gemini-java
  freemarker:
    template-loader-path: classpath:/prompts/
    suffix: .ftl

server:
  port: ${MCP_MESH_HTTP_PORT:9002}

mesh:
  registry:
    url: ${MCP_MESH_REGISTRY_URL:http://localhost:8000}
  agent:
    name: ${MCP_MESH_AGENT_NAME:consumer-gemini-java}
    namespace: ${MCP_MESH_NAMESPACE:default}

logging:
  level:
    io.mcpmesh: DEBUG
    com.example: DEBUG
