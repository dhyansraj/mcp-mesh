spring:
  application:
    name: direct-consumer-claude-java
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-5
          max-tokens: 4096
          temperature: 0.7

server:
  port: ${MCP_MESH_HTTP_PORT:9002}

mesh:
  registry:
    url: ${MCP_MESH_REGISTRY_URL:http://localhost:8000}
  agent:
    name: ${MCP_MESH_AGENT_NAME:direct-consumer-claude-java}
    namespace: ${MCP_MESH_NAMESPACE:default}

logging:
  level:
    io.mcpmesh: DEBUG
    com.example: DEBUG
