# Agent certificate issued by Vault.
# Duplicate and customize per agent deployment (adjust dnsNames and secretName).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mcp-mesh-agent-cert
  namespace: mcp-mesh
spec:
  secretName: mcp-mesh-agent-tls
  duration: 8760h
  renewBefore: 720h
  commonName: mcp-mesh-agent
  dnsNames:
    - mcp-mesh-agent
    - mcp-mesh-agent.mcp-mesh
    - mcp-mesh-agent.mcp-mesh.svc
    - mcp-mesh-agent.mcp-mesh.svc.cluster.local
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - server auth
    - client auth
  issuerRef:
    name: mcp-mesh-vault-issuer
    kind: Issuer
    group: cert-manager.io
