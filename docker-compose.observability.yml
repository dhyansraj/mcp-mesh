# MCP Mesh Observability Stack
# Generated by: meshctl scaffold --observability
#
# Usage:
#   docker compose -f docker-compose.observability.yml up -d
#
# Services:
#   - redis: Redis for distributed tracing state
#   - tempo: Distributed tracing backend (OTLP receiver)
#   - grafana: Observability dashboard (admin/admin)
#
# To enable distributed tracing in your agents, set:
#   export MCP_MESH_DISTRIBUTED_TRACING_ENABLED=true
#   export REDIS_URL=redis://localhost:6379

services:
  redis:
    image: redis:7-alpine
    container_name: mcp-mesh-redis
    hostname: redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mcp-mesh-network

  tempo:
    image: grafana/tempo:2.9.0
    container_name: mcp-mesh-tempo
    hostname: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mcp-mesh-network

  grafana:
    image: grafana/grafana:12.3.1
    container_name: mcp-mesh-grafana
    hostname: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mcp-mesh-network

volumes:
  tempo-data:
  grafana-data:

networks:
  mcp-mesh-network:
    name: mcp-mesh-network
    driver: bridge
