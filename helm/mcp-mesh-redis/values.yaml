# Redis configuration for MCP Mesh
redis:
  # Redis configuration
  appendonly: "yes"
  maxmemory: "256mb"
  maxmemoryPolicy: "allkeys-lru"

image:
  # Registry prefix for the image. Resolution: this value >
  # global.imageRegistry > "" (Docker Hub). The repository path is preserved:
  # registry: my.registry.internal pulls my.registry.internal/redis —
  # mirror Docker Hub library images to the same single-segment path.
  registry: ""
  repository: redis
  tag: "7-alpine"
  pullPolicy: IfNotPresent

# Pull secrets for this chart's pods, merged with global.imagePullSecrets
# (deduplicated by name). Standard shape:
#   imagePullSecrets:
#     - name: my-registry-credentials
imagePullSecrets: []

# Service configuration
service:
  type: ClusterIP
  port: 6379
  targetPort: redis

# Deployment configuration
replicaCount: 1

# Persistence configuration (using emptyDir for cache)
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 8Gi
  annotations: {}

# Resource limits
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Health check configuration
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Container security context (hardened for Pod Security Standards
# "restricted"). readOnlyRootFilesystem works because redis only writes /data,
# which is always a volume (PVC or emptyDir).
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999
  seccompProfile:
    type: RuntimeDefault

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod annotations
podAnnotations: {}

# Extra labels
extraLabels: {}

# Extra environment variables
extraEnvVars: []

# Custom Redis configuration
customConfig: ""
