{{- if .Values.grafana.enabled }}
{{- /* Migration guard: grafana.securityContext used to be the POD security
       context (it carried fsGroup). It is now the CONTAINER security context
       and pod-level settings live under grafana.podSecurityContext — an old
       override here would put fsGroup in the container context, where the
       API server drops it (losing PVC write access). */}}
{{- range $field := list "fsGroup" "fsGroupChangePolicy" "supplementalGroups" "sysctls" }}
{{- if hasKey ($.Values.grafana.securityContext | default dict) $field }}
{{- fail (printf "grafana.securityContext.%s: grafana.securityContext is now the container security context; pod-only fields (fsGroup, fsGroupChangePolicy, supplementalGroups, sysctls) are invalid there and belong in grafana.podSecurityContext. Move your override there." $field) }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-mesh-grafana.fullname" . }}
  labels:
    {{- include "mcp-mesh-grafana.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mcp-mesh-grafana.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-mesh-grafana.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.grafana.podSecurityContext | nindent 8 }}
      containers:
      - name: grafana
        image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
        imagePullPolicy: {{ .Values.grafana.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.grafana.securityContext | nindent 10 }}
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        {{- if .Values.grafana.config.existingSecret }}
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.grafana.config.existingSecret }}
              key: {{ .Values.grafana.config.existingSecretPasswordKey | default "admin-password" }}
        {{- else }}
        {{- /* Chart-managed Secret (explicit or auto-generated password, see
               secret.yaml) — never templated into the pod spec. */}}
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "mcp-mesh-grafana.fullname" . }}-secret
              key: admin-password
        {{- end }}
        - name: GF_USERS_ALLOW_SIGN_UP
          value: {{ .Values.grafana.config.allowSignUp | quote }}
        {{- if .Values.grafana.config.installPlugins }}
        - name: GF_INSTALL_PLUGINS
          value: {{ .Values.grafana.config.installPlugins | quote }}
        {{- end }}
        - name: GF_NEWS_NEWS_FEED_ENABLED
          value: "false"
        {{- if .Values.grafana.config.basePath }}
        - name: GF_SERVER_ROOT_URL
          value: "%(protocol)s://%(domain)s{{ .Values.grafana.config.basePath }}/"
        - name: GF_SERVER_SERVE_FROM_SUB_PATH
          value: "true"
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: /etc/grafana/grafana.ini
          subPath: grafana.ini
          readOnly: true
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
          readOnly: true
        {{- if .Values.grafana.dashboards.enabled }}
        - name: dashboards-config
          mountPath: /etc/grafana/provisioning/dashboards
          readOnly: true
        - name: dashboards
          mountPath: /var/lib/grafana/dashboards
          readOnly: true
        {{- end }}
        {{- /* /var/lib/grafana and /tmp must be writable (data, sqlite db,
               plugin install) — always volumes since the root filesystem is
               read-only. */}}
        - name: storage
          mountPath: /var/lib/grafana
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.grafana.resources | nindent 10 }}
      volumes:
      - name: config
        configMap:
          name: {{ include "mcp-mesh-grafana.fullname" . }}-config
      - name: datasources
        configMap:
          name: {{ include "mcp-mesh-grafana.fullname" . }}-datasources
      {{- if .Values.grafana.dashboards.enabled }}
      - name: dashboards-config
        configMap:
          name: {{ include "mcp-mesh-grafana.fullname" . }}-dashboards-config
      - name: dashboards
        configMap:
          name: {{ include "mcp-mesh-grafana.fullname" . }}-dashboard
      {{- end }}
      - name: storage
        {{- if .Values.grafana.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "mcp-mesh-grafana.fullname" . }}-pvc
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: tmp
        emptyDir: {}
{{- end }}
