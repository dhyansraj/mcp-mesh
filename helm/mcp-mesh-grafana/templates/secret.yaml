{{- /*
Chart-managed Secret for the Grafana admin password. Renders whenever no
existing secret supplies it. Holds either the explicit
grafana.config.adminPassword (always wins) or an auto-generated one: an
existing Secret found via lookup is reused so the password stays stable
across helm upgrades; otherwise a random one is generated (first install,
and template/lint time where lookup returns nothing — pure
`helm template | kubectl apply` pipelines therefore regenerate the value on
every render; helm install/upgrade is the supported path). Grafana applies
GF_SECURITY_ADMIN_PASSWORD only on first start, so with persistence enabled
the effective password is the one generated at install time.
*/ -}}
{{- if and .Values.grafana.enabled (not .Values.grafana.config.existingSecret) }}
{{- $name := printf "%s-secret" (include "mcp-mesh-grafana.fullname" .) }}
{{- $passwordB64 := "" }}
{{- with .Values.grafana.config.adminPassword }}
{{- $passwordB64 = . | b64enc }}
{{- else }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $passwordB64 = dig "data" "admin-password" "" ($existing | default dict) }}
{{- if not $passwordB64 }}
{{- $passwordB64 = randAlphaNum 24 | b64enc }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "mcp-mesh-grafana.labels" . | nindent 4 }}
type: Opaque
data:
  admin-password: {{ $passwordB64 | quote }}
{{- end }}
