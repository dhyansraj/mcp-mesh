grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: "12.3.1"
    pullPolicy: IfNotPresent

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

  service:
    type: ClusterIP
    port: 3000

  config:
    # Password for the built-in "admin" user. Resolution order:
    #   1. existingSecret below (no plaintext in values)
    #   2. this value (rendered into the chart-managed Secret)
    #   3. empty: auto-generated into the chart-managed Secret
    #      "<fullname>-secret" (key: admin-password). The generated value is
    #      reused on helm upgrade (lookup). Retrieve it with:
    #        kubectl get secret <fullname>-secret -o jsonpath='{.data.admin-password}' | base64 -d
    #      Note: lookup needs a cluster — `helm template | kubectl apply`
    #      pipelines regenerate the value on every render; use helm
    #      install/upgrade, or set an explicit password / existingSecret.
    #      Grafana applies the password only on first start: with persistence
    #      enabled, later changes to this value do not update a provisioned
    #      instance (use grafana-cli admin reset-admin-password).
    adminPassword: ""
    # Read the admin password from an existing secret instead.
    existingSecret: ""
    existingSecretPasswordKey: "admin-password"
    allowSignUp: false
    installPlugins: "grafana-piechart-panel"
    # Base path for serving Grafana behind a path prefix
    # When set, configures root_url and serve_from_sub_path in grafana.ini
    basePath: ""

  datasources:
    tempo:
      enabled: true
      url: 'http://{{ include "mcp-mesh-core.fullname" . }}-tempo:3200'
    prometheus:
      enabled: true
      url: "http://prometheus:9090"

  # Dashboard configuration references observability/grafana/dashboards/
  dashboards:
    enabled: true
    # References to the centralized dashboard configs
    configMaps:
      - mcp-mesh-dashboards

  # Security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    fsGroup: 472
