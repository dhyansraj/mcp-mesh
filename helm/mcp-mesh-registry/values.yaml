# Default values for mcp-mesh-registry
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Use Deployment for stateless registry
replicaCount: 1
workloadType: "Deployment" # Registry is stateless

image:
  # Registry prefix for the image. Resolution: this value >
  # global.imageRegistry > "" (Docker Hub). The repository path is preserved:
  # registry: my.registry.internal pulls my.registry.internal/mcpmesh/registry
  # — mirror images to the same paths.
  registry: ""
  repository: mcpmesh/registry
  pullPolicy: IfNotPresent
  # Minor version tag tracks latest patch (0.8 → 0.8.x)
  tag: "2.7"

# Image for the wait-for-db init container (rendered for non-sqlite databases;
# disable the init container via registry.database.waitForDatabase: false).
# The registry prefix resolves like image.registry above — with
# global.imageRegistry set, this pulls <registry>/busybox:1.35.
waitForDbImage:
  registry: ""
  repository: busybox
  tag: "1.35"

# Pull secrets for this chart's pods, merged with global.imagePullSecrets
# (deduplicated by name). Standard shape:
#   imagePullSecrets:
#     - name: my-registry-credentials
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

# Pod security context (hardened for Pod Security Standards "restricted";
# seccompProfile here also covers the wait-for-db init container).
# Note: uid 999 intentionally differs from the mcpmesh/registry image's
# built-in mcp-mesh user (1001). Any non-root uid works here: the root
# filesystem is read-only and every writable path is a volume (/tmp emptyDir,
# /data PVC/emptyDir) made group-writable via fsGroup.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999
  seccompProfile:
    type: RuntimeDefault

# Container security context. readOnlyRootFilesystem works because the
# registry is a static Go binary that only writes its database: /tmp is
# emptyDir-mounted and /data is a volume in sqlite mode (PVC when
# persistence.enabled, emptyDir otherwise). If you point an opt-in feature at
# a path on the root filesystem (e.g. registry.security.trust.dir with the
# localca/filestore backend and no caSecret), mount it via extraVolumes or
# relax this setting.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999

service:
  type: ClusterIP
  port: 8000 # Registry uses port 8000 (matches working examples)
  targetPort: 8000
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: mcp-registry.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Explicit topology spread constraints. When set, they replace the built-in
# soft defaults below entirely.
topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels:
  #       app.kubernetes.io/name: mcp-mesh-registry

# Built-in soft spread for HA: when no explicit topologySpreadConstraints are
# set and more than one replica is possible (replicaCount > 1, or autoscaling
# enabled with maxReplicas > 1), the registry pods get soft (ScheduleAnyway,
# maxSkew 1) spread across zones and nodes. ScheduleAnyway is a no-op on
# single-node / single-zone clusters, so this is safe to leave on. Hard
# requirements (DoNotSchedule, pod anti-affinity) stay opt-in via
# topologySpreadConstraints / affinity above.
defaultTopologySpread:
  enabled: true

# Registry-specific configuration
registry:
  # Registry name for identification
  name: "mcp-mesh-registry"

  # Host address for the registry
  host: "0.0.0.0"
  # Port for the registry service (matches working examples)
  port: 8000

  # Database configuration. Each connection field below inherits
  # global.postgres.* when left empty here (the mcp-mesh-core umbrella shares
  # one global.postgres block with every datastore consumer); explicit values
  # here always win. Chart defaults apply when neither layer sets a field.
  database:
    # Database path (for SQLite)
    path: "/data/registry.db"
    # Database type (sqlite, postgres, mysql)
    type: "postgres" # Default to postgres like working examples
    # For external databases (postgres/mysql)
    host: "" # default: mcp-mesh-postgres
    port: null # default: 5432
    name: "" # default: mcpmesh
    username: "" # default: mcpmesh
    password: ""
    # PostgreSQL SSL mode: disable, require, verify-ca, verify-full
    sslmode: "" # default: disable
    # TLS material for verify-ca / verify-full against managed databases
    tls:
      # Secret containing the CA certificate used to verify the server.
      # Mounted at /etc/service-tls/postgres and appended to the DSN as sslrootcert.
      caSecret: ""
      caKey: "" # default: ca.crt
    # Use an existing secret for the database credentials. Two modes:
    #
    # 1. Full DSN (preferred, postgres only): set existingSecretUrlKey to the
    #    key holding a complete postgres:// URL. DATABASE_URL is consumed
    #    directly via secretKeyRef — no composition, so the password needs no
    #    URL-safety and sslmode/tls.* above are NOT applied (encode sslmode /
    #    sslrootcert in the DSN itself; tls.caSecret still mounts the CA at
    #    /etc/service-tls/postgres for the DSN to reference).
    #
    # 2. Password only (fallback): leave existingSecretUrlKey empty and point
    #    existingSecretPasswordKey at the password. DATABASE_URL is composed
    #    in the pod via $(DATABASE_PASSWORD) expansion, so the password is
    #    never templated — but it is not URL-encoded either, so it must be
    #    URL-safe. sslmode and tls.* apply; the username comes from
    #    registry.database.username.
    #
    # In both modes registry.database.{host,port,name,username} still feed the
    # configmap and the wait-for-db init container.
    existingSecret: ""
    # Key holding a complete DSN in the existing secret (mode 1). Empty
    # selects mode 2. The chart's own Secret uses "database-url" for this.
    existingSecretUrlKey: ""
    # Key holding the password in the secret (mode 2)
    existingSecretPasswordKey: "" # default: password

  # Logging configuration (matches K8s examples)
  logging:
    level: "DEBUG" # DEBUG, INFO, WARNING, ERROR, CRITICAL
    format: "json" # json or text
    debug: "true" # Enable debug mode

  # Health check configuration
  healthCheck:
    enabled: true
    interval: 30
    timeout: 10

  # Performance tuning (matches K8s examples)
  performance:
    maxConnections: 1000
    connectionTimeout: 30
    requestTimeout: 60
    # Fast heartbeat optimization
    timeoutThreshold: 20
    healthCheckInterval: 10
    evictionThreshold: 60

  # Security configuration
  security:
    # Enable TLS
    tls:
      enabled: false
      # TLS mode: off, auto, strict
      mode: "off"
      # Existing K8s TLS secret (e.g. from a cert-manager Certificate),
      # mounted read-only at /etc/tls. Required when enabled.
      secretName: ""
      certKey: "tls.crt"
      keyKey: "tls.key"

    # Trust backend configuration (for agent registration verification)
    trust:
      # Comma-separated backends: localca, filestore, k8s-secrets, spire
      backend: ""
      # Directory for filestore/localca backends
      dir: "/etc/mcp-mesh/trust"
      # Existing secret containing CA certificates for filestore
      caSecret: ""
      caKey: "ca.crt"
      # K8s-secrets backend
      k8sSecrets:
        namespace: "" # defaults to release namespace
        labelSelector: "mcp-mesh.io/trust=entity-ca"
      # SPIRE backend
      spire:
        socketPath: "/run/spire/agent/sockets/agent.sock"
        # Mount SPIRE agent socket
        enabled: false

    # Admin API port (0 = admin endpoints on main port)
    adminPort: 0

    # Authentication
    auth:
      enabled: false
      type: "token" # token, basic, oauth2
      # For token auth
      tokens: []
      # Use existing secret for tokens
      existingSecret: ""
      secretKey: "tokens"

  # Observability configuration - matches Docker setup
  observability:
    distributedTracing:
      enabled: true
      # How long span events stay in the mesh:trace Redis stream before the
      # registry trims them (XTRIM MINID on connect and every 5m). The stream
      # is a transport buffer — long-term trace history lives in Tempo. Go
      # duration string; "0" disables trimming entirely.
      retention: "24h"
    telemetryEndpoint: "mcp-core-mcp-mesh-tempo:4317"
    # Exporter type: console (default), otlp (for Tempo/Jaeger), json
    exporterType: "otlp"

  # Redis configuration — single source of truth for the registry's Redis
  # endpoint. One REDIS_URL serves both session storage and the distributed
  # trace stream (registry reads from mesh:trace). Each connection field
  # inherits global.redis.* when left empty here; explicit values win.
  redis:
    enabled: true
    host: "" # default: mcp-core-mcp-mesh-redis
    port: null # default: 6379
    # AUTH password. When set, REDIS_URL is rendered into the chart secret
    # (instead of the configmap) with the password URL-encoded.
    password: ""
    # Or take credentials from an existing secret. Two modes:
    # 1. Full URL (preferred): set existingSecretUrlKey to the key holding a
    #    complete redis:// or rediss:// URL, consumed directly via
    #    secretKeyRef — no composition, no URL-safety requirement. host/port/
    #    tls.enabled below are NOT applied to the URL (put the scheme in it);
    #    serviceTLS.redis.* cert mounts still apply.
    # 2. Password only (fallback): leave existingSecretUrlKey empty. The
    #    password is interpolated into REDIS_URL via $(REDIS_PASSWORD)
    #    expansion without encoding, so it must be URL-safe.
    existingSecret: ""
    # Key holding a complete Redis URL in the existing secret (mode 1).
    # Empty selects mode 2. The chart's own Secret uses "redis-url" for this.
    existingSecretUrlKey: ""
    existingSecretPasswordKey: "" # default: redis-password
    # tls.enabled: true renders rediss:// instead of redis:// (default false;
    # inherits global.redis.tls.enabled when not set here). Pair with
    # serviceTLS.redis.* below to mount CA / client certificates.
    tls: {}

# Per-service TLS configuration for external service connections
# Each service connection can use its own CA, client cert, and key
serviceTLS:
  # TLS for Redis connection
  redis:
    secretName: ""
    caKey: "ca.crt"
    certKey: "tls.crt"
    keyKey: "tls.key"
    skipVerify: false
  # TLS for Tempo HTTP query connection
  tempo:
    secretName: ""
    caKey: "ca.crt"
    certKey: "tls.crt"
    keyKey: "tls.key"
    skipVerify: false
  # TLS for OTLP/telemetry exporter connection
  telemetry:
    secretName: ""
    caKey: "ca.crt"
    certKey: "tls.crt"
    keyKey: "tls.key"
    skipVerify: false

# Persistence configuration (disabled for stateless registry)
persistence:
  enabled: false # Registry is stateless and uses external database
  # Storage class name
  storageClass: ""
  # Access mode
  accessMode: ReadWriteOnce
  # Size of the volume
  size: 10Gi
  # Existing PVC to use
  existingClaim: ""
  # Annotations for the PVC
  annotations: {}
  # Mount path
  mountPath: /data
  # Subpath within the volume
  subPath: ""

# Environment variables
env: []
  # - name: CUSTOM_ENV_VAR
  #   value: "custom_value"

# Environment variables from ConfigMaps or Secrets
envFrom: []
  # - configMapRef:
  #     name: special-config
  # - secretRef:
  #     name: special-secret

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health # Matches working examples
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Pod disruption budget. Enabled by default, but it only engages when the
# registry is guaranteed more than one replica (replicaCount > 1, or
# autoscaling.minReplicas > 1 with the HPA enabled) — a minAvailable PDB on
# a single-replica deployment would block node drains.
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

# Network policies
networkPolicy:
  enabled: false
  # Namespace allowed to send ingress traffic. Empty = release namespace.
  allowedNamespace: ""
  policyTypes:
    - Ingress
    - Egress
  ingressPorts:
    - protocol: TCP
      port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432

# Service Monitor for Prometheus
serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  honorLabels: true
  metricRelabelings: []
  relabelings: []

# Pod Monitor for Prometheus
podMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  honorLabels: true
  metricRelabelings: []
  relabelings: []

# Extra volumes and volume mounts
extraVolumes: []
  # - name: extra-volume
  #   secret:
  #     secretName: extra-secret

extraVolumeMounts: []
  # - name: extra-volume
  #   mountPath: /etc/extra
  #   readOnly: true

# Init containers
initContainers: []
  # - name: init-db
  #   image: busybox:1.35
  #   command: ['sh', '-c', 'until nc -z database 5432; do echo waiting for db; sleep 2; done;']

# Sidecar containers
sidecarContainers: []
  # - name: logging-sidecar
  #   image: fluent/fluent-bit:1.9
  #   volumeMounts:
  #     - name: varlog
  #       mountPath: /var/log

# Extra labels for all resources
commonLabels: {}
  # team: backend
  # environment: production

# Extra annotations for all resources
commonAnnotations: {}
  # prometheus.io/scrape: "true"
  # prometheus.io/port: "8080"
