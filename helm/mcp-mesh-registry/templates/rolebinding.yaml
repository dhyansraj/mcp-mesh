{{- if contains "k8s-secrets" (.Values.registry.security.trust.backend | default "") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mcp-mesh-registry.fullname" . }}-trust-reader
  namespace: {{ .Values.registry.security.trust.k8sSecrets.namespace | default .Release.Namespace }}
  labels:
    {{- include "mcp-mesh-registry.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mcp-mesh-registry.fullname" . }}-trust-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "mcp-mesh-registry.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
