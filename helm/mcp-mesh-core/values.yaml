# MCP Mesh Core Infrastructure Configuration
# This umbrella chart deploys the core components: Registry, PostgreSQL, Redis, and Observability

# Global configuration
global:
  # Namespace for all components (used by namespaceCreate).
  # Usually matches the -n flag: helm install ... -n my-namespace --set global.namespace=my-namespace
  namespace: mcp-mesh

  # Private/air-gapped registry prefix applied to EVERY image in the stack:
  # the registry, UI, postgres, redis, grafana, tempo, and the registry's
  # wait-for-db busybox init container. Repository paths are preserved —
  # with imageRegistry: my.registry.internal the charts pull
  # my.registry.internal/mcpmesh/registry, my.registry.internal/postgres,
  # my.registry.internal/grafana/grafana, my.registry.internal/busybox, ... —
  # so mirror each image to the same path in your registry. Per-component
  # overrides win (e.g. mcp-mesh-registry.image.registry).
  imageRegistry: ""
  # Pull secrets added to every pod spec, merged with each chart's own
  # imagePullSecrets (deduplicated by name). Standard shape:
  #   imagePullSecrets:
  #     - name: my-registry-credentials
  imagePullSecrets: []

  # Datastore endpoints, declared ONCE and inherited by every consumer:
  # the registry (DATABASE_URL/REDIS_URL), the UI (when enabled), and the
  # bundled postgres provisioning. The defaults below point at the bundled
  # subcharts. For a managed/external datastore, disable the bundled subchart
  # (postgres.enabled / redis.enabled) and override these — see the
  # "External managed datastores" recipe in the README. Per-subchart values
  # (e.g. mcp-mesh-registry.registry.database.host) still win when set.
  postgres:
    host: "mcp-core-mcp-mesh-postgres"
    port: 5432
    name: "mcpmesh"
    username: "mcpmesh"
    # Password resolution, applied identically by provisioning and every
    # consumer: existingSecret below > this inline value > auto-generated
    # (generatedSecret: true). The default is auto-generation: the bundled
    # postgres chart creates a random password in the Secret
    # "<release>-mcp-mesh-postgres-credentials" (key: password), provisioning
    # and all consumers read it via secretKeyRef, the value is reused on
    # upgrade (lookup) and kept on uninstall so it stays in sync with the
    # database files on the PVC. Retrieve it with:
    #   kubectl get secret <release>-mcp-mesh-postgres-credentials \
    #     -o jsonpath='{.data.password}' | base64 -d
    # Note: lookup needs a cluster — `helm template | kubectl apply` /
    # GitOps-render pipelines regenerate the value on every render; use helm
    # install/upgrade there, or set an explicit password / existingSecret.
    password: ""
    # Auto-generate the password when no password/existingSecret is set.
    # Set false only for an external database that needs no credential.
    generatedSecret: true
    # Override the generated Secret's name (needed only with
    # nameOverride/fullnameOverride on the postgres subchart):
    # generatedSecretName: ""
    # PostgreSQL SSL mode for managed endpoints: disable (default), require,
    # verify-ca, verify-full
    # sslmode: "require"
    # CA certificate for verify-ca / verify-full (mounted into each consumer
    # and appended to the DSN as sslrootcert)
    # tls:
    #   caSecret: ""
    #   caKey: "ca.crt"
    # Credentials from an existing secret instead of the inline password:
    # either a full postgres:// DSN (urlKey mode) or just the password
    # existingSecret: ""
    # existingSecretUrlKey: ""       # key holding a complete DSN
    # existingSecretPasswordKey: ""  # default: password (must be URL-safe)
  redis:
    host: "mcp-core-mcp-mesh-redis"
    port: 6379
    # AUTH password for managed endpoints (URL-encoded into REDIS_URL, which
    # then renders into each consumer's secret instead of its configmap)
    # password: ""
    # Or credentials from an existing secret: a full redis://(s) URL (urlKey
    # mode) or just the password
    # existingSecret: ""
    # existingSecretUrlKey: ""       # key holding a complete URL
    # existingSecretPasswordKey: ""  # default: redis-password (URL-safe)
    # tls:
    #   enabled: true                # renders rediss://

# Service hostname convention:
# All internal service hostnames use short names (e.g., "mcp-core-mcp-mesh-redis")
# which resolve within the same namespace via Kubernetes DNS. The defaults
# above assume the release name "mcp-core"; with a different release name,
# override global.postgres.host, global.redis.host, and the
# *-mcp-mesh-tempo endpoints to "<release>-mcp-mesh-<component>".
# For cross-namespace access, override with FQDNs:
#   --set mcp-mesh-registry.registry.redis.host=mcp-core-mcp-mesh-redis.other-ns.svc.cluster.local

# Component enablement
postgres:
  enabled: true

redis:
  enabled: true

registry:
  enabled: true

# Observability components
grafana:
  enabled: true

tempo:
  enabled: true

ui:
  enabled: false

# PostgreSQL configuration
# (database name / credentials are inherited from global.postgres above)
mcp-mesh-postgres:
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# Redis configuration
mcp-mesh-redis:
  redis:
    maxmemory: "256mb"
    maxmemoryPolicy: "allkeys-lru"

  persistence:
    enabled: false # Use emptyDir for cache

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Registry configuration
mcp-mesh-registry:
  image:
    repository: mcpmesh/registry
    tag: "2.7" # Minor version tracks latest patch
  registry:
    # Database configuration (connects to PostgreSQL). The endpoint and
    # credentials are inherited from global.postgres above; set
    # registry.database.{host,port,name,username,password,...} here only to
    # override them for the registry alone.
    database:
      type: "postgres"
      waitForDatabase: true # Wait for database to be ready before starting registry

    # Logging configuration (matches K8s examples)
    logging:
      level: "DEBUG"
      format: "json"
      debug: "true"

    # Redis configuration — single source of truth for the registry's Redis
    # endpoint. Session storage and the distributed-trace stream share the
    # derived REDIS_URL. The endpoint is inherited from global.redis above;
    # set registry.redis.{host,port,password,existingSecret,tls,...} here
    # only to override it for the registry alone.
    redis:
      enabled: true

    # Observability configuration (the Redis endpoint for the trace stream
    # comes from registry.redis above; stream tuning is set via the env
    # list: TRACE_BATCH_SIZE, TRACE_TIMEOUT, TELEMETRY_PROTOCOL, ...)
    observability:
      distributedTracing:
        enabled: true
        # mesh:trace Redis stream retention (XTRIM MINID on connect and
        # periodically); "0" disables trimming. The stream is a transport
        # buffer — long-term trace history lives in Tempo.
        retention: "24h"
      telemetryEndpoint: "mcp-core-mcp-mesh-tempo:4317"

    # Health check configuration
    healthCheck:
      enabled: true
      interval: 30
      timeout: 10

  # Use Deployment for stateless registry
  workloadType: "Deployment"

  # Persistence disabled for stateless registry
  persistence:
    enabled: false # Registry is stateless

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Service configuration
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000

  # Ingress configuration (disabled by default)
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: mcp-registry.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

# Grafana configuration
mcp-mesh-grafana:
  grafana:
    # The admin password is auto-generated by default into the Secret
    # "<release>-mcp-mesh-grafana-secret" (key: admin-password); set
    # grafana.config.adminPassword or grafana.config.existingSecret /
    # existingSecretPasswordKey to override. Retrieve the generated value:
    #   kubectl get secret <release>-mcp-mesh-grafana-secret \
    #     -o jsonpath='{.data.admin-password}' | base64 -d
    config:
      allowSignUp: false
      installPlugins: "grafana-piechart-panel"

    datasources:
      tempo:
        enabled: true
        url: "http://mcp-core-mcp-mesh-tempo:3200"
      prometheus:
        enabled: true
        url: "http://prometheus:9090"

    persistence:
      enabled: true
      size: 2Gi

    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

# Tempo configuration
mcp-mesh-tempo:
  tempo:
    config:
      metricsGenerator:
        enabled: true
        prometheusUrl: "http://prometheus:9090/api/v1/write"

      retention: "1h"
      blockDuration: "5m"

    persistence:
      enabled: true
      size: 5Gi

    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"

# UI Server configuration
# (DATABASE_URL / REDIS_URL are composed from global.postgres / global.redis
# above; set ui.database.url / ui.redis.url here only to override them for
# the UI alone — e.g. a read-only database credential)
mcp-mesh-ui:
  ui:
    registryURL: "http://mcp-core-mcp-mesh-registry:8000"
    basePath: "/ops/dashboard"  # default; override with custom image for different path
    tempo:
      url: "http://mcp-core-mcp-mesh-tempo:3200"
      telemetryEndpoint: "mcp-core-mcp-mesh-tempo:4317"

# Namespace creation
namespaceCreate: true

# Common labels for all resources
commonLabels:
  app.kubernetes.io/part-of: mcp-mesh-core

# Common annotations for all resources
commonAnnotations: {}

# Network policies, service monitors, and pod disruption budgets are
# configured per subchart (the umbrella-level networkPolicies /
# serviceMonitors / podDisruptionBudgets flags were never consumed and have
# been removed):
# - mcp-mesh-registry.networkPolicy.enabled (and networkPolicy.enabled on
#   each agent release)
# - mcp-mesh-registry.serviceMonitor.enabled / podMonitor.enabled
# - mcp-mesh-registry.podDisruptionBudget — defaults on and engages
#   automatically at mcp-mesh-registry.replicaCount > 1. HA scheduling
#   lives there too (topologySpreadConstraints / defaultTopologySpread /
#   autoscaling).
