{{- /*
Chart-managed credentials Secret. Renders whenever no existing secret
supplies the provisioning password. Holds either the inline password
(postgres.password / global.postgres.password — explicit always wins) or an
auto-generated one: an existing Secret found via lookup is reused so the
password stays stable across helm upgrades; otherwise a random one is
generated (first install, and template/lint time where lookup returns
nothing — note that pure `helm template | kubectl apply` pipelines therefore
regenerate the value on every render; helm install/upgrade is the supported
path).

helm.sh/resource-policy: keep — the StatefulSet's PVC (and the password
PostgreSQL was initialized with) outlives the release, so the Secret must
too: on reinstall under the same release name, lookup finds the kept Secret
and the credential keeps matching the data directory.
*/ -}}
{{- if not (include "mcp-mesh-postgres.existingSecret" .) }}
{{- $name := include "mcp-mesh-postgres.credentialsSecretName" . }}
{{- $passwordB64 := "" }}
{{- with include "mcp-mesh-postgres.password" . }}
{{- $passwordB64 = . | b64enc }}
{{- else }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $passwordB64 = dig "data" "password" "" ($existing | default dict) }}
{{- if not $passwordB64 }}
{{- $passwordB64 = randAlphaNum 24 | b64enc }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-mesh-postgres.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  password: {{ $passwordB64 | quote }}
{{- end }}
