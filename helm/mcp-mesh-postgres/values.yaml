# PostgreSQL configuration for MCP Mesh
postgres:
  # Database / credentials provisioned at first start. Each field inherits
  # global.postgres.{name,username,password} when left empty here (so the
  # mcp-mesh-core umbrella provisions the bundled database with the same
  # credentials every consumer connects with); explicit values win.
  database: "" # default: mcpmesh (inherits global.postgres.name)
  username: "" # default: mcpmesh (inherits global.postgres.username)
  # Provisioning password. When neither this nor global.postgres.password is
  # set (and no existingSecret below), a random password is generated into
  # the chart-managed Secret "<fullname>-credentials" (key: password,
  # name overridable via global.postgres.generatedSecretName). The Secret is
  # reused on upgrade (lookup) and kept on uninstall (resource-policy: keep)
  # so it stays in sync with the data directory on the PVC. Retrieve it with:
  #   kubectl get secret <fullname>-credentials -o jsonpath='{.data.password}' | base64 -d
  # Note: lookup needs a cluster — `helm template | kubectl apply` pipelines
  # regenerate the value on every render; use helm install/upgrade, or set an
  # explicit password / existingSecret for GitOps template pipelines.
  password: "" # inherits global.postgres.password
  # Read the provisioning password from an existing secret instead
  # (inherits global.postgres.existingSecret / existingSecretPasswordKey —
  # the same secret every consumer composes its DSN from in the umbrella).
  existingSecret: ""
  existingSecretPasswordKey: "" # default: password

  # PostgreSQL configuration
  postgresqlDataDir: "/var/lib/postgresql/data/pgdata"

image:
  # Registry prefix for the image. Resolution: this value >
  # global.imageRegistry > "" (Docker Hub). The repository path is preserved:
  # registry: my.registry.internal pulls my.registry.internal/postgres —
  # mirror Docker Hub library images to the same single-segment path.
  registry: ""
  repository: postgres
  tag: "15"
  pullPolicy: IfNotPresent

# Pull secrets for this chart's pods, merged with global.imagePullSecrets
# (deduplicated by name). Standard shape:
#   imagePullSecrets:
#     - name: my-registry-credentials
imagePullSecrets: []

# Service configuration
service:
  type: ClusterIP
  port: 5432
  targetPort: postgres

# Persistence configuration
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  annotations: {}

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Health check configuration
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

startupProbe:
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# Container security context (hardened for Pod Security Standards "restricted").
# readOnlyRootFilesystem works because every path postgres writes is a volume:
# the data directory (PVC) and /var/run/postgresql + /tmp (emptyDir, see the
# statefulset).
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999

# Pod security context. Runs the official postgres image as its in-image
# postgres user (uid 999) — no root and no chown initContainer needed:
# fsGroup makes the PVC mount group-writable, the entrypoint skips its
# root-only chown path when started non-root, and initdb creates the pgdata
# subdirectory (postgres.postgresqlDataDir) itself with the right ownership.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999
  # Skip the recursive chown/chmod of the data volume when its root already
  # has the right ownership — on a large database the recursive walk on every
  # pod start is expensive.
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod annotations
podAnnotations: {}

# Extra labels
extraLabels: {}

# Extra environment variables
extraEnvVars: []
