# PostgreSQL configuration for MCP Mesh
postgres:
  # Database / credentials provisioned at first start. Each field inherits
  # global.postgres.{name,username,password} when left empty here (so the
  # mcp-mesh-core umbrella provisions the bundled database with the same
  # credentials every consumer connects with); explicit values win.
  database: "" # default: mcpmesh (inherits global.postgres.name)
  username: "" # default: mcpmesh (inherits global.postgres.username)
  # Provisioning password. When neither this nor global.postgres.password is
  # set (and no existingSecret below), a random password is generated into
  # the chart-managed Secret "<fullname>-credentials" (key: password,
  # name overridable via global.postgres.generatedSecretName). The Secret is
  # reused on upgrade (lookup) and kept on uninstall (resource-policy: keep)
  # so it stays in sync with the data directory on the PVC. Retrieve it with:
  #   kubectl get secret <fullname>-credentials -o jsonpath='{.data.password}' | base64 -d
  # Note: lookup needs a cluster — `helm template | kubectl apply` pipelines
  # regenerate the value on every render; use helm install/upgrade, or set an
  # explicit password / existingSecret for GitOps template pipelines.
  password: "" # inherits global.postgres.password
  # Read the provisioning password from an existing secret instead
  # (inherits global.postgres.existingSecret / existingSecretPasswordKey —
  # the same secret every consumer composes its DSN from in the umbrella).
  existingSecret: ""
  existingSecretPasswordKey: "" # default: password

  # PostgreSQL configuration
  postgresqlDataDir: "/var/lib/postgresql/data/pgdata"

  # Security configuration
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999

image:
  repository: postgres
  tag: "15"
  pullPolicy: IfNotPresent

# Service configuration
service:
  type: ClusterIP
  port: 5432
  targetPort: postgres

# Persistence configuration
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  annotations: {}

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Health check configuration
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

startupProbe:
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# Pod security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsUser: 999
  runAsGroup: 999

# Pod security context
podSecurityContext:
  runAsNonRoot: false
  fsGroup: 999

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod annotations
podAnnotations: {}

# Extra labels
extraLabels: {}

# Extra environment variables
extraEnvVars: []
