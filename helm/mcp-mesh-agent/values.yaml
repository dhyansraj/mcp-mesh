# Default values for mcp-mesh-agent
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global configuration
global:
  # Release name used when installing mcp-mesh-core. Prefixes the default
  # core service hostnames: <coreReleaseName>-mcp-mesh-{registry,redis,tempo}.
  # Override this if you installed mcp-mesh-core with a different release name
  # Example: helm install my-core mcp-mesh-core ... → set coreReleaseName: "my-core"
  # Explicit hostnames (registry.host, global.redis.host,
  # agent.observability.telemetryEndpoint) always win over the prefix.
  coreReleaseName: "mcp-core"
  # Shared Redis endpoint for trace publishing — same shape as the
  # mcp-mesh-core umbrella's global.redis, so the umbrella's datastore values
  # file can be reused for agent releases (this chart is standalone, not an
  # umbrella subchart, so helm does not propagate the umbrella's globals
  # automatically). Used when agent.observability.distributedTracing.redisUrl
  # is unset. With password/existingSecret set, REDIS_URL is sourced from a
  # Secret instead of the chart configmap.
  # redis:
  #   host: "my-redis.example.com"
  #   port: 6379
  #   password: ""
  #   existingSecret: ""
  #   existingSecretUrlKey: ""       # key holding a full redis:// URL
  #   existingSecretPasswordKey: ""  # default: redis-password (must be
  #                                  # URL-safe: interpolated into REDIS_URL
  #                                  # via $(REDIS_PASSWORD) without encoding;
  #                                  # prefer existingSecretUrlKey otherwise)
  #   tls:
  #     enabled: true                # renders rediss://

replicaCount: 1

image:
  # Registry prefix for the image. Resolution: this value >
  # global.imageRegistry > "" (Docker Hub). The repository path is preserved
  # (registry: my.registry.internal pulls
  # my.registry.internal/mcpmesh/python-runtime).
  registry: ""
  # Default: Python base runtime image (has no agent code)
  # Available runtimes: mcpmesh/python-runtime, mcpmesh/typescript-runtime, mcpmesh/java-runtime
  # Override with your built agent image: --set image.repository=your-registry/my-agent
  repository: mcpmesh/python-runtime
  pullPolicy: IfNotPresent
  # Minor version tag tracks latest patch (0.8 → 0.8.x)
  tag: "3.0"

# Pull secrets for this chart's pods, merged with global.imagePullSecrets
# (deduplicated by name). Standard shape:
#   imagePullSecrets:
#     - name: my-registry-credentials
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

# Pod security context (hardened for Pod Security Standards "restricted").
# Upgrade note: this block is now ALWAYS applied — it was previously gated
# behind the (removed) podSecurityPolicy.enabled flag and never rendered.
# It covers every container in the pod, including user-supplied
# initContainers: an init container that must run as root (e.g. a chown
# image) now fails runAsNonRoot admission — give it its own securityContext
# (per-container settings override the pod level). fsGroup: 999 also changes
# group ownership of mounted volumes, including PVCs from extraVolumes.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999 # mcp-mesh user in the runtime images
  runAsGroup: 999
  fsGroup: 999
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  # false: agents run arbitrary user code — Python writes __pycache__ under
  # /app, runtimes use /tmp, and some agents install dependencies at startup.
  # Set true (plus emptyDir mounts for the paths your agent writes) if your
  # agent image tolerates a read-only root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 999 # mcp-mesh user in the runtime images
  runAsGroup: 999

service:
  type: ClusterIP
  port: 8080 # Standard agent port
  targetPort: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: mcp-agent.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 1
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Registry connection. host left empty defaults to
# "<global.coreReleaseName>-mcp-mesh-registry" (default:
# "mcp-core-mcp-mesh-registry"); an explicit host always wins.
registry:
  host: ""
  port: "8000"

# Mesh configuration
mesh:
  enabled: true
  debug: true
  logLevel: "DEBUG"
  tracingEnabled: true
  metricsEnabled: true

  # TLS configuration for agent-to-registry communication
  tls:
    # TLS mode: off, auto, strict
    mode: ""
    # Credential provider: file (default), spire, vault
    provider: ""
    # Existing secret containing agent cert/key
    certSecret: ""
    certKey: "tls.crt"
    keyKey: "tls.key"
    # Existing secret containing CA certificate
    caSecret: ""
    caKey: "ca.crt"
    # SPIRE workload API socket
    spire:
      enabled: false
      socketPath: "/run/spire/agent/sockets/agent.sock"
    # HashiCorp Vault
    vault:
      enabled: false
      addr: ""
      pkiPath: ""
      # K8s secret containing Vault token
      tokenSecret: ""
      tokenKey: "token"

# Agent-specific configuration
agent:
  # Runtime type (auto-detected from image if empty)
  # Explicit values: "python", "typescript", "java"
  # When set, controls which language-specific env vars are injected
  runtime: ""

  # Container command override (optional)
  # If empty, uses the Docker image's CMD (recommended)
  # Example: ["python", "-m", "myagent"]
  command: []

  # Hostname advertised to registry for service discovery
  # Default: <release>-mcp-mesh-agent.<namespace> (works within same cluster)
  # For multi-namespace: set to <service>.<namespace>.svc.cluster.local
  # For multi-cluster: set to external ingress hostname
  advertisedHost: ""

  # Agent metadata for mesh registration (optional - usually comes from @mesh.agent decorator)
  name: "" # Override agent name (empty = use from script's @mesh.agent decorator)
  version: "1.0.0"
  description: ""

  # Capabilities provided by this agent
  capabilities: []
  # Example:
  # - name: greeting
  #   version: "1.0.0"
  #   description: "Provides greeting functionality"

  # Dependencies required by this agent
  dependencies: []
  # Example:
  # - name: translator
  #   version: ">=1.0.0"
  #   optional: false

  # Health check configuration
  healthCheck:
    enabled: true
    interval: 30
    timeout: 10

  # Retry configuration
  retry:
    attempts: 3
    delay: 5
    maxDelay: 30

  # Performance configuration
  performance:
    timeout: 30
    maxConcurrent: 10
    cacheEnabled: true
    cacheTTL: 300

  # HTTP wrapper configuration
  http:
    enabled: true
    host: "0.0.0.0"
    port: 8080 # Standard K8s agent port (overrides script's http_port)
    cors:
      enabled: true
      origins: ["*"]

  # Observability configuration
  # Default hostnames use the global.coreReleaseName prefix (default: "mcp-core")
  observability:
    distributedTracing:
      enabled: true
      # Full Redis URL for trace publishing. Empty inherits global.redis.*
      # (see the global block above); an explicit value here always wins.
      # When neither is set, the chart default applies:
      #   redis://<global.coreReleaseName>-mcp-mesh-redis:6379
      redisUrl: ""
    # OTLP endpoint for trace export. Empty defaults to
    # "<global.coreReleaseName>-mcp-mesh-tempo:4317".
    telemetryEndpoint: ""
    tracing:
      enabled: true
    metrics:
      enabled: true
# Duplicate registry and mesh sections removed - see lines 85-97 for the main definitions

# ConfigMap for agent code
agentCode:
  # Enable mounting agent code from ConfigMap
  enabled: false
  # ConfigMap name (for external ConfigMap)
  configMapName: ""
  # Script path (for auto-generated ConfigMap from file)
  scriptPath: ""
  # Mount path
  mountPath: "/app/agent"

# Health probe configurations (matches working examples)
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Persistence configuration
persistence:
  enabled: false
  # Storage class name
  storageClass: ""
  # Access mode
  accessMode: ReadWriteOnce
  # Size of the volume
  size: 1Gi
  # Existing PVC to use
  existingClaim: ""
  # Annotations for the PVC
  annotations: {}
  # Mount path
  mountPath: /data
  # Subpath within the volume
  subPath: ""

# Environment variables
env: []
  # - name: CUSTOM_ENV_VAR
  #   value: "custom_value"

# Environment variables from ConfigMaps or Secrets
envFrom: []
  # - configMapRef:
  #     name: special-config
  # - secretRef:
  #     name: special-secret

# Secrets for sensitive data
secrets: {}
  # Example:
  # API_KEY: "your-api-key"
  # DATABASE_PASSWORD: "your-password"

# Existing secret to use
existingSecret: ""

# Duplicate probe sections removed - see lines 211-236 for the main probe definitions

# Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Network policies
networkPolicy:
  enabled: false
  # Namespace allowed to send ingress traffic. Empty = release namespace.
  allowedNamespace: ""
  policyTypes:
    - Ingress
    - Egress
  ingressPorts:
    - protocol: TCP
      port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8080

# Service Monitor for Prometheus
serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  honorLabels: true
  metricRelabelings: []
  relabelings: []

# Pod Monitor for Prometheus
podMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  honorLabels: true
  metricRelabelings: []
  relabelings: []

# Extra volumes and volume mounts
extraVolumes: []
  # - name: extra-volume
  #   secret:
  #     secretName: extra-secret

extraVolumeMounts: []
  # - name: extra-volume
  #   mountPath: /etc/extra
  #   readOnly: true

# Init containers
initContainers: []
  # - name: wait-for-registry
  #   image: busybox:1.35
  #   command: ['sh', '-c', 'until nc -z mcp-mesh-registry 8080; do echo waiting for registry; sleep 2; done;']

# Sidecar containers
sidecarContainers: []
  # - name: logging-sidecar
  #   image: fluent/fluent-bit:1.9
  #   volumeMounts:
  #     - name: varlog
  #       mountPath: /var/log

# Extra labels for all resources
commonLabels: {}
  # team: backend
  # environment: production

# Extra annotations for all resources
commonAnnotations: {}
  # prometheus.io/scrape: "true"
  # prometheus.io/port: "8080"

# Pod topology spread constraints
topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: kubernetes.io/hostname
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels:
  #       app.kubernetes.io/name: mcp-mesh-agent

# Priority class name
priorityClassName: ""

# Note: podSecurityPolicy.enabled was removed (PSP left Kubernetes in 1.25);
# podSecurityContext above is now always applied. A leftover key is ignored.

# Runtime class name (for container runtime selection)
runtimeClassName: ""

# DNS policy
dnsPolicy: ClusterFirst

# DNS config
dnsConfig: {}
  # nameservers:
  #   - 1.1.1.1
  # searches:
  #   - ns1.svc.cluster-domain.example
  #   - my.dns.search.suffix

# Host aliases
hostAliases: []
  # - ip: "127.0.0.1"
  #   hostnames:
  #   - "foo.local"
  #   - "bar.local"

# Termination grace period
terminationGracePeriodSeconds: 30
