{{- if .Values.tempo.enabled }}
{{- /* Migration guard: tempo.securityContext used to be the POD security
       context (it carried fsGroup). It is now the CONTAINER security context
       and pod-level settings live under tempo.podSecurityContext — an old
       override here would put fsGroup in the container context, where the
       API server drops it (losing PVC write access). */}}
{{- range $field := list "fsGroup" "fsGroupChangePolicy" "supplementalGroups" "sysctls" }}
{{- if hasKey ($.Values.tempo.securityContext | default dict) $field }}
{{- fail (printf "tempo.securityContext.%s: tempo.securityContext is now the container security context; pod-only fields (fsGroup, fsGroupChangePolicy, supplementalGroups, sysctls) are invalid there and belong in tempo.podSecurityContext. Move your override there." $field) }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-mesh-tempo.fullname" . }}
  labels:
    {{- include "mcp-mesh-tempo.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mcp-mesh-tempo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-mesh-tempo.selectorLabels" . | nindent 8 }}
    spec:
      {{- with include "mcp-mesh-tempo.imagePullSecrets" . }}
      {{- . | nindent 6 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.tempo.podSecurityContext | nindent 8 }}
      containers:
      - name: tempo
        image: "{{ include "mcp-mesh-tempo.image" . }}"
        imagePullPolicy: {{ .Values.tempo.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.tempo.securityContext | nindent 10 }}
        args:
          - -config.file=/etc/tempo.yaml
        ports:
        - name: http
          containerPort: {{ .Values.tempo.service.ports.http }}
          protocol: TCP
        - name: otlp-grpc
          containerPort: {{ .Values.tempo.service.ports.otlpGrpc }}
          protocol: TCP
        - name: otlp-http
          containerPort: {{ .Values.tempo.service.ports.otlpHttp }}
          protocol: TCP
        - name: grpc
          containerPort: {{ .Values.tempo.service.ports.grpc }}
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/tempo.yaml
          subPath: tempo.yaml
          readOnly: true
        {{- /* /var/tempo (wal/blocks) and /tmp must be writable — always
               volumes since the root filesystem is read-only. */}}
        - name: storage
          mountPath: /var/tempo
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.tempo.resources | nindent 10 }}
      volumes:
      - name: config
        configMap:
          name: {{ include "mcp-mesh-tempo.fullname" . }}-config
      - name: storage
        {{- if .Values.tempo.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "mcp-mesh-tempo.fullname" . }}-pvc
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: tmp
        emptyDir: {}
{{- end }}
