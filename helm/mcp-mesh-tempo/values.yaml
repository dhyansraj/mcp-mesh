tempo:
  enabled: true
  image:
    # Registry prefix for the image. Resolution: this value >
    # global.imageRegistry > "" (Docker Hub). The repository path is
    # preserved (registry: my.registry.internal pulls
    # my.registry.internal/grafana/tempo).
    registry: ""
    repository: grafana/tempo
    tag: "2.9.0"
    pullPolicy: IfNotPresent

  # Pull secrets for this chart's pods, merged with global.imagePullSecrets
  # (deduplicated by name). Standard shape:
  #   imagePullSecrets:
  #     - name: my-registry-credentials
  imagePullSecrets: []

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

  service:
    type: ClusterIP
    ports:
      http: 3200
      otlpGrpc: 4317
      otlpHttp: 4318
      grpc: 9095

  config:
    # References observability/tempo/tempo.yaml configuration
    server:
      httpListenPort: 3200
      grpcListenPort: 9095

    storage:
      backend: local
      walPath: /var/tempo/wal
      blocksPath: /var/tempo/blocks

    metricsGenerator:
      enabled: true
      prometheusUrl: "http://prometheus:9090/api/v1/write"

    # Retention settings
    retention: "1h"
    blockDuration: "5m"

  # Pod security context (hardened for Pod Security Standards "restricted").
  # Renamed: this key was previously called securityContext (which is now the
  # container security context below) — templating fails with a migration
  # message if an old-shaped override still carries pod-level fields there.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault

  # Container security context. readOnlyRootFilesystem works because tempo
  # only writes under /var/tempo (wal/blocks — PVC or emptyDir) and /tmp
  # (emptyDir).
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
