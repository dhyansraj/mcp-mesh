replicaCount: 1

image:
  repository: mcpmesh/ui
  pullPolicy: IfNotPresent
  tag: "2.4"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 3080
  targetPort: 3080

ui:
  port: "3080"
  registryURL: "http://mcp-mesh-registry:8000"
  logLevel: "INFO"
  # Base path for path-based ingress routing.
  # Default: /ops/dashboard (matches the published mcpmesh/ui image).
  # To use a different path, build a custom image:
  #   docker build --build-arg UI_BASE_PATH=/my/path
  #     -f packaging/docker/ui-custom.Dockerfile -t mcpmesh/ui:custom .
  # Your reverse proxy must forward the full path (no prefix stripping):
  #   proxy_pass http://ui-service:3080;  (NOT http://ui-service:3080/)
  basePath: "/ops/dashboard"
  database:
    # Full PostgreSQL DSN. When empty, the URL is composed from
    # global.postgres.* (the mcp-mesh-core umbrella shares one block with
    # every datastore consumer — host/port/name/username/password/sslmode,
    # existingSecret and auto-generated-secret modes included); an explicit
    # value here always wins.
    #
    # When neither is set, a credential-less placeholder renders so the chart
    # stays lintable, but it cannot authenticate anywhere — the UI fails fast
    # at startup until a real DSN is configured:
    #   postgresql://mcp_mesh_readonly@mcp-mesh-postgres:5432/mcpmesh?sslmode=disable
    #
    # The UI only reads — for production, point this at a dedicated read-only
    # role instead of the registry's read-write credential. The role is not
    # provisioned by any chart; create it once against the registry database:
    #   CREATE ROLE mcp_mesh_readonly LOGIN PASSWORD '<password>';
    #   GRANT CONNECT ON DATABASE mcpmesh TO mcp_mesh_readonly;
    #   GRANT USAGE ON SCHEMA public TO mcp_mesh_readonly;
    #   GRANT SELECT ON ALL TABLES IN SCHEMA public TO mcp_mesh_readonly;
    #   ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO mcp_mesh_readonly;
    url: ""
  tracing:
    enabled: true
  redis:
    # Full Redis URL. When empty, composed from global.redis.* (rediss:// when
    # global.redis.tls.enabled); an explicit value here always wins. When
    # neither is set, the chart default applies: redis://mcp-mesh-redis:6379
    url: ""
  tempo:
    url: "http://mcp-mesh-tempo:3200"
    telemetryEndpoint: "mcp-mesh-tempo:4317"

  # Per-service TLS configuration
  # Each service connection can use its own CA, client cert, and key
  tls:
    # TLS for UI → Registry proxy connection
    registry:
      # Existing secret containing TLS certificates
      # Secret should contain ca.crt, tls.crt, tls.key as applicable
      secretName: ""
      caKey: "ca.crt"
      certKey: "tls.crt"
      keyKey: "tls.key"
      skipVerify: false
    # TLS for Redis connection
    redis:
      secretName: ""
      caKey: "ca.crt"
      certKey: "tls.crt"
      keyKey: "tls.key"
      skipVerify: false
    # TLS for Tempo HTTP query connection
    tempo:
      secretName: ""
      caKey: "ca.crt"
      certKey: "tls.crt"
      keyKey: "tls.key"
      skipVerify: false
    # TLS for OTLP/telemetry exporter connection
    telemetry:
      secretName: ""
      caKey: "ca.crt"
      certKey: "tls.crt"
      keyKey: "tls.key"
      skipVerify: false

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
