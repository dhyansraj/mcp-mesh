replicaCount: 1

image:
  repository: mcpmesh/ui
  pullPolicy: IfNotPresent
  tag: "1.1"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 3080
  targetPort: 3080

ui:
  port: "3080"
  registryURL: "http://mcp-mesh-registry:8000"
  logLevel: "INFO"
  database:
    # Override with a read-only database credential for production
    url: "postgresql://mcp_mesh_readonly:changeme@mcp-mesh-postgres:5432/mcp_mesh_registry?sslmode=disable"
  tracing:
    enabled: true
  redis:
    url: "redis://mcp-mesh-redis:6379"
  tempo:
    url: "http://mcp-mesh-tempo:3200"
    telemetryEndpoint: "mcp-mesh-tempo:4317"

  # Per-service TLS configuration
  # Each service connection can use its own CA, client cert, and key
  tls:
    # TLS for UI → Registry proxy connection
    registry:
      # Existing secret containing TLS certificates
      # Secret should contain ca.crt, tls.crt, tls.key as applicable
      secretName: ""
      caKey: "ca.crt"
      certKey: "tls.crt"
      keyKey: "tls.key"
      skipVerify: false
    # TLS for Redis connection
    redis:
      secretName: ""
      caKey: "ca.crt"
      certKey: "tls.crt"
      keyKey: "tls.key"
      skipVerify: false
    # TLS for Tempo HTTP query connection
    tempo:
      secretName: ""
      caKey: "ca.crt"
      certKey: "tls.crt"
      keyKey: "tls.key"
      skipVerify: false
    # TLS for OTLP/telemetry exporter connection
    telemetry:
      secretName: ""
      caKey: "ca.crt"
      certKey: "tls.crt"
      keyKey: "tls.key"
      skipVerify: false

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
