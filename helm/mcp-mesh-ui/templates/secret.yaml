apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-mesh-ui.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-mesh-ui.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.ui.database.url | quote }}
  REDIS_URL: {{ .Values.ui.redis.url | quote }}
