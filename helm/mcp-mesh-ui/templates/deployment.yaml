{{- $gpg := include "mcp-mesh-ui.globalPostgres" . | fromJson -}}
{{- $gredis := include "mcp-mesh-ui.globalRedis" . | fromJson -}}
{{- $dbExisting := include "mcp-mesh-ui.databaseExistingSecret" . -}}
{{- /* urlKey/passwordKey modes only apply to a user-supplied
       global.postgres.existingSecret; the auto-generated secret carries a
       bare "password" key, so stray keys set without their existingSecret
       must not select DSN mode or a key that does not exist. */ -}}
{{- $dbUrlKey := "" -}}
{{- $dbPasswordKey := "password" -}}
{{- if $gpg.existingSecret -}}
{{- $dbUrlKey = $gpg.existingSecretUrlKey | default "" -}}
{{- $dbPasswordKey = $gpg.existingSecretPasswordKey | default "password" -}}
{{- end -}}
{{- $redisExisting := include "mcp-mesh-ui.redisExistingSecret" . -}}
{{- $pgCaSecret := ($gpg.tls | default dict).caSecret | default "" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-mesh-ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-mesh-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mcp-mesh-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if include "mcp-mesh-ui.secretEnabled" . }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "mcp-mesh-ui.selectorLabels" . | nindent 8 }}
    spec:
      {{- with include "mcp-mesh-ui.imagePullSecrets" . }}
      {{- . | nindent 6 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ include "mcp-mesh-ui.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            {{- if $dbExisting }}
            {{- if $dbUrlKey }}
            {{- /* Full DSN from the existing secret, consumed directly — no
                   composition, so the credentials need no URL-safety. The DSN
                   must carry its own sslmode/sslrootcert params. */}}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $dbExisting }}
                  key: {{ $dbUrlKey }}
            {{- else }}
            {{- /* Composed via $(DATABASE_PASSWORD) expansion — DATABASE_PASSWORD
                   must be rendered above this entry. */}}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $dbExisting }}
                  key: {{ $dbPasswordKey }}
            - name: DATABASE_URL
              value: {{ include "mcp-mesh-ui.composedDatabaseURL" . | quote }}
            {{- end }}
            {{- end }}
            {{- if $redisExisting }}
            {{- if $gredis.existingSecretUrlKey }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $redisExisting }}
                  key: {{ $gredis.existingSecretUrlKey }}
            {{- else }}
            {{- /* Password from the existing secret must be URL-safe: it is
                   interpolated into REDIS_URL via $(REDIS_PASSWORD) without
                   URL-encoding. */}}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $redisExisting }}
                  key: {{ $gredis.existingSecretPasswordKey | default "redis-password" }}
            - name: REDIS_URL
              value: {{ include "mcp-mesh-ui.composedRedisURL" . | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.ui.tls.registry.secretName }}
            - name: MCP_MESH_REGISTRY_TLS_CA
              value: /etc/service-tls/registry/{{ .Values.ui.tls.registry.caKey }}
            {{- if .Values.ui.tls.registry.certKey }}
            - name: MCP_MESH_REGISTRY_TLS_CERT
              value: /etc/service-tls/registry/{{ .Values.ui.tls.registry.certKey }}
            {{- end }}
            {{- if .Values.ui.tls.registry.keyKey }}
            - name: MCP_MESH_REGISTRY_TLS_KEY
              value: /etc/service-tls/registry/{{ .Values.ui.tls.registry.keyKey }}
            {{- end }}
            {{- if .Values.ui.tls.registry.skipVerify }}
            - name: MCP_MESH_REGISTRY_TLS_SKIP_VERIFY
              value: "true"
            {{- end }}
            {{- end }}
            {{- if .Values.ui.tls.redis.secretName }}
            - name: REDIS_TLS_CA
              value: /etc/service-tls/redis/{{ .Values.ui.tls.redis.caKey }}
            {{- if .Values.ui.tls.redis.certKey }}
            - name: REDIS_TLS_CERT
              value: /etc/service-tls/redis/{{ .Values.ui.tls.redis.certKey }}
            {{- end }}
            {{- if .Values.ui.tls.redis.keyKey }}
            - name: REDIS_TLS_KEY
              value: /etc/service-tls/redis/{{ .Values.ui.tls.redis.keyKey }}
            {{- end }}
            {{- if .Values.ui.tls.redis.skipVerify }}
            - name: REDIS_TLS_SKIP_VERIFY
              value: "true"
            {{- end }}
            {{- end }}
            {{- if .Values.ui.tls.tempo.secretName }}
            - name: TEMPO_TLS_CA
              value: /etc/service-tls/tempo/{{ .Values.ui.tls.tempo.caKey }}
            {{- if .Values.ui.tls.tempo.certKey }}
            - name: TEMPO_TLS_CERT
              value: /etc/service-tls/tempo/{{ .Values.ui.tls.tempo.certKey }}
            {{- end }}
            {{- if .Values.ui.tls.tempo.keyKey }}
            - name: TEMPO_TLS_KEY
              value: /etc/service-tls/tempo/{{ .Values.ui.tls.tempo.keyKey }}
            {{- end }}
            {{- if .Values.ui.tls.tempo.skipVerify }}
            - name: TEMPO_TLS_SKIP_VERIFY
              value: "true"
            {{- end }}
            {{- end }}
            {{- if .Values.ui.tls.telemetry.secretName }}
            - name: TELEMETRY_TLS_CA
              value: /etc/service-tls/telemetry/{{ .Values.ui.tls.telemetry.caKey }}
            {{- if .Values.ui.tls.telemetry.certKey }}
            - name: TELEMETRY_TLS_CERT
              value: /etc/service-tls/telemetry/{{ .Values.ui.tls.telemetry.certKey }}
            {{- end }}
            {{- if .Values.ui.tls.telemetry.keyKey }}
            - name: TELEMETRY_TLS_KEY
              value: /etc/service-tls/telemetry/{{ .Values.ui.tls.telemetry.keyKey }}
            {{- end }}
            {{- if .Values.ui.tls.telemetry.skipVerify }}
            - name: TELEMETRY_TLS_SKIP_VERIFY
              value: "true"
            {{- end }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "mcp-mesh-ui.fullname" . }}-config
            {{- if include "mcp-mesh-ui.secretEnabled" . }}
            - secretRef:
                name: {{ include "mcp-mesh-ui.fullname" . }}-secret
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.ui.basePath }}/api/ui-health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: {{ .Values.ui.basePath }}/api/ui-health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if $pgCaSecret }}
            - name: tls-postgres
              mountPath: /etc/service-tls/postgres
              readOnly: true
            {{- end }}
            {{- if .Values.ui.tls.registry.secretName }}
            - name: tls-registry
              mountPath: /etc/service-tls/registry
              readOnly: true
            {{- end }}
            {{- if .Values.ui.tls.redis.secretName }}
            - name: tls-redis
              mountPath: /etc/service-tls/redis
              readOnly: true
            {{- end }}
            {{- if .Values.ui.tls.tempo.secretName }}
            - name: tls-tempo
              mountPath: /etc/service-tls/tempo
              readOnly: true
            {{- end }}
            {{- if .Values.ui.tls.telemetry.secretName }}
            - name: tls-telemetry
              mountPath: /etc/service-tls/telemetry
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if $pgCaSecret }}
        - name: tls-postgres
          secret:
            secretName: {{ $pgCaSecret }}
            defaultMode: 0440
        {{- end }}
        {{- if .Values.ui.tls.registry.secretName }}
        - name: tls-registry
          secret:
            secretName: {{ .Values.ui.tls.registry.secretName }}
            defaultMode: 0440
        {{- end }}
        {{- if .Values.ui.tls.redis.secretName }}
        - name: tls-redis
          secret:
            secretName: {{ .Values.ui.tls.redis.secretName }}
            defaultMode: 0440
        {{- end }}
        {{- if .Values.ui.tls.tempo.secretName }}
        - name: tls-tempo
          secret:
            secretName: {{ .Values.ui.tls.tempo.secretName }}
            defaultMode: 0440
        {{- end }}
        {{- if .Values.ui.tls.telemetry.secretName }}
        - name: tls-telemetry
          secret:
            secretName: {{ .Values.ui.tls.telemetry.secretName }}
            defaultMode: 0440
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
