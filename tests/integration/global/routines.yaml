# Global Routines - Available to all tests
# Reference as: global.routine_name or just routine_name
#
# IMPORTANT: These routines assume tsuite-mesh image is used (from lib-tests or src-tests)
# The image must have pre-installed: meshctl, node, mesh module
# If any prerequisite is missing, tests will fail immediately.

routines:
  #############################################################################
  # PREREQUISITE CHECKS
  # These verify the image has required tools - fail fast if not
  #############################################################################

  # Verify meshctl is installed
  check_meshctl:
    description: "Verify meshctl CLI is available"
    steps:
      - handler: shell
        command: |
          if ! command -v meshctl &> /dev/null; then
            echo "ERROR: meshctl not found in image"
            echo "Use tsuite-mesh image from lib-tests or src-tests"
            exit 1
          fi
          meshctl --version
        capture: meshctl_version

  # Verify Node.js is installed
  check_node:
    description: "Verify Node.js is available"
    steps:
      - handler: shell
        command: |
          if ! command -v node &> /dev/null; then
            echo "ERROR: node not found in image"
            echo "Use tsuite-mesh image from lib-tests or src-tests"
            exit 1
          fi
          node --version && npm --version
        capture: node_version

  # Verify mesh module is installed
  check_mesh_module:
    description: "Verify mesh Python module is available"
    steps:
      - handler: shell
        command: |
          python -c "import mesh" 2>/dev/null
          if [ $? -ne 0 ]; then
            echo "ERROR: mesh module not found in image"
            echo "Use tsuite-mesh image from lib-tests or src-tests"
            exit 1
          fi
          python -c "import mesh; print(f'mesh module OK')"
        capture: mesh_check

  # Verify Java is installed
  check_java:
    description: "Verify Java and Maven are available"
    steps:
      - handler: shell
        command: |
          if ! command -v java &> /dev/null; then
            echo "ERROR: java not found in image"
            echo "Use tsuite-mesh image from lib-tests or src-tests"
            exit 1
          fi
          if ! command -v mvn &> /dev/null; then
            echo "ERROR: maven not found in image"
            echo "Use tsuite-mesh image from lib-tests or src-tests"
            exit 1
          fi
          java --version && mvn --version | head -1
        capture: java_version

  #############################################################################
  # PYTHON SETUP
  #############################################################################

  # Create Python virtual environment linked to system mesh module
  setup_python_venv:
    description: "Create .venv in workspace linked to system mesh module"
    steps:
      - handler: shell
        command: |
          cd /workspace
          python -m venv .venv
          # Link to system-installed mesh package
          echo "import sys; sys.path.insert(0, '/usr/local/lib/python3.11/site-packages')" > /workspace/.venv/lib/python3.11/site-packages/mesh.pth
          echo "Created .venv in /workspace (linked to system mesh)"
      - handler: shell
        command: '/workspace/.venv/bin/python -c "import mesh; print(''venv mesh OK'')"'
        capture: venv_check

  # Install pip dependencies from a directory
  install_pip_deps:
    description: "Install Python dependencies for a scaffolded agent"
    params:
      path:
        type: string
        required: true
        description: "Path to agent directory"
    steps:
      - handler: pip-install
        path: ${params.path}
        venv: /workspace/.venv

  #############################################################################
  # JAVA SETUP
  #############################################################################

  # Install Maven dependencies from a directory
  install_maven_deps:
    description: "Run mvn dependency:resolve in a directory"
    params:
      path:
        type: string
        required: true
        description: "Path to directory with pom.xml"
    steps:
      - handler: maven-install
        path: ${params.path}

  #############################################################################
  # NODE.JS SETUP
  #############################################################################

  # Install npm dependencies from a directory
  install_npm_deps:
    description: "Run npm install in a directory"
    params:
      path:
        type: string
        required: true
        description: "Path to directory with package.json"
    steps:
      - handler: npm-install
        path: ${params.path}

  #############################################################################
  # COMBINED SETUP ROUTINES
  #############################################################################

  # Setup for scaffolding tests - just verify prerequisites
  setup_for_scaffold:
    description: "Verify prerequisites for scaffolding tests"
    steps:
      - handler: shell
        command: |
          # Verify meshctl
          if ! command -v meshctl &> /dev/null; then
            echo "ERROR: meshctl not found - use tsuite-mesh image"
            exit 1
          fi
          # Verify node
          if ! command -v node &> /dev/null; then
            echo "ERROR: node not found - use tsuite-mesh image"
            exit 1
          fi
          echo "Prerequisites OK: meshctl=$(meshctl --version 2>&1 | head -1), node=$(node --version)"
        capture: prereq_check

  # Setup for Python agent tests
  setup_for_python_agent:
    description: "Setup for running Python agents"
    steps:
      - handler: shell
        command: |
          # Verify prerequisites
          if ! command -v meshctl &> /dev/null; then
            echo "ERROR: meshctl not found - use tsuite-mesh image"
            exit 1
          fi
          python -c "import mesh" 2>/dev/null || {
            echo "ERROR: mesh module not found - use tsuite-mesh image"
            exit 1
          }
          # Create venv linked to system mesh
          cd /workspace
          python -m venv .venv
          echo "import sys; sys.path.insert(0, '/usr/local/lib/python3.11/site-packages')" > /workspace/.venv/lib/python3.11/site-packages/mesh.pth
          /workspace/.venv/bin/python -c "import mesh; print('Setup complete: mesh module available')"
        capture: setup_result
        timeout: 60
      - handler: shell
        command: "meshctl --version"
        capture: meshctl_version

  # Setup for TypeScript agent tests
  setup_for_typescript_agent:
    description: "Setup for running TypeScript agents"
    steps:
      - handler: shell
        command: |
          # Verify prerequisites
          if ! command -v meshctl &> /dev/null; then
            echo "ERROR: meshctl not found - use tsuite-mesh image"
            exit 1
          fi
          if ! command -v node &> /dev/null; then
            echo "ERROR: node not found - use tsuite-mesh image"
            exit 1
          fi
          echo "Prerequisites OK: meshctl=$(meshctl --version 2>&1 | head -1), node=$(node --version)"
        capture: prereq_check
        timeout: 30
      - handler: shell
        command: "meshctl --version"
        capture: meshctl_version

  # Setup for Java agent tests
  setup_for_java_agent:
    description: "Setup for running Java agents"
    steps:
      - handler: shell
        command: |
          # Verify prerequisites
          if ! command -v meshctl &> /dev/null; then
            echo "ERROR: meshctl not found - use tsuite-mesh image"
            exit 1
          fi
          if ! command -v java &> /dev/null; then
            echo "ERROR: java not found - use tsuite-mesh image"
            exit 1
          fi
          if ! command -v mvn &> /dev/null; then
            echo "ERROR: maven not found - use tsuite-mesh image"
            exit 1
          fi
          # Verify native library is available
          if [ ! -d "/native-libs" ] || [ -z "$(ls /native-libs/libmcp_mesh_core.* 2>/dev/null)" ]; then
            echo "WARNING: native FFI library not found in /native-libs"
          fi
          echo "Prerequisites OK:"
          echo "  meshctl: $(meshctl --version 2>&1 | head -1)"
          echo "  java: $(java --version 2>&1 | head -1)"
          echo "  maven: $(mvn --version 2>&1 | head -1)"
        capture: prereq_check
        timeout: 30
      - handler: shell
        command: "meshctl --version"
        capture: meshctl_version

  #############################################################################
  # LEGACY (for backward compatibility)
  #############################################################################

  # Legacy setup_environment - now just verifies prerequisites
  setup_environment:
    description: "Verify test environment prerequisites"
    params:
      meshctl_version:
        type: string
        required: false # Ignored - version comes from image
    steps:
      - handler: shell
        command: |
          if ! command -v meshctl &> /dev/null; then
            echo "ERROR: meshctl not found - use tsuite-mesh image"
            exit 1
          fi
          if ! command -v node &> /dev/null; then
            echo "ERROR: node not found - use tsuite-mesh image"
            exit 1
          fi
          echo "Environment OK"
          meshctl --version
        capture: meshctl_version
        timeout: 30

  #############################################################################
  # UTILITIES
  #############################################################################

  # Cleanup workspace
  cleanup_workspace:
    description: "Remove all files from workspace directory"
    steps:
      - handler: shell
        command: "rm -rf /workspace/* /workspace/.* 2>/dev/null || true"
        ignore_errors: true

  # Verify expected files exist
  verify_files_exist:
    description: "Check that all expected files exist"
    params:
      files:
        type: string
        required: true
        description: "Space-separated list of file paths"
    steps:
      - handler: shell
        command: |
          for f in ${params.files}; do
            if [ ! -e "$f" ]; then
              echo "Missing: $f"
              exit 1
            fi
            echo "Found: $f"
          done

  #############################################################################
  # OBSERVABILITY
  # Redis + Tempo for distributed tracing tests
  #############################################################################

  # Start observability services (Redis + Tempo)
  start_observability:
    description: "Start Redis and Tempo for distributed tracing"
    steps:
      - handler: shell
        command: |
          echo "Starting Redis..."
          redis-server --daemonize yes --port 6379
          sleep 1
          redis-cli ping || { echo "ERROR: Redis not responding"; exit 1; }
          echo "Redis started"

          echo "Starting Tempo..."
          mkdir -p /var/tempo
          tempo -config.file=/etc/tempo/tempo.yaml > /var/log/tempo.log 2>&1 &

          # Wait for Tempo to become ready (ingester needs ~15-20s to stabilize)
          echo "Waiting for Tempo to become ready..."
          for i in $(seq 1 30); do
            if wget -q --spider http://localhost:3200/ready 2>/dev/null; then
              echo "Tempo ready after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "ERROR: Tempo not ready after 30s"
              cat /var/log/tempo.log
              exit 1
            fi
            sleep 1
          done

          echo "Observability services started:"
          echo "  Redis: localhost:6379"
          echo "  Tempo OTLP gRPC: localhost:4317"
          echo "  Tempo OTLP HTTP: localhost:4318"
          echo "  Tempo API: localhost:3200"
        capture: observability_start
        timeout: 60

  # Stop observability services
  stop_observability:
    description: "Stop Redis and Tempo services"
    steps:
      - handler: shell
        command: |
          echo "Stopping observability services..."
          redis-cli shutdown 2>/dev/null || true
          pkill -f tempo 2>/dev/null || true
          echo "Observability services stopped"
        capture: observability_stop
        ignore_errors: true

  # Check observability services status
  check_observability:
    description: "Check if Redis and Tempo are running"
    steps:
      - handler: shell
        command: |
          REDIS_OK=false
          TEMPO_OK=false

          redis-cli ping > /dev/null 2>&1 && REDIS_OK=true
          wget -q --spider http://localhost:3200/ready 2>/dev/null && TEMPO_OK=true

          echo "Redis: $REDIS_OK"
          echo "Tempo: $TEMPO_OK"

          if [ "$REDIS_OK" = "true" ] && [ "$TEMPO_OK" = "true" ]; then
            echo "STATUS: OK"
          else
            echo "STATUS: INCOMPLETE"
            exit 1
          fi
        capture: observability_status

  #############################################################################
  # VAULT PKI
  # HashiCorp Vault for credential provider tests
  #############################################################################

  # Start Vault dev server and configure PKI secrets engine
  start_vault_pki:
    description: "Start Vault in dev mode and configure PKI for mesh agent certs"
    steps:
      - handler: shell
        command: |
          echo "Starting Vault dev server..."
          vault server -dev -dev-root-token-id=root -dev-listen-address=127.0.0.1:8200 > /var/log/vault.log 2>&1 &
          echo $! > /tmp/vault.pid
          export VAULT_ADDR=http://127.0.0.1:8200
          export VAULT_TOKEN=root

          # Wait for Vault to be ready
          for i in $(seq 1 15); do
            if vault status > /dev/null 2>&1; then
              echo "Vault ready after ${i}s"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "ERROR: Vault not ready after 15s"
              cat /var/log/vault.log
              exit 1
            fi
            sleep 1
          done

          # Enable PKI secrets engine (root CA)
          vault secrets enable pki
          vault secrets tune -max-lease-ttl=87600h pki

          # Generate root CA
          vault write -format=json pki/root/generate/internal \
            common_name="MCP Mesh Root CA" ttl=87600h > /tmp/vault_root_ca.json
          curl -s http://127.0.0.1:8200/v1/pki/ca/pem > /tmp/vault-root-ca.pem
          echo "Root CA generated"

          # Enable intermediate PKI
          vault secrets enable -path=pki_int pki
          vault secrets tune -max-lease-ttl=43800h pki_int

          # Generate intermediate CSR and sign with root
          vault write -format=json pki_int/intermediate/generate/internal \
            common_name="MCP Mesh Intermediate CA" ttl=43800h > /tmp/vault_int_csr.json
          jq -r '.data.csr' /tmp/vault_int_csr.json > /tmp/vault_int.csr

          vault write -format=json pki/root/sign-intermediate \
            csr=@/tmp/vault_int.csr format=pem_bundle ttl=43800h > /tmp/vault_int_signed.json
          jq -r '.data.certificate' /tmp/vault_int_signed.json > /tmp/vault_int_signed.pem

          vault write pki_int/intermediate/set-signed certificate=@/tmp/vault_int_signed.pem

          # Create role for mesh agents (allows subdomains of mcp-mesh.local + IP SANs)
          vault write pki_int/roles/mesh-agent \
            allowed_domains="mcp-mesh.local" \
            allow_subdomains=true \
            allow_localhost=true \
            allow_ip_sans=true \
            max_ttl=720h

          # Create role for mesh registry
          vault write pki_int/roles/mesh-registry \
            allowed_domains="localhost,mcp-mesh.local" \
            allow_subdomains=true \
            allow_localhost=true \
            allow_ip_sans=true \
            max_ttl=720h

          # Create trust directory with CA chain
          mkdir -p /tmp/vault-trust
          curl -s http://127.0.0.1:8200/v1/pki_int/ca/pem > /tmp/vault-trust/int-ca.pem
          curl -s http://127.0.0.1:8200/v1/pki/ca/pem > /tmp/vault-trust/root-ca.pem
          cat /tmp/vault-trust/int-ca.pem > /tmp/vault-trust/ca-chain.pem
          echo "" >> /tmp/vault-trust/ca-chain.pem
          cat /tmp/vault-trust/root-ca.pem >> /tmp/vault-trust/ca-chain.pem

          # Issue registry server cert
          vault write -format=json pki_int/issue/mesh-registry \
            common_name="localhost" ip_sans="127.0.0.1" alt_names="localhost" ttl=24h > /tmp/vault_registry_cert.json
          jq -r '.data.certificate' /tmp/vault_registry_cert.json > /tmp/vault-registry-cert.pem
          # Append CA chain to registry cert for full chain
          jq -r '.data.ca_chain[]' /tmp/vault_registry_cert.json >> /tmp/vault-registry-cert.pem
          jq -r '.data.private_key' /tmp/vault_registry_cert.json > /tmp/vault-registry-key.pem

          echo "Vault PKI configured:"
          echo "  Vault: http://127.0.0.1:8200"
          echo "  Root CA: /tmp/vault-trust/root-ca.pem"
          echo "  Int CA: /tmp/vault-trust/int-ca.pem"
          echo "  CA chain: /tmp/vault-trust/ca-chain.pem"
          echo "  Registry cert: /tmp/vault-registry-cert.pem"
          echo "  Registry key: /tmp/vault-registry-key.pem"
          echo "  Agent role: pki_int/issue/mesh-agent"
          echo "VAULT_PKI_READY=true"
        capture: vault_start
        timeout: 60

  # Stop Vault dev server
  stop_vault:
    description: "Stop Vault dev server and clean up"
    steps:
      - handler: shell
        command: |
          if [ -f /tmp/vault.pid ]; then
            kill $(cat /tmp/vault.pid) 2>/dev/null || true
            rm -f /tmp/vault.pid
          fi
          pkill -f "vault server" 2>/dev/null || true
          rm -rf /tmp/vault-trust /tmp/vault_*.json /tmp/vault_*.csr /tmp/vault_*.pem /tmp/vault-registry-*.pem
          echo "Vault stopped and cleaned up"
        capture: vault_stop
        ignore_errors: true

  #############################################################################
  # SPIRE WORKLOAD IDENTITY
  # SPIRE server + agent for X.509-SVID workload identity tests
  #############################################################################

  # Start SPIRE server + agent for workload identity tests
  start_spire:
    description: "Start SPIRE server and agent, register mesh workloads"
    steps:
      - handler: shell
        command: |
          echo "=== Starting SPIRE infrastructure ==="

          # Create config directories
          mkdir -p /tmp/spire/server /tmp/spire/agent /var/run/spire

          # Write SPIRE server config
          cat > /tmp/spire/server/server.conf << 'SERVERCONF'
          server {
              bind_address = "127.0.0.1"
              bind_port = "8081"
              trust_domain = "mcp-mesh.local"
              data_dir = "/tmp/spire/server/data"
              log_level = "WARN"
              ca_ttl = "24h"
              default_x509_svid_ttl = "1h"
          }
          plugins {
              DataStore "sql" {
                  plugin_data {
                      database_type = "sqlite3"
                      connection_string = "/tmp/spire/server/data/datastore.sqlite3"
                  }
              }
              NodeAttestor "join_token" {
                  plugin_data {}
              }
              KeyManager "memory" {
                  plugin_data {}
              }
          }
          SERVERCONF

          # Write SPIRE agent config
          cat > /tmp/spire/agent/agent.conf << 'AGENTCONF'
          agent {
              data_dir = "/tmp/spire/agent/data"
              log_level = "WARN"
              server_address = "127.0.0.1"
              server_port = "8081"
              trust_domain = "mcp-mesh.local"
              socket_path = "/var/run/spire/agent.sock"
              insecure_bootstrap = true
          }
          plugins {
              NodeAttestor "join_token" {
                  plugin_data {}
              }
              KeyManager "memory" {
                  plugin_data {}
              }
              WorkloadAttestor "unix" {
                  plugin_data {}
              }
          }
          AGENTCONF

          mkdir -p /tmp/spire/server/data /tmp/spire/agent/data

          # Start SPIRE server
          echo "Starting SPIRE server..."
          spire-server run -config /tmp/spire/server/server.conf > /tmp/spire/server.log 2>&1 &
          echo $! > /tmp/spire/server.pid

          # Wait for server to be ready
          for i in $(seq 1 15); do
            if spire-server healthcheck -socketPath /tmp/spire-server/private/api.sock 2>/dev/null; then
              echo "SPIRE server ready after ${i}s"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "ERROR: SPIRE server not ready after 15s"
              cat /tmp/spire/server.log
              exit 1
            fi
            sleep 1
          done

          # Generate join token for agent
          JOIN_TOKEN=$(spire-server token generate \
            -socketPath /tmp/spire-server/private/api.sock \
            -spiffeID spiffe://mcp-mesh.local/agent \
            -ttl 3600 | awk '{print $2}')
          echo "Join token generated (${#JOIN_TOKEN} chars)"

          # Register mesh workloads BEFORE starting agent
          echo "Registering mesh workloads..."
          spire-server entry create \
            -socketPath /tmp/spire-server/private/api.sock \
            -parentID spiffe://mcp-mesh.local/agent \
            -spiffeID spiffe://mcp-mesh.local/mesh-registry \
            -selector unix:uid:0 \
            -x509SVIDTTL 3600 2>&1 || echo "Registry entry create failed"

          spire-server entry create \
            -socketPath /tmp/spire-server/private/api.sock \
            -parentID spiffe://mcp-mesh.local/agent \
            -spiffeID spiffe://mcp-mesh.local/mesh-agent \
            -selector unix:uid:0 \
            -x509SVIDTTL 3600 2>&1 || echo "Agent entry create failed"

          echo "Verifying entries..."
          spire-server entry show -socketPath /tmp/spire-server/private/api.sock 2>&1

          # Start SPIRE agent with join token
          echo "Starting SPIRE agent..."
          spire-agent run \
            -config /tmp/spire/agent/agent.conf \
            -joinToken "$JOIN_TOKEN" > /tmp/spire/agent.log 2>&1 &
          echo $! > /tmp/spire/agent.pid

          # Wait for agent socket to appear
          echo "Waiting for SPIRE agent socket..."
          for i in $(seq 1 20); do
            if [ -S /var/run/spire/agent.sock ]; then
              echo "SPIRE agent ready after ${i}s"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "ERROR: SPIRE agent socket not ready after 20s"
              cat /tmp/spire/agent.log
              exit 1
            fi
            sleep 1
          done

          # Verify we can fetch an SVID
          echo "Verifying SVID fetch..."
          spire-agent api fetch x509 -socketPath /var/run/spire/agent.sock -write /tmp/spire/test-svid 2>&1 || true
          if [ -f /tmp/spire/test-svid/svid.0.pem ]; then
            echo "SVID fetch verified"
            rm -rf /tmp/spire/test-svid
          else
            echo "WARNING: Could not verify SVID fetch (may work for actual workloads)"
          fi

          echo "SPIRE_READY=true"
          echo "  Server PID: $(cat /tmp/spire/server.pid)"
          echo "  Agent PID: $(cat /tmp/spire/agent.pid)"
          echo "  Socket: /var/run/spire/agent.sock"
          echo "  Trust domain: mcp-mesh.local"
        capture: spire_start
        timeout: 60

  # Stop SPIRE server and agent
  stop_spire:
    description: "Stop SPIRE server and agent, clean up"
    steps:
      - handler: shell
        command: |
          kill $(cat /tmp/spire/agent.pid 2>/dev/null) 2>/dev/null || true
          kill $(cat /tmp/spire/server.pid 2>/dev/null) 2>/dev/null || true
          pkill -f "spire-server" 2>/dev/null || true
          pkill -f "spire-agent" 2>/dev/null || true
          rm -rf /tmp/spire /var/run/spire
          echo "SPIRE stopped and cleaned up"
        capture: spire_stop
        ignore_errors: true
