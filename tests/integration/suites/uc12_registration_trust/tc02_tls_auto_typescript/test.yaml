name: "TLS Auto - TypeScript Agent Registration"
description: "Verify TypeScript agents register with mTLS and entity_id is set"
tags:
  - registration-trust
  - tls
  - typescript
timeout: 300

pre_run:
  - routine: global.setup_for_typescript_agent
    params:
      meshctl_version: "${config.packages.cli_version}"

test:
  - name: "Copy TypeScript greeter to workspace"
    handler: shell
    command: |
      cp -rL /uc-artifacts/ts-greeter /workspace/ts-greeter
      ls -la /workspace/ts-greeter/
    capture: copy_output

  - name: "Install TypeScript dependencies"
    handler: npm-install
    path: /workspace/ts-greeter

  - name: "Start registry with TLS auto and TypeScript agent"
    handler: shell
    command: "meshctl start ts-greeter/index.ts --tls-auto -d"
    workdir: /workspace
    capture: ts_start

  - name: "Wait for TypeScript agent to register"
    handler: wait
    seconds: 10

  - name: "Check agent registered with entity_id"
    handler: shell
    command: |
      meshctl list 2>&1
    workdir: /workspace
    capture: list_output

  - name: "Query registry API for entity_id"
    handler: shell
    command: |
      curl -sk https://localhost:8000/agents 2>&1
    capture: api_output

  - name: "Call greet tool"
    handler: shell
    command: |
      meshctl call greeter-ts:greet '{"name":"TLSTest"}' 2>&1
    workdir: /workspace
    capture: call_output

  - name: "Stop all"
    handler: shell
    command: "meshctl stop 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true

assertions:
  - expr: "${captured.list_output} contains 'greeter-ts'"
    message: "TypeScript greeter should be registered"

  - expr: "${captured.list_output} contains 'https://'"
    message: "Registry URL should show HTTPS"

  - expr: "${captured.api_output} contains 'local-dev'"
    message: "API response should include entity_id from mTLS cert"

  - expr: "${captured.call_output} contains 'Hello'"
    message: "Tool call should succeed over mTLS"

post_run:
  - handler: shell
    command: "meshctl stop 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true
  - routine: global.cleanup_workspace
