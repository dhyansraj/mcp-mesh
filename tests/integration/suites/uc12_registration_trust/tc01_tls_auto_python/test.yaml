name: "TLS Auto - Python Agent Registration"
description: "Verify Python agents register with mTLS and entity_id is set"
tags:
  - registration-trust
  - tls
  - python
timeout: 300

pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"

test:
  - name: "Copy Python agents to workspace"
    handler: shell
    command: |
      cp /uc-artifacts/py-system-agent /workspace/system_agent.py
      cp /uc-artifacts/py-hello-world /workspace/hello_world.py
      ls -la /workspace/
    capture: copy_output

  - name: "Start registry with TLS auto and system agent"
    handler: shell
    command: "meshctl start system_agent.py --tls-auto -d"
    workdir: /workspace
    capture: system_start

  - name: "Wait for system agent to register"
    handler: wait
    seconds: 10

  - name: "Start hello world agent with TLS auto"
    handler: shell
    command: "meshctl start hello_world.py --tls-auto -d"
    workdir: /workspace
    capture: hello_start

  - name: "Wait for hello world to register and resolve deps"
    handler: wait
    seconds: 10

  - name: "Check agents registered with entity_id"
    handler: shell
    command: |
      meshctl list 2>&1
    workdir: /workspace
    capture: list_output

  - name: "Query registry API for entity_id"
    handler: shell
    command: |
      curl -sk https://localhost:8000/agents 2>&1
    capture: api_output

  - name: "Call hello_mesh_simple (depends on date_service)"
    handler: shell
    command: |
      meshctl call hello:hello_mesh_simple '{}' 2>&1
    workdir: /workspace
    capture: call_output

  - name: "Stop all"
    handler: shell
    command: "meshctl stop 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true

assertions:
  - expr: "${captured.list_output} contains 'system-agent'"
    message: "System agent should be registered"

  - expr: "${captured.list_output} contains 'hello-world'"
    message: "Hello world agent should be registered"

  - expr: "${captured.list_output} contains 'https://'"
    message: "Registry URL should show HTTPS"

  - expr: "${captured.api_output} contains 'local-dev'"
    message: "API response should include entity_id from mTLS cert"

  - expr: "${captured.call_output} contains 'Hello from MCP Mesh'"
    message: "Tool call should succeed over mTLS"

  - expr: "${captured.call_output} not contains 'not available'"
    message: "Date service dependency should be resolved"

post_run:
  - handler: shell
    command: "meshctl stop 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true
  - routine: global.cleanup_workspace
