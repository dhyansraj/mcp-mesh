name: "Vault PKI - Python Agent Registration"
description: "Verify Python agents can register using Vault-issued TLS certificates via MCP_MESH_TLS_PROVIDER=vault"
tags:
  - registration-trust
  - vault
  - python
timeout: 300

pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"

test:
  - name: "Copy Python agents to workspace"
    handler: shell
    command: |
      cp /uc-artifacts/py-system-agent /workspace/system_agent.py
      ls -la /workspace/
    capture: copy_output

  - name: "Start Vault and configure PKI"
    handler: shell
    command: |
      echo "Starting Vault dev server..."
      vault server -dev -dev-root-token-id=root -dev-listen-address=127.0.0.1:8200 > /var/log/vault.log 2>&1 &
      echo $! > /tmp/vault.pid
      export VAULT_ADDR=http://127.0.0.1:8200
      export VAULT_TOKEN=root

      for i in $(seq 1 15); do
        if vault status > /dev/null 2>&1; then
          echo "Vault ready after ${i}s"
          break
        fi
        sleep 1
      done

      # Quick PKI setup
      vault secrets enable pki
      vault write -format=json pki/root/generate/internal common_name="MCP Mesh Root CA" ttl=87600h > /dev/null
      vault secrets enable -path=pki_int pki
      CSR=$(vault write -format=json pki_int/intermediate/generate/internal common_name="MCP Mesh Intermediate CA" ttl=43800h | jq -r '.data.csr')
      SIGNED=$(vault write -format=json pki/root/sign-intermediate csr="$CSR" format=pem_bundle ttl=43800h | jq -r '.data.certificate')
      echo "$SIGNED" | vault write pki_int/intermediate/set-signed certificate=-
      vault write pki_int/roles/mesh-agent allowed_domains="mcp-mesh.local" allow_subdomains=true allow_ip_sans=true allow_localhost=true max_ttl=720h
      vault write pki_int/roles/mesh-registry allowed_domains="localhost,mcp-mesh.local" allow_subdomains=true allow_ip_sans=true allow_localhost=true max_ttl=720h

      # Create trust dir + registry cert
      mkdir -p /tmp/vault-trust
      curl -s http://127.0.0.1:8200/v1/pki_int/ca/pem > /tmp/vault-trust/int-ca.pem
      curl -s http://127.0.0.1:8200/v1/pki/ca/pem > /tmp/vault-trust/root-ca.pem
      cat /tmp/vault-trust/int-ca.pem > /tmp/vault-trust/ca-chain.pem
      echo "" >> /tmp/vault-trust/ca-chain.pem
      cat /tmp/vault-trust/root-ca.pem >> /tmp/vault-trust/ca-chain.pem

      REG_CERT=$(vault write -format=json pki_int/issue/mesh-registry common_name="localhost" ip_sans="127.0.0.1" alt_names="localhost" ttl=24h)
      echo "$REG_CERT" | jq -r '.data.certificate' > /tmp/vault-registry-cert.pem
      echo "$REG_CERT" | jq -r '.data.ca_chain[]' >> /tmp/vault-registry-cert.pem
      echo "$REG_CERT" | jq -r '.data.private_key' > /tmp/vault-registry-key.pem

      echo "VAULT_PKI_READY=true"
    capture: vault_setup
    timeout: 60

  - name: "Start registry with Vault-issued certs and filestore trust"
    handler: shell
    command: |
      MCP_MESH_TLS_MODE=auto \
      MCP_MESH_TRUST_BACKEND=filestore \
      MCP_MESH_TRUST_DIR=/tmp/vault-trust \
      MCP_MESH_TLS_CERT=/tmp/vault-registry-cert.pem \
      MCP_MESH_TLS_KEY=/tmp/vault-registry-key.pem \
      MCP_MESH_TLS_CA=/tmp/vault-trust/ca-chain.pem \
      mcp-mesh-registry -host localhost -port 8000 > /tmp/registry-vault.log 2>&1 &
      echo $! > /tmp/tc12_registry.pid
      sleep 3
      HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost:8000/health)
      echo "REGISTRY_HEALTH=$HTTP_CODE"
    capture: registry_start

  - name: "Start Python agent with Vault credential provider"
    handler: shell
    command: |
      MCP_MESH_REGISTRY_URL=https://localhost:8000 \
      MCP_MESH_TLS_MODE=auto \
      MCP_MESH_TLS_PROVIDER=vault \
      MCP_MESH_VAULT_ADDR=http://127.0.0.1:8200 \
      MCP_MESH_VAULT_PKI_PATH=pki_int/issue/mesh-agent \
      VAULT_TOKEN=root \
      MCP_MESH_TLS_CA=/tmp/vault-trust/ca-chain.pem \
      python system_agent.py > /tmp/agent-vault.log 2>&1 &
      AGENT_PID=$!
      echo $AGENT_PID > /tmp/tc12_agent.pid
      echo "AGENT_PID=$AGENT_PID"
    workdir: /workspace
    capture: agent_start

  - name: "Wait for agent registration"
    handler: wait
    seconds: 15

  - name: "Check agent registered with Vault cert"
    handler: shell
    command: |
      curl -sk https://localhost:8000/agents 2>&1
    capture: agents_json

  - name: "Check agent logs for Vault flow"
    handler: shell
    command: |
      grep -i "vault\|provider.*vault\|certificate.*obtained\|IP SAN\|DNS SAN\|resolving credentials\|mTLS\|heartbeat success" /tmp/agent-vault.log 2>&1 | head -15
    capture: vault_logs

  - name: "Stop all"
    handler: shell
    command: |
      kill $(cat /tmp/tc12_agent.pid 2>/dev/null) 2>/dev/null || true
      kill $(cat /tmp/tc12_registry.pid 2>/dev/null) 2>/dev/null || true
      kill $(cat /tmp/vault.pid 2>/dev/null) 2>/dev/null || true
    ignore_errors: true

assertions:
  - expr: "${captured.vault_setup} contains 'VAULT_PKI_READY=true'"
    message: "Vault PKI should be configured successfully"

  - expr: "${captured.registry_start} contains 'REGISTRY_HEALTH=200'"
    message: "Registry should be healthy with Vault-issued cert"

  - expr: "${captured.agents_json} contains 'system-agent'"
    message: "Python agent should register with Vault-issued credentials"

  - expr: "${captured.agents_json} contains 'https://'"
    message: "Agent endpoint should be HTTPS"

  - expr: "${captured.vault_logs} contains 'Requesting certificate from Vault'"
    message: "Agent should request cert from Vault PKI"

  - expr: "${captured.vault_logs} contains 'Certificate obtained from Vault'"
    message: "Agent should successfully obtain cert from Vault"

  - expr: "${captured.vault_logs} contains 'mTLS'"
    message: "Registry client should be configured with mTLS"

  - expr: "${captured.vault_logs} contains 'Heartbeat successful'"
    message: "Agent should successfully heartbeat over mTLS"

post_run:
  - handler: shell
    command: |
      kill $(cat /tmp/tc12_agent.pid 2>/dev/null) 2>/dev/null || true
      kill $(cat /tmp/tc12_registry.pid 2>/dev/null) 2>/dev/null || true
      kill $(cat /tmp/vault.pid 2>/dev/null) 2>/dev/null || true
      pkill -f "vault server" 2>/dev/null || true
      rm -rf /tmp/vault-trust /tmp/vault_* /tmp/vault-registry-* /tmp/tc12_*
    ignore_errors: true
  - routine: global.cleanup_workspace
