name: "TLS Auto - Multi-Language Registration"
description: "Verify Python, TypeScript, and Java agents all register with mTLS in a single mesh"
tags:
  - registration-trust
  - tls
  - python
  - typescript
  - java
  - multi-language
timeout: 600

pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"
  - routine: global.setup_for_typescript_agent
  - routine: global.setup_for_java_agent

test:
  - name: "Copy all agents to workspace"
    handler: shell
    command: |
      cp /uc-artifacts/py-system-agent /workspace/system_agent.py
      cp -rL /uc-artifacts/ts-greeter /workspace/ts-greeter
      cp -rL /uc-artifacts/java-greeter /workspace/java-greeter
      ls -la /workspace/
    capture: copy_output

  - name: "Install TypeScript dependencies"
    handler: npm-install
    path: /workspace/ts-greeter

  - name: "Install Maven dependencies"
    handler: maven-install
    path: /workspace/java-greeter
    timeout: 600

  - name: "Start Python agent with TLS auto (also starts registry)"
    handler: shell
    command: "meshctl start system_agent.py --tls-auto -d"
    workdir: /workspace
    capture: py_start

  - name: "Wait for Python agent to register"
    handler: wait
    seconds: 10

  - name: "Start TypeScript agent with TLS auto"
    handler: shell
    command: "meshctl start ts-greeter/index.ts --tls-auto -d"
    workdir: /workspace
    capture: ts_start

  - name: "Wait for TypeScript agent to register"
    handler: wait
    seconds: 10

  - name: "Start Java agent with TLS auto"
    handler: shell
    command: "meshctl start java-greeter --tls-auto -d"
    workdir: /workspace
    capture: java_start

  - name: "Wait for Java agent to register"
    handler: shell
    command: |
      for i in $(seq 1 45); do
        if meshctl list 2>/dev/null | grep -q "greeter-java"; then
          echo "JAVA_REGISTERED after $((i*2)) seconds"
          exit 0
        fi
        sleep 2
      done
      echo "TIMEOUT: Java agent did not register within 90s"
      meshctl list 2>/dev/null || true
      exit 1
    workdir: /workspace
    capture: java_wait
    timeout: 120

  - name: "List all agents"
    handler: shell
    command: |
      meshctl list 2>&1
    workdir: /workspace
    capture: list_output

  - name: "Query API for entity_ids"
    handler: shell
    command: |
      curl -sk https://localhost:8000/agents 2>&1
    capture: api_output

  - name: "Count agents with entity_id"
    handler: shell
    command: |
      TOTAL=$(curl -sk https://localhost:8000/agents | python3 -c "
      import sys, json
      data = json.load(sys.stdin)
      healthy = [a for a in data['agents'] if a.get('status') == 'healthy']
      with_entity = [a for a in healthy if a.get('entity_id')]
      print(f'HEALTHY={len(healthy)}')
      print(f'WITH_ENTITY_ID={len(with_entity)}')
      for a in healthy:
          print(f'  {a[\"name\"]}: entity_id={a.get(\"entity_id\", \"NONE\")}, runtime={a.get(\"runtime\", \"unknown\")}')
      if len(with_entity) == len(healthy) and len(healthy) >= 3:
          print('ALL_HAVE_ENTITY_ID=true')
      else:
          print('ALL_HAVE_ENTITY_ID=false')
      " 2>&1)
      echo "$TOTAL"
    capture: entity_check

  - name: "Call Python tool over mTLS"
    handler: shell
    command: |
      meshctl call system:get_current_time '{}' 2>&1
    workdir: /workspace
    capture: py_call

  - name: "Call greeter capability over mTLS (TS or Java - both expose 'greet' tool)"
    handler: shell
    command: |
      meshctl call greet '{"name":"MultiLangTest"}' 2>&1
    workdir: /workspace
    capture: greeter_call

  - name: "Stop all"
    handler: shell
    command: |
      meshctl stop 2>/dev/null || true
      pkill -f "spring-boot:run" 2>/dev/null || true
      pkill -f "java.*greeter" 2>/dev/null || true
    workdir: /workspace
    ignore_errors: true

assertions:
  - expr: "${captured.list_output} contains 'system-agent'"
    message: "Python system agent should be registered"

  - expr: "${captured.list_output} contains 'greeter-ts'"
    message: "TypeScript greeter should be registered"

  - expr: "${captured.list_output} contains 'greeter-java'"
    message: "Java greeter should be registered"

  - expr: "${captured.list_output} contains 'https://'"
    message: "Registry URL should show HTTPS"

  - expr: "${captured.java_wait} contains 'JAVA_REGISTERED'"
    message: "Java agent should register within timeout"

  - expr: "${captured.entity_check} contains 'ALL_HAVE_ENTITY_ID=true'"
    message: "All healthy agents should have entity_id from mTLS"

  - expr: "${captured.py_call} not contains 'error'"
    message: "Python tool call should succeed over mTLS"

  - expr: "${captured.greeter_call} contains 'Hello'"
    message: "Greeter tool call should succeed over mTLS"

post_run:
  - handler: shell
    command: |
      meshctl stop 2>/dev/null || true
      pkill -f "spring-boot:run" 2>/dev/null || true
      pkill -f "java.*greeter" 2>/dev/null || true
    workdir: /workspace
    ignore_errors: true
  - routine: global.cleanup_workspace
