# Test Case: TC22 - JAVA Consumer -> OPENAI Provider (py) -> PY Tool
# Tests cross-SDK tool calling: java consumer invokes py tool via openai py provider
#
# Scenario:
#   - Start weather-tool-py (port 9001)
#   - Start openai-provider-py (port 9002)
#   - Start analyst-java (port 9003)
#   - Test non-tool query and tool query

name: "Consumer JAVA -> Provider OPENAI py -> Tool PY"
description: "Test java consumer with openai py provider calling py tool"
tags:
  - toolcall
  - java
  - openai
  - python
  - phase1
timeout: 600

pre_run:
  - routine: global.setup_for_java_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
  - routine: global.setup_for_python_agent

test:
  # 1. Copy artifacts to workspace
  - name: "Copy artifacts"
    handler: shell
    command: |
      cp -r /uc-artifacts/analyst-java /workspace/
      cp -r /uc-artifacts/openai-provider-py /workspace/
      cp -r /uc-artifacts/weather-tool-py /workspace/
      ls -la /workspace/
    capture: copy_output

  # 2. Create env file with secrets
  - name: "Create env file with secrets"
    handler: secrets
    target: /workspace/.env

  # 3. Install dependencies
  - name: "Install tool dependencies"
    handler: pip-install
    path: /workspace/weather-tool-py

  - name: "Install provider dependencies"
    handler: pip-install
    path: /workspace/openai-provider-py

  - name: "Install consumer dependencies"
    handler: maven-install
    path: /workspace/analyst-java
    timeout: 600

  # 3. Start tool agent (port 9001)
  - name: "Start tool agent"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start weather-tool-py/main.py --env MCP_MESH_HTTP_PORT=9001 -d
      echo "Tool agent starting..."
    capture: start_tool

  - name: "Wait for tool agent"
    handler: wait
    seconds: 15

  # 4. Start provider agent (port 9002)
  - name: "Start provider agent"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start openai-provider-py/main.py --env-file .env --env MCP_MESH_HTTP_PORT=9002 -d
      echo "Provider agent starting..."
    capture: start_provider

  - name: "Wait for provider agent"
    handler: wait
    seconds: 20

  # 5. Start consumer agent (port 9003)
  - name: "Start consumer agent"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start analyst-java --env MCP_MESH_HTTP_PORT=9003 -d
      echo "Consumer agent starting..."
    capture: start_consumer

  # Liveness only: poll until the Java consumer REGISTERS instead of a fixed
  # sleep — cold-JVM starts (mvn compile + Spring Boot startup) routinely
  # outran the old 25s wait. Generous 240s deadline; dependency resolution
  # stays covered by the runtime's settle window (no dep-resolution wait).
  - name: "Wait for consumer registration"
    handler: shell
    workdir: /workspace
    command: |
      echo "Waiting for analyst-java to register..."
      for i in $(seq 1 120); do
        if meshctl list 2>/dev/null | grep -q "analyst-java"; then
          echo "analyst-java registered after ~$((i*2))s"
          exit 0
        fi
        sleep 2
      done
      echo "ERROR: analyst-java did not register within 240s"
      meshctl logs analyst-java 2>/dev/null | tail -50 || true
      exit 1
    capture: wait_consumer_registration
    timeout: 260

  # 6. Verify all agents registered
  - name: "Verify agents registered"
    handler: shell
    workdir: /workspace
    command: |
      meshctl list
    capture: agent_list

  # 7. Non-tool query (capital of France)
  - name: "Non-tool query"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call analyze '{"ctx": {"query": "What is the capital of France?"}}'
    capture: non_tool_response
    timeout: 120

  # 8. Tool query (weather in Boston)
  - name: "Tool query"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call analyze '{"ctx": {"query": "What is the weather in Boston?"}}'
    capture: tool_response
    timeout: 120

assertions:
  - expr: "${captured.agent_list} contains 'analyst-java'"
    message: "Consumer agent should be registered"
  - expr: "${captured.agent_list} contains 'openai-provider-py'"
    message: "Provider agent should be registered"
  - expr: "${captured.agent_list} contains 'weather-tool-py'"
    message: "Tool agent should be registered"
  - expr: "${captured.non_tool_response} contains 'Paris'"
    message: "Non-tool response should mention Paris"
  - expr: "${captured.tool_response} contains 'Boston'"
    message: "Tool response should mention Boston"

post_run:
  - handler: shell
    workdir: /workspace
    command: |
      meshctl stop 2>/dev/null || true
      pkill -f "spring-boot:run" 2>/dev/null || true
      pkill -f "java.*analyst" 2>/dev/null || true
    ignore_errors: true
  - routine: global.cleanup_workspace
