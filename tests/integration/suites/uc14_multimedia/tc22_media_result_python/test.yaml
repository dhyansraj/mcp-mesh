# Test Case: MediaResult convenience class returns proper resource_link
# Verifies Phase 3.1 features: MediaResult one-step upload + resource_link return
# for both text and image content.
#
# Agent Setup:
#   - phase3-tool (port 9210): provides test_media_result, test_media_result_image
#
# Flow: meshctl call -> phase3-tool -> MediaResult -> upload + resource_link

name: "MediaResult Convenience Class"
description: "Verify MediaResult one-step upload returns proper resource_link for text and image content"
tags:
  - multimedia
  - media-result
  - python
timeout: 120

pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"

test:
  # Copy phase3-tool artifact to workspace
  - name: "Copy artifacts to workspace"
    handler: shell
    command: |
      mkdir -p /workspace/phase3-tool
      cp -rL /uc-artifacts/py-phase3-tool.py /workspace/phase3-tool/main.py
      cp -rL /uc-artifacts/py-requirements.txt /workspace/phase3-tool/requirements.txt
      echo "Artifacts copied"
      ls -la /workspace/phase3-tool/
    capture: copy_output

  # Copy test image for image-based MediaResult test
  # phase3-tool resolves PROJECT_ROOT as 4 parents up from script.
  # Script at /workspace/phase3-tool/main.py -> PROJECT_ROOT = /
  - name: "Copy test image for phase3-tool"
    handler: shell
    command: |
      cp /uc-artifacts/test-image-1.jpg /1.jpg
      echo "Copied test image to /1.jpg"
    capture: copy_image

  # Install Python dependencies
  - name: "Install phase3-tool dependencies"
    handler: pip-install
    path: /workspace/phase3-tool

  # Start phase3-tool
  - name: "Start phase3-tool"
    handler: shell
    workdir: /workspace
    command: "meshctl start phase3-tool/main.py -d"
    capture: start_output

  # Wait for phase3-tool to register
  - name: "Wait for phase3-tool registration"
    handler: shell
    workdir: /workspace
    command: |
      echo "Waiting for phase3-tool to register..."
      for i in $(seq 1 15); do
        if meshctl list 2>/dev/null | grep -q "phase3-tool"; then
          echo "phase3-tool registered after ${i} iterations"
          exit 0
        fi
        sleep 2
      done
      echo "ERROR: phase3-tool did not register within 30s"
      meshctl list 2>/dev/null || true
      exit 1
    capture: wait_output
    timeout: 60

  # List registered agents
  - name: "List agents"
    handler: shell
    workdir: /workspace
    command: "meshctl list"
    capture: list_output

  # List available tools
  - name: "List tools"
    handler: shell
    workdir: /workspace
    command: "meshctl list -t"
    capture: tools_output

  # Call test_media_result - text content via MediaResult
  - name: "Call test_media_result (text)"
    handler: shell
    workdir: /workspace
    command: "meshctl call test_media_result '{\"topic\": \"Integration\"}'"
    capture: text_result
    timeout: 60

  # Call test_media_result_image - real JPG via MediaResult
  - name: "Call test_media_result_image (image)"
    handler: shell
    workdir: /workspace
    command: "meshctl call test_media_result_image '{\"image_number\": 1}'"
    capture: image_result
    timeout: 60

  # Stop agents
  - name: "Stop agents"
    handler: shell
    workdir: /workspace
    command: "meshctl stop"
    capture: stop_output

assertions:
  # Agent registered
  - expr: "${captured.list_output} contains 'phase3-tool'"
    message: "phase3-tool should be registered"

  # Tools listed
  - expr: "${captured.tools_output} contains 'test_media_result'"
    message: "test_media_result tool should be listed"

  - expr: "${captured.tools_output} contains 'test_media_result_image'"
    message: "test_media_result_image tool should be listed"

  # Text MediaResult returns resource_link
  - expr: "${captured.text_result} contains 'resource_link'"
    message: "MediaResult for text should return a resource_link"

  - expr: "${captured.text_result} contains 'text/markdown'"
    message: "Text resource_link should have text/markdown mime type"

  # Image MediaResult returns resource_link
  - expr: "${captured.image_result} contains 'resource_link'"
    message: "MediaResult for image should return a resource_link"

  - expr: "${captured.image_result} contains 'image/jpeg'"
    message: "Image resource_link should have image/jpeg mime type"

post_run:
  - handler: shell
    workdir: /workspace
    command: "meshctl stop 2>/dev/null || true; rm -f /1.jpg /2.jpg"
    ignore_errors: true
  - routine: global.cleanup_workspace
