# Test Case: Claude LLM sees an image from a tool result
# Verifies Phase 2 media resolution: when a tool returns a resource_link (image),
# the LLM provider resolves it to inline base64 so Claude can see and describe it.
#
# Agent Setup:
#   - media-producer (port 9200): generates charts/images (generate_chart, get_sample_image)
#   - media-llm-provider (port 9202): Claude LLM provider with media resolution
#   - media-llm-consumer (port 9203): calls analyze_image which triggers the full pipeline
#
# Flow: consumer.analyze_image -> LLM -> generate_chart -> resource_link -> resolve to base64 -> LLM describes image

name: "LLM Media Resolution - Claude"
description: "Verify Claude can see and describe images from tool results via resource_link resolution"
tags:
  - multimedia
  - resource-link
  - llm
  - claude
  - python
timeout: 180

pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"

test:
  # Copy artifacts to workspace
  - name: "Copy artifacts to workspace"
    handler: shell
    command: |
      mkdir -p /workspace/media-producer /workspace/llm-provider /workspace/llm-consumer
      cp -rL /uc-artifacts/py-media-producer.py /workspace/media-producer/main.py
      cp -rL /uc-artifacts/py-requirements.txt /workspace/media-producer/requirements.txt
      cp -rL /uc-artifacts/py-llm-provider.py /workspace/llm-provider/main.py
      cp -rL /uc-artifacts/py-requirements.txt /workspace/llm-provider/requirements.txt
      cp -rL /uc-artifacts/py-llm-consumer.py /workspace/llm-consumer/main.py
      cp -rL /uc-artifacts/py-requirements.txt /workspace/llm-consumer/requirements.txt
      echo "Artifacts copied"
      ls -la /workspace/media-producer/
      ls -la /workspace/llm-provider/
      ls -la /workspace/llm-consumer/
    capture: copy_output

  # Create env file with secrets (API keys for LLM providers)
  - name: "Create env file with secrets"
    handler: secrets
    target: /workspace/.env

  # Install Python dependencies for media-producer
  - name: "Install media-producer dependencies"
    handler: pip-install
    path: /workspace/media-producer

  # Install Python dependencies for llm-provider
  - name: "Install llm-provider dependencies"
    handler: pip-install
    path: /workspace/llm-provider

  # Install Python dependencies for llm-consumer
  - name: "Install llm-consumer dependencies"
    handler: pip-install
    path: /workspace/llm-consumer

  # Start media-producer (port 9200)
  - name: "Start media-producer"
    handler: shell
    workdir: /workspace
    command: "meshctl start media-producer/main.py --env-file .env -d"
    capture: start_producer

  # Wait for media-producer to register
  - name: "Wait for media-producer registration"
    handler: shell
    workdir: /workspace
    command: |
      echo "Waiting for media-producer to register..."
      for i in $(seq 1 15); do
        if meshctl list 2>/dev/null | grep -q "media-producer"; then
          echo "media-producer registered after ${i} iterations"
          exit 0
        fi
        sleep 2
      done
      echo "ERROR: media-producer did not register within 30s"
      meshctl list 2>/dev/null || true
      exit 1
    capture: wait_producer
    timeout: 60

  # Start media-llm-provider (port 9202)
  - name: "Start media-llm-provider"
    handler: shell
    workdir: /workspace
    command: "meshctl start llm-provider/main.py --env-file .env -d"
    capture: start_llm_provider

  # Wait for media-llm-provider to register
  - name: "Wait for media-llm-provider registration"
    handler: shell
    workdir: /workspace
    command: |
      echo "Waiting for media-llm-provider to register..."
      for i in $(seq 1 15); do
        if meshctl list 2>/dev/null | grep -q "media-llm-provider"; then
          echo "media-llm-provider registered after ${i} iterations"
          exit 0
        fi
        sleep 2
      done
      echo "ERROR: media-llm-provider did not register within 30s"
      meshctl list 2>/dev/null || true
      exit 1
    capture: wait_llm_provider
    timeout: 60

  # Start media-llm-consumer (port 9203)
  - name: "Start media-llm-consumer"
    handler: shell
    workdir: /workspace
    command: "meshctl start llm-consumer/main.py --env-file .env -d"
    capture: start_llm_consumer

  # Wait for media-llm-consumer to register
  - name: "Wait for media-llm-consumer registration"
    handler: shell
    workdir: /workspace
    command: |
      echo "Waiting for media-llm-consumer to register..."
      for i in $(seq 1 15); do
        if meshctl list 2>/dev/null | grep -q "media-llm-consumer"; then
          echo "media-llm-consumer registered after ${i} iterations"
          exit 0
        fi
        sleep 2
      done
      echo "ERROR: media-llm-consumer did not register within 30s"
      meshctl list 2>/dev/null || true
      meshctl logs media-llm-consumer 2>/dev/null | tail -30 || true
      exit 1
    capture: wait_llm_consumer
    timeout: 60

  # List registered agents
  - name: "List agents"
    handler: shell
    workdir: /workspace
    command: "meshctl list"
    capture: list_output

  # List available tools
  - name: "List tools"
    handler: shell
    workdir: /workspace
    command: "meshctl list -t"
    capture: tools_output

  # Call analyze_image - triggers the full multimodal pipeline
  # Consumer -> LLM -> generate_chart -> resource_link -> resolve to base64 -> LLM describes
  - name: "Call analyze_image"
    handler: shell
    workdir: /workspace
    command: "meshctl call analyze_image '{\"topic\": \"Revenue\"}'"
    capture: analyze_result
    timeout: 120

  # Stop agents
  - name: "Stop agents"
    handler: shell
    workdir: /workspace
    command: "meshctl stop"
    capture: stop_output

assertions:
  # All agents registered
  - expr: "${captured.list_output} contains 'media-producer'"
    message: "media-producer should be registered"

  - expr: "${captured.list_output} contains 'media-llm-provider'"
    message: "media-llm-provider should be registered"

  - expr: "${captured.list_output} contains 'media-llm-consumer'"
    message: "media-llm-consumer should be registered"

  # analyze_image tool is available
  - expr: "${captured.tools_output} contains 'analyze_image'"
    message: "analyze_image tool should be listed"

  # LLM response contains descriptive words about a chart
  - expr: "${captured.analyze_result} contains 'chart'"
    message: "LLM response should mention chart (it described the generated image)"

  # Response contains meaningful LLM analysis
  - expr: "${captured.analyze_result} contains 'Analysis'"
    message: "Response should not indicate LLM was unavailable"

post_run:
  - handler: shell
    workdir: /workspace
    command: "meshctl stop 2>/dev/null || true"
    ignore_errors: true
  - routine: global.cleanup_workspace
