# Test Case: TypeScript Schema Filtering
# Verifies that mesh-injected dependencies do not leak into the MCP tool schema
# exposed to clients when using the TypeScript SDK.
#
# Matrix (9 cases):
#   t01: no params           -> empty schema
#   t02: one param           -> name visible
#   t03: multi params        -> a, b, c visible
#   t04: with defaults       -> a, b visible
#   t05: dep only            -> empty schema (deps separate from Zod)
#   t06: normal then dep     -> query visible
#   t07: dep order test      -> query visible
#   t08: multi deps          -> q visible
#   t09: mixed with defaults -> q, n visible
#
# Note: TypeScript SDK separates dependencies from Zod schema, so the leak is
# less likely - but we test for completeness and regression prevention.

name: "TypeScript Schema Filtering"
description: "Verify McpMeshTool parameters are filtered from MCP tool schema in TypeScript SDK"
tags:
  - schema
  - typescript
timeout: 180

pre_run:
  - routine: global.setup_for_typescript_agent
    params:
      meshctl_version: "${config.packages.cli_version}"

test:
  - name: "Copy artifact to workspace"
    handler: shell
    command: "cp -r /uc-artifacts/ts-schema-agent /workspace/"
    capture: copy_output

  - name: "Install npm dependencies"
    handler: npm-install
    path: /workspace/ts-schema-agent

  - name: "Start agent"
    handler: shell
    workdir: /workspace
    command: "meshctl start ts-schema-agent/src/index.ts --env MCP_MESH_HTTP_PORT=9060 -d"
    capture: start_output

  - name: "Wait for agent registration"
    handler: shell
    workdir: /workspace
    command: |
      for i in $(seq 1 20); do
        if meshctl list 2>/dev/null | grep -q "ts-schema-agent"; then
          echo "ts-schema-agent registered after $((i*2))s"
          exit 0
        fi
        sleep 2
      done
      echo "ERROR: ts-schema-agent did not register within 40s"
      meshctl logs ts-schema-agent 2>/dev/null | tail -20 || true
      exit 1
    capture: wait_output
    timeout: 60

  - name: "Verify agent registered"
    handler: shell
    workdir: /workspace
    command: "meshctl list"
    capture: list_output

  # --- Get schemas for all 9 tools ---

  - name: "Schema t01_no_params"
    handler: shell
    workdir: /workspace
    command: "meshctl list --tools=t01_no_params"
    capture: t01

  - name: "Schema t02_one_param"
    handler: shell
    workdir: /workspace
    command: "meshctl list --tools=t02_one_param"
    capture: t02

  - name: "Schema t03_multi_params"
    handler: shell
    workdir: /workspace
    command: "meshctl list --tools=t03_multi_params"
    capture: t03

  - name: "Schema t04_with_defaults"
    handler: shell
    workdir: /workspace
    command: "meshctl list --tools=t04_with_defaults"
    capture: t04

  - name: "Schema t05_dep_only"
    handler: shell
    workdir: /workspace
    command: "meshctl list --tools=t05_dep_only"
    capture: t05

  - name: "Schema t06_normal_then_dep"
    handler: shell
    workdir: /workspace
    command: "meshctl list --tools=t06_normal_then_dep"
    capture: t06

  - name: "Schema t07_dep_order"
    handler: shell
    workdir: /workspace
    command: "meshctl list --tools=t07_dep_order"
    capture: t07

  - name: "Schema t08_multi_dep"
    handler: shell
    workdir: /workspace
    command: "meshctl list --tools=t08_multi_dep"
    capture: t08

  - name: "Schema t09_mixed_defaults"
    handler: shell
    workdir: /workspace
    command: "meshctl list --tools=t09_mixed_defaults"
    capture: t09

  - name: "Show agent logs"
    handler: shell
    workdir: /workspace
    command: "meshctl logs ts-schema-agent 2>/dev/null | tail -30 || echo 'no logs'"
    capture: agent_logs

assertions:
  # --- Agent registration ---
  - expr: "${captured.list_output} contains 'ts-schema-agent'"
    message: "Agent should be registered"

  # --- Case 1: No params -> empty schema ---
  - expr: '${captured.t01} not contains ''"svc"'''
    message: "t01: no-param tool should not have svc"
  - expr: '${captured.t01} not contains ''"McpMeshTool"'''
    message: "t01: no-param tool should not have McpMeshTool"

  # --- Case 2: One param -> name visible ---
  - expr: '${captured.t02} contains ''"name"'''
    message: "t02: should have name parameter"

  # --- Case 3: Multi params -> a, b, c visible ---
  - expr: '${captured.t03} contains ''"a"'''
    message: "t03: should have param a"
  - expr: '${captured.t03} contains ''"b"'''
    message: "t03: should have param b"
  - expr: '${captured.t03} contains ''"c"'''
    message: "t03: should have param c"

  # --- Case 4: With defaults -> a, b visible ---
  - expr: '${captured.t04} contains ''"a"'''
    message: "t04: should have param a"
  - expr: '${captured.t04} contains ''"b"'''
    message: "t04: should have param b"

  # --- Case 5: Dep only -> empty schema, no user params ---
  - expr: '${captured.t05} not contains ''"svc"'''
    message: "t05: should NOT have svc parameter"
  - expr: '${captured.t05} not contains ''"McpMeshTool"'''
    message: "t05: should NOT expose McpMeshTool type"

  # --- Case 6: Normal then dep -> query visible ---
  - expr: '${captured.t06} contains ''"query"'''
    message: "t06: should have query parameter"
  - expr: '${captured.t06} not contains ''"svc"'''
    message: "t06: should NOT have svc parameter"
  - expr: '${captured.t06} not contains ''"McpMeshTool"'''
    message: "t06: should NOT expose McpMeshTool type"

  # --- Case 7: Dep order test -> query visible ---
  - expr: '${captured.t07} contains ''"query"'''
    message: "t07: should have query parameter"
  - expr: '${captured.t07} not contains ''"svc"'''
    message: "t07: should NOT have svc parameter"
  - expr: '${captured.t07} not contains ''"McpMeshTool"'''
    message: "t07: should NOT expose McpMeshTool type"

  # --- Case 8: Multi deps -> q visible ---
  - expr: '${captured.t08} contains ''"q"'''
    message: "t08: should have q parameter"
  - expr: '${captured.t08} not contains ''"McpMeshTool"'''
    message: "t08: should NOT expose McpMeshTool type"

  # --- Case 9: Mixed with defaults -> q, n visible ---
  - expr: '${captured.t09} contains ''"q"'''
    message: "t09: should have q parameter"
  - expr: '${captured.t09} contains ''"n"'''
    message: "t09: should have n parameter"
  - expr: '${captured.t09} not contains ''"svc"'''
    message: "t09: should NOT have svc parameter"
  - expr: '${captured.t09} not contains ''"McpMeshTool"'''
    message: "t09: should NOT expose McpMeshTool type"

post_run:
  - handler: shell
    workdir: /workspace
    command: "meshctl stop 2>/dev/null || true"
    ignore_errors: true
  - routine: global.cleanup_workspace
