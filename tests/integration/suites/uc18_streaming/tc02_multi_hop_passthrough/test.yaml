# Test Case: tc02 - Multi-hop streaming (gateway -> passthrough -> chatbot)
# GitHub issue #645 - auto-streaming text responses
#
# Verifies that streaming passes through an intermediate hop without buffering:
# the passthrough agent's body is `async for chunk in chat_proxy.stream(...): yield chunk`
# which exercises P2's mesh.McpMeshTool.stream() bridge from inside a Stream[str] tool.
#
# All 9 dry-run chunks must reach the SSE client - if any one is dropped mid-pipe
# (e.g. due to a buffering regression), the per-chunk asserts give a precise
# failure message.

name: "Streaming: multi-hop SSE (gateway -> passthrough -> chatbot)"
description: "Verify multi-hop SSE streaming end-to-end with no chunk buffering"
tags:
  - streaming
  - sse
  - multi_hop
  - py
  - slow
timeout: 300

pre_run:
  - routine: global.setup_for_python_agent
  - handler: shell
    command: "/workspace/.venv/bin/pip install fastapi uvicorn"

test:
  - name: "Copy all three agents to workspace"
    handler: shell
    command: |
      mkdir -p /workspace/streaming
      cp -rL /uc-artifacts/streaming/chatbot-agent /workspace/streaming/
      cp -rL /uc-artifacts/streaming/passthrough-agent /workspace/streaming/
      cp -rL /uc-artifacts/streaming/gateway-agent /workspace/streaming/
      ls /workspace/streaming/
    capture: copy_output

  - name: "Start chatbot-agent (port 9170, dry-run mode)"
    handler: shell
    workdir: /workspace
    command: "meshctl start streaming/chatbot-agent/main.py --env MESH_LLM_DRY_RUN=1 -d"
    capture: start_chatbot

  - name: "Start passthrough-agent (port 9171, depends on 'chat')"
    handler: shell
    workdir: /workspace
    command: "meshctl start streaming/passthrough-agent/main.py -d"
    capture: start_passthrough

  - name: "Start gateway-agent (port 9172, depends on 'chat' AND 'chat_passthrough')"
    handler: shell
    workdir: /workspace
    command: "meshctl start streaming/gateway-agent/main.py -d"
    capture: start_gateway

  - name: "Wait for all three agents registered AND deps fully resolved"
    handler: shell
    workdir: /workspace
    command: |
      EXPECTED="chatbot-agent passthrough-agent gateway-agent"
      EXPECTED_COUNT=3
      echo "Waiting for $EXPECTED_COUNT agents to register and deps to resolve..."
      for i in $(seq 1 60); do
        AGENTS=$(meshctl list 2>/dev/null || true)
        TOOLS=$(meshctl list --tools 2>/dev/null || true)
        COUNT=0
        for agent in $EXPECTED; do
          if echo "$AGENTS" | grep -q "$agent"; then
            COUNT=$((COUNT + 1))
          fi
        done
        # passthrough-agent declares 1 dependency (chat)
        # gateway-agent declares 2 routes; chat route depends on 'chat',
        # chat-multihop route depends on 'chat_passthrough'.
        # Both must show fully-resolved markers. We grep the per-agent line in
        # `meshctl list --tools` for "<resolved>/<total>" with resolved == total.
        PT_OK=false
        GW_OK=false
        if echo "$TOOLS" | grep -i "passthrough-agent" | grep -q "1/1"; then
          PT_OK=true
        fi
        # gateway has 2 mesh.route declarations -> typically shown as 2/2.
        # Be permissive: accept either "2/2" or two separate "1/1" entries
        # under gateway-agent in case the listing format differs.
        if echo "$TOOLS" | grep -i "gateway-agent" | grep -q "2/2"; then
          GW_OK=true
        elif [ "$(echo "$TOOLS" | grep -i "gateway-agent" | grep -c '1/1')" -ge 2 ]; then
          GW_OK=true
        fi
        if [ "$COUNT" -ge "$EXPECTED_COUNT" ] && [ "$PT_OK" = "true" ] && [ "$GW_OK" = "true" ]; then
          echo "All $EXPECTED_COUNT agents registered and deps resolved after $((i * 2))s"
          meshctl list
          meshctl list --tools
          exit 0
        fi
        echo "  $COUNT/$EXPECTED_COUNT agents registered, pt_ok=$PT_OK gw_ok=$GW_OK (attempt $i/60)..."
        sleep 2
      done
      echo "ERROR: not all agents registered or deps unresolved within 120s"
      meshctl list 2>/dev/null || true
      meshctl list --tools 2>/dev/null || true
      exit 1
    capture: wait_output
    timeout: 150

  - name: "Curl POST /api/chat-multihop (capture full multi-hop SSE stream body)"
    handler: shell
    workdir: /workspace
    command: |
      curl -s -N -X POST http://localhost:9172/api/chat-multihop \
        -H "Content-Type: application/json" \
        -d '{"prompt":"hi"}' 2>&1
    capture: multihop_sse_output
    timeout: 90

assertions:
  # Sanity / framing
  - expr: "${captured.multihop_sse_output} contains 'data: [DONE]'"
    message: "Multi-hop SSE stream must end with the 'data: [DONE]' terminator"

  # All 9 deterministic dry-run chunks must survive the full
  # gateway -> passthrough -> chatbot pipeline. Each chunk is asserted
  # individually so a regression that drops a single chunk gives a precise
  # failure message instead of a vague "stream incomplete".
  - expr: "${captured.multihop_sse_output} contains 'data: Hello'"
    message: "Multi-hop SSE must contain chunk 1: 'Hello'"
  - expr: "${captured.multihop_sse_output} contains 'data: world'"
    message: "Multi-hop SSE must contain chunk 3: 'world'"
  - expr: "${captured.multihop_sse_output} contains 'data: !'"
    message: "Multi-hop SSE must contain chunk 4: '!'"
  - expr: "${captured.multihop_sse_output} contains 'data:  This'"
    message: "Multi-hop SSE must contain chunk 5: ' This' (leading-space chunk preserved)"
  - expr: "${captured.multihop_sse_output} contains 'data:  is'"
    message: "Multi-hop SSE must contain chunk 6: ' is'"
  - expr: "${captured.multihop_sse_output} contains 'data:  a'"
    message: "Multi-hop SSE must contain chunk 7: ' a'"
  - expr: "${captured.multihop_sse_output} contains 'data:  test'"
    message: "Multi-hop SSE must contain chunk 8: ' test'"
  - expr: "${captured.multihop_sse_output} contains 'data:  response.'"
    message: "Multi-hop SSE must contain chunk 9: ' response.'"

post_run:
  - handler: shell
    workdir: /workspace
    command: "meshctl stop 2>/dev/null || true"
    ignore_errors: true
  - routine: global.cleanup_workspace
