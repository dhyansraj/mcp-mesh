# Test Case: tc03 - Weather tool (real Open-Meteo HTTP integration, no LLM)
# GitHub issue #645 - covers the weather-tool agent from the chatbot-demo
#
# Verifies the get_weather capability in isolation:
#   - Real Open-Meteo geocoding + forecast HTTP calls succeed
#   - Output schema contains the expected fields (city, temp_c, conditions)
#   - Invalid-city path returns a structured {"error": ...} payload
#
# This is NOT a streaming test - the weather-tool returns plain JSON. It
# guards the chatbot-demo's underlying tool so the demo doesn't silently
# rot if Open-Meteo's contract changes.

name: "Streaming demo: weather-tool (real Open-Meteo)"
description: "Verify the chatbot-demo weather-tool against real Open-Meteo (no LLM)"
tags:
  - streaming
  - tool
  - py
  - slow
timeout: 240

pre_run:
  - routine: global.setup_for_python_agent

test:
  - name: "Copy weather-tool to workspace"
    handler: shell
    command: |
      mkdir -p /workspace/streaming
      cp -rL /uc-artifacts/streaming/chatbot-demo/weather-tool /workspace/streaming/
      ls /workspace/streaming/weather-tool/
    capture: copy_output

  - name: "Start weather-tool (port 9180)"
    handler: shell
    workdir: /workspace
    command: "meshctl start streaming/weather-tool/main.py -d"
    capture: start_weather

  - name: "Wait for weather-tool registered"
    handler: shell
    workdir: /workspace
    command: |
      EXPECTED="weather-tool"
      EXPECTED_COUNT=1
      echo "Waiting for $EXPECTED_COUNT named agent to register..."
      for i in $(seq 1 60); do
        AGENTS=$(meshctl list 2>/dev/null || true)
        COUNT=0
        for agent in $EXPECTED; do
          if echo "$AGENTS" | grep -q "$agent"; then
            COUNT=$((COUNT + 1))
          fi
        done
        if [ "$COUNT" -ge "$EXPECTED_COUNT" ]; then
          echo "Named agent registered after $((i * 2))s"
          meshctl list
          meshctl list --tools
          exit 0
        fi
        echo "  $COUNT/$EXPECTED_COUNT agents registered (attempt $i/60)..."
        sleep 2
      done
      echo "ERROR: weather-tool not registered within 120s"
      meshctl list 2>/dev/null || true
      meshctl list --tools 2>/dev/null || true
      exit 1
    capture: wait_output
    timeout: 150

  - name: "Call get_weather for a known city (New York)"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call get_weather '{"city":"New York"}' 2>&1
    capture: weather_output
    timeout: 60

  - name: "Call get_weather for an obviously-bogus city"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call get_weather '{"city":"zzzzzznotacityxxxxxxxxx"}' 2>&1
    capture: weather_error
    timeout: 60
    ignore_errors: true

assertions:
  # --- Success path: structural fields, not exact text. ---
  # The Open-Meteo geocoder may resolve "New York" to "New York, United States"
  # or similar; the temperature and conditions vary by time of day. We only
  # assert the schema contract is intact.
  - expr: "${captured.weather_output} contains '\"city\"'"
    message: "get_weather success response must include a 'city' field"
  - expr: "${captured.weather_output} contains '\"temp_c\"'"
    message: "get_weather success response must include a 'temp_c' field"
  - expr: "${captured.weather_output} contains '\"conditions\"'"
    message: "get_weather success response must include a 'conditions' field"
  - expr: "${captured.weather_output} contains 'New York'"
    message: "get_weather should echo the resolved city name (Open-Meteo geocoded 'New York')"

  # --- Error path: structured {"error": ...} payload, never a stack trace. ---
  - expr: "${captured.weather_error} contains '\"error\"'"
    message: "get_weather for an invalid city must return a structured 'error' field (not a crash)"
  - expr: "${captured.weather_error} contains 'city not found'"
    message: "get_weather error message should identify the failure mode ('city not found')"

post_run:
  - handler: shell
    workdir: /workspace
    command: "meshctl stop 2>/dev/null || true"
    ignore_errors: true
  - routine: global.cleanup_workspace
