# Test Case: Structured Output Multi-Turn with Tools - Python
# Verifies HINT-mode structured output remains reliable across 10+ turns with agentic loop
# Related Issue: https://github.com/dhyansraj/mcp-mesh/issues/598

name: "Structured Output Multi-Turn with Tools - Py"
description: "Verify structured output (HINT mode) doesn't degrade with agentic loop and chat history"
tags:
  - llm
  - claude
  - structured
  - python
  - multi-turn
  - tools
timeout: 240
pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"
test:
  # Copy UC-level Claude provider artifacts
  - name: "Copy Claude provider to workspace"
    handler: shell
    command: "cp -r /uc-artifacts/claude-provider /workspace/"
    capture: copy_provider_output
  # Copy TC-level calculator-agent artifacts
  - name: "Copy calculator-agent to workspace"
    handler: shell
    command: "cp -r /artifacts/calculator-agent /workspace/"
    capture: copy_calc_output
  # Copy TC-level chat-tools-agent artifacts
  - name: "Copy chat-tools-agent to workspace"
    handler: shell
    command: "cp -r /artifacts/chat-tools-agent /workspace/"
    capture: copy_agent_output
  # Create env file with secrets
  - name: "Create env file with secrets"
    handler: secrets
    target: /workspace/.env
  # Verify workspace files
  - name: "Verify workspace files"
    handler: shell
    command: "ls -la /workspace/"
    capture: ls_output
  # Start calculator-agent first (provides tools)
  - name: "Start calculator-agent"
    handler: shell
    command: "meshctl start calculator-agent/main.py -d"
    workdir: /workspace
    capture: start_calc_output
  # Wait for calculator to register
  - name: "Wait for calculator to register"
    handler: wait
    seconds: 3
  # Start Claude provider (provides LLM)
  - name: "Start Claude provider"
    handler: shell
    command: "meshctl start claude-provider/main.py --env-file .env -d"
    workdir: /workspace
    capture: start_provider_output
  # Wait for provider to register
  - name: "Wait for provider to register"
    handler: wait
    seconds: 15
  # Verify calculator and provider running
  - name: "Verify calculator and provider running"
    handler: shell
    command: "meshctl list"
    workdir: /workspace
    capture: pre_agent_list_output
  # Start chat-tools-agent (depends on BOTH calculator and claude-provider)
  - name: "Start chat-tools-agent"
    handler: shell
    command: "meshctl start chat-tools-agent/main.py -d"
    workdir: /workspace
    capture: start_agent_output
  # Wait for agent to register and resolve dependencies
  - name: "Wait for agent to register and resolve dependencies"
    handler: wait
    seconds: 15
  # Verify all agents running
  - name: "Verify all agents running"
    handler: shell
    command: "meshctl list"
    workdir: /workspace
    capture: all_list_output
  # List available tools
  - name: "List available tools"
    handler: shell
    command: "meshctl list -t"
    workdir: /workspace
    capture: tools_output
  # === 10 SEQUENTIAL TURNS: Mix of math (uses tools) and knowledge (direct) ===
  - name: "Turn 1 - Math question (tools)"
    handler: shell
    command: |
      meshctl call analyze '{"ctx": {"question": "What is 15 plus 27?"}}'
    workdir: /workspace
    capture: turn_1
  - name: "Turn 2 - Knowledge question (direct)"
    handler: shell
    command: |
      meshctl call analyze '{"ctx": {"question": "What is the capital of Japan?"}}'
    workdir: /workspace
    capture: turn_2
  - name: "Turn 3 - Math question (tools)"
    handler: shell
    command: |
      meshctl call analyze '{"ctx": {"question": "What is 8 multiplied by 12?"}}'
    workdir: /workspace
    capture: turn_3
  - name: "Turn 4 - Knowledge question (direct)"
    handler: shell
    command: |
      meshctl call analyze '{"ctx": {"question": "Explain what causes rainbows."}}'
    workdir: /workspace
    capture: turn_4
  - name: "Turn 5 - Math question (tools)"
    handler: shell
    command: |
      meshctl call analyze '{"ctx": {"question": "Calculate 99 plus 101."}}'
    workdir: /workspace
    capture: turn_5
  - name: "Turn 6 - Follow-up on earlier topic"
    handler: shell
    command: |
      meshctl call analyze '{"ctx": {"question": "Going back to our earlier math, what is 42 plus 58?"}}'
    workdir: /workspace
    capture: turn_6
  - name: "Turn 7 - Knowledge question (direct)"
    handler: shell
    command: |
      meshctl call analyze '{"ctx": {"question": "What are the three states of matter?"}}'
    workdir: /workspace
    capture: turn_7
  - name: "Turn 8 - Complex math (tools)"
    handler: shell
    command: |
      meshctl call analyze '{"ctx": {"question": "What is 256 multiplied by 3?"}}'
    workdir: /workspace
    capture: turn_8
  - name: "Turn 9 - Knowledge question (direct)"
    handler: shell
    command: |
      meshctl call analyze '{"ctx": {"question": "Who invented the telephone?"}}'
    workdir: /workspace
    capture: turn_9
  - name: "Turn 10 - Summary with reference to history"
    handler: shell
    command: |
      meshctl call analyze '{"ctx": {"question": "Summarize all the calculations we have done in this conversation."}}'
    workdir: /workspace
    capture: turn_10
  # Stop all agents
  - name: "Stop all agents"
    handler: shell
    command: "meshctl stop"
    workdir: /workspace
assertions:
  # Infrastructure assertions
  - expr: ${captured.pre_agent_list_output} contains 'calculator-agent'
    message: "calculator-agent should appear in meshctl list"
  - expr: ${captured.pre_agent_list_output} contains 'claude-provider'
    message: "claude-provider should appear in meshctl list"
  - expr: ${captured.all_list_output} contains 'chat-tools-agent'
    message: "chat-tools-agent should appear in meshctl list"
  - expr: ${captured.tools_output} contains 'analyze'
    message: "analyze tool should be listed"
  - expr: ${captured.tools_output} contains 'calc_add'
    message: "calc_add tool should be listed"
  # === EARLY TURNS (1-3): Should always work ===
  - expr: ${captured.turn_1} contains '"answer"'
    message: "Turn 1 should contain answer field (valid structured output)"
  - expr: ${captured.turn_1} not contains 'ValidationError'
    message: "Turn 1 should not have ValidationError"
  - expr: ${captured.turn_2} contains '"answer"'
    message: "Turn 2 should contain answer field"
  - expr: ${captured.turn_2} not contains 'ValidationError'
    message: "Turn 2 should not have ValidationError"
  - expr: ${captured.turn_3} contains '"answer"'
    message: "Turn 3 should contain answer field"
  - expr: ${captured.turn_3} not contains 'ValidationError'
    message: "Turn 3 should not have ValidationError"
  # === MIDDLE TURNS (4-7): Degradation may start here ===
  - expr: ${captured.turn_4} contains '"answer"'
    message: "Turn 4 should contain answer field"
  - expr: ${captured.turn_4} not contains 'ValidationError'
    message: "Turn 4 should not have ValidationError"
  - expr: ${captured.turn_5} contains '"answer"'
    message: "Turn 5 should contain answer field"
  - expr: ${captured.turn_5} not contains 'ValidationError'
    message: "Turn 5 should not have ValidationError"
  - expr: ${captured.turn_6} contains '"answer"'
    message: "Turn 6 should contain answer field"
  - expr: ${captured.turn_6} not contains 'ValidationError'
    message: "Turn 6 should not have ValidationError"
  - expr: ${captured.turn_7} contains '"answer"'
    message: "Turn 7 should contain answer field"
  - expr: ${captured.turn_7} not contains 'ValidationError'
    message: "Turn 7 should not have ValidationError"
  # === LATE TURNS (8-10): Most likely to fail if HINT degrades ===
  - expr: ${captured.turn_8} contains '"answer"'
    message: "Turn 8 should contain answer field (late turn - HINT durability)"
  - expr: ${captured.turn_8} not contains 'ValidationError'
    message: "Turn 8 should not have ValidationError"
  - expr: ${captured.turn_9} contains '"answer"'
    message: "Turn 9 should contain answer field (late turn - HINT durability)"
  - expr: ${captured.turn_9} not contains 'ValidationError'
    message: "Turn 9 should not have ValidationError"
  - expr: ${captured.turn_10} contains '"answer"'
    message: "Turn 10 should contain answer field (late turn - HINT durability)"
  - expr: ${captured.turn_10} not contains 'ValidationError'
    message: "Turn 10 should not have ValidationError"
  # === STRUCTURAL CHECKS: Multiple fields present ===
  - expr: ${captured.turn_1} contains '"reasoning"'
    message: "Turn 1 should contain reasoning field"
  - expr: ${captured.turn_5} contains '"reasoning"'
    message: "Turn 5 should contain reasoning field"
  - expr: ${captured.turn_10} contains '"reasoning"'
    message: "Turn 10 should contain reasoning field"
  - expr: ${captured.turn_1} contains '"topic"'
    message: "Turn 1 should contain topic field"
  - expr: ${captured.turn_10} contains '"topic"'
    message: "Turn 10 should contain topic field"
  - expr: ${captured.turn_1} contains '"confidence"'
    message: "Turn 1 should contain confidence field"
  - expr: ${captured.turn_10} contains '"confidence"'
    message: "Turn 10 should contain confidence field"
  # === MATH ANSWER CHECKS: Verify tool usage produced correct results ===
  - expr: ${captured.turn_1} contains '42'
    message: "Turn 1 math answer should contain 42 (15+27)"
  - expr: ${captured.turn_3} contains '96'
    message: "Turn 3 math answer should contain 96 (8*12)"
  - expr: ${captured.turn_5} contains '200'
    message: "Turn 5 math answer should contain 200 (99+101)"
  # === ERROR CHECKS ===
  - expr: ${captured.turn_1} not contains 'Expecting value'
    message: "Turn 1 should not have JSON parse error"
  - expr: ${captured.turn_5} not contains 'Expecting value'
    message: "Turn 5 should not have JSON parse error"
  - expr: ${captured.turn_10} not contains 'Expecting value'
    message: "Turn 10 should not have JSON parse error"
  - expr: ${captured.turn_1} not contains 'Mesh provider not resolved'
    message: "Turn 1 should not have provider error"
  - expr: ${captured.turn_10} not contains 'Mesh provider not resolved'
    message: "Turn 10 should not have provider error"
post_run:
  - handler: shell
    command: "meshctl stop 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true
  - routine: global.cleanup_workspace
