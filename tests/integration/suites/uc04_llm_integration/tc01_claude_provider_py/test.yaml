# Test Case: Claude Provider Integration - Python
# Verifies Claude LLM provider using @mesh.llm_provider decorator

name: "Claude Provider Integration - Py"
description: "Test Claude LLM provider scaffolded with meshctl (Python)"
tags:
  - llm
  - claude
  - provider
  - python
timeout: 120
# Note: Skip this test with --skip-tag llm if no API key is available
pre_run:
  # Setup for Python agent
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"
test:
  # Copy artifacts to workspace
  - name: "Copy artifacts to workspace"
    handler: shell
    command: "cp -r /artifacts/* /workspace/"
    capture: copy_output
  # Create env file with secrets
  - name: "Create env file with secrets"
    handler: secrets
    target: /workspace/.env
  # Verify all files copied
  - name: "Verify workspace files"
    handler: shell
    command: "ls -la /workspace/"
    capture: ls_output
  # Start the claude-provider with env file
  - name: "Start claude-provider"
    handler: shell
    command: "meshctl start claude-provider/main.py --env-file .env --env MCP_MESH_HTTP_PORT=3020 -d"
    workdir: /workspace
    capture: start_output
  # Wait for provider to register via polling
  - name: "Wait for claude-provider to register"
    handler: shell
    workdir: /workspace
    command: |
      EXPECTED="claude-provider"
      EXPECTED_COUNT=1
      echo "Waiting for $EXPECTED_COUNT agents to register..."
      for i in $(seq 1 30); do
        AGENTS=$(meshctl list 2>/dev/null || true)
        COUNT=0
        for agent in $EXPECTED; do
          if echo "$AGENTS" | grep -q "$agent"; then
            COUNT=$((COUNT + 1))
          fi
        done
        if [ "$COUNT" -ge "$EXPECTED_COUNT" ]; then
          echo "All $EXPECTED_COUNT agents registered after $((i * 2))s"
          meshctl list
          exit 0
        fi
        sleep 2
      done
      echo "ERROR: Only $COUNT/$EXPECTED_COUNT agents registered within 60s"
      meshctl list 2>/dev/null || true
      exit 1
    capture: wait_output
    timeout: 90
  # Verify provider is running
  - name: "Verify provider is running"
    handler: shell
    command: "meshctl list"
    workdir: /workspace
    capture: list_output
  # List available tools
  - name: "List available tools"
    handler: shell
    command: "meshctl list -t"
    workdir: /workspace
    capture: tools_output
  # Call claude_provider with a simple question
  - name: "Call claude_provider - capital of France"
    handler: shell
    command: |
      meshctl call claude_provider \
        '{"request": {"messages": [{"role": "user", "content": "What is the capital of France?"}]}}'
    workdir: /workspace
    capture: llm_response
  # Stop provider
  - name: "Stop provider"
    handler: shell
    command: "meshctl stop"
    workdir: /workspace
assertions:
  # Provider started successfully
  - expr: ${captured.list_output} contains 'claude-provider'
    message: "claude-provider should appear in meshctl list"
  # Tool is registered
  - expr: ${captured.tools_output} contains 'claude_provider'
    message: "claude_provider tool should be listed"
  # Tool has correct capability
  - expr: ${captured.tools_output} contains 'llm'
    message: "Tool should have llm capability"
  # LLM response contains Paris
  - expr: ${captured.llm_response} contains 'Paris'
    message: "LLM response should contain Paris"
post_run:
  # Stop any remaining providers
  - handler: shell
    command: "meshctl stop 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true
  - routine: global.cleanup_workspace
