# Test Case: Cross-Runtime Structured Output - Java Consumer -> Py Claude Provider
# Validates that Java analyst agent with structured output (AnalysisResult record)
# receives proper structured JSON from a Python Claude provider.
#
# Scenario:
#   - Start Python claude-provider (provides 'llm' capability)
#   - Start java-employee-service (provides employee data tools)
#   - Start java-analyst-agent (uses agentic loop with structured output)
#   - Call analyst's analyze tool asking about employees
#   - Verify it returns structured analysis via Python Claude provider
#
# Difference from tc15: tc15 uses Java Claude provider, tc24 uses Python Claude provider.
# This validates cross-runtime structured output.

name: "Cross-Runtime Structured Output - Java Consumer -> Py Claude"
description: "Verify Java analyst agent receives structured JSON from Python Claude provider"
tags:
  - llm
  - claude
  - structured-output
  - cross-runtime
  - java
  - python
timeout: 420

pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"
  - routine: global.setup_for_java_agent
    params:
      meshctl_version: "${config.packages.cli_version}"

test:
  # Copy UC-level Python Claude provider
  - name: "Copy Python Claude provider to workspace"
    handler: shell
    command: "cp -r /uc-artifacts/claude-provider /workspace/"
    capture: copy_provider

  # Copy UC-level Java employee service
  - name: "Copy employee service to workspace"
    handler: shell
    command: "cp -r /uc-artifacts/java-employee-service /workspace/"
    capture: copy_employee

  # Copy UC-level Java analyst agent
  - name: "Copy analyst to workspace"
    handler: shell
    command: "cp -r /uc-artifacts/java-analyst-agent /workspace/"
    capture: copy_analyst

  # Create env file with secrets
  - name: "Create env file for provider"
    handler: secrets
    target: /workspace/.env

  # Create env file for analyst agent
  - name: "Create env file for analyst"
    handler: secrets
    target: /workspace/java-analyst-agent/.env

  # Install Maven dependencies for employee service
  - name: "Install employee service dependencies"
    handler: maven-install
    path: /workspace/java-employee-service
    timeout: 600

  # Install Maven dependencies for analyst agent
  - name: "Install analyst dependencies"
    handler: maven-install
    path: /workspace/java-analyst-agent
    timeout: 600

  # Start Python Claude provider
  - name: "Start Python Claude provider"
    handler: shell
    workdir: /workspace
    command: "meshctl start claude-provider/main.py --env-file .env -d"
    capture: start_provider

  # Wait for provider to register
  - name: "Wait for provider to register"
    handler: wait
    seconds: 10

  # Verify provider is running
  - name: "Verify provider is running"
    handler: shell
    workdir: /workspace
    command: "meshctl list"
    capture: provider_list

  # Start Java employee service
  - name: "Start employee service"
    handler: shell
    workdir: /workspace
    command: |
      meshctl start /workspace/java-employee-service -d
    capture: start_employee

  # Wait for employee service registration
  - name: "Wait for employee service"
    handler: shell
    workdir: /workspace
    command: |
      for i in $(seq 1 45); do
        if meshctl list 2>/dev/null | grep -q "employee-service"; then
          echo "Employee service registered"
          exit 0
        fi
        sleep 2
      done
      exit 1
    capture: wait_employee
    timeout: 120

  # Start Java analyst agent
  - name: "Start analyst agent"
    handler: shell
    workdir: /workspace
    command: |
      meshctl start /workspace/java-analyst-agent --env-file /workspace/java-analyst-agent/.env -d
    capture: start_analyst

  # Wait for analyst registration
  - name: "Wait for analyst"
    handler: shell
    workdir: /workspace
    command: |
      for i in $(seq 1 45); do
        if meshctl list 2>/dev/null | grep -q "analyst"; then
          echo "Analyst registered"
          exit 0
        fi
        sleep 2
      done
      exit 1
    capture: wait_analyst
    timeout: 120

  # Wait for dependency resolution
  - name: "Wait for dependency resolution"
    handler: wait
    seconds: 8

  # Verify all agents running
  - name: "Verify all agents"
    handler: shell
    workdir: /workspace
    command: "meshctl list"
    capture: list_all

  # List all tools
  - name: "List all tools"
    handler: shell
    workdir: /workspace
    command: "meshctl list --tools"
    capture: list_tools

  # Call analyze with a query about employees
  - name: "Call analyze (agentic loop)"
    handler: shell
    workdir: /workspace
    command: 'meshctl call analyze ''{"ctx": {"query": "How many employees are in the Engineering department?"}}'''
    capture: call_analyze
    timeout: 120

assertions:
  # Python provider registered
  - expr: "${captured.provider_list} contains 'claude-provider'"
    message: "Python Claude provider should be registered"

  # All agents registered
  - expr: "${captured.list_all} contains 'claude-provider'"
    message: "Claude provider should be registered"

  - expr: "${captured.list_all} contains 'employee-service'"
    message: "Employee service should be registered"

  - expr: "${captured.list_all} contains 'analyst'"
    message: "Analyst should be registered"

  # Employee tools available
  - expr: "${captured.list_tools} contains 'getEmployee'"
    message: "getEmployee tool should be available"

  - expr: "${captured.list_tools} contains 'listEmployees'"
    message: "listEmployees tool should be available"

  # Analyze tool available
  - expr: "${captured.list_tools} contains 'analyze'"
    message: "analyze tool should be available"

  # Analyze returned a structured response with summary field
  - expr: "${jq:captured.call_analyze:.content[0].text | fromjson | .summary} != ''"
    message: "Analysis should return a non-empty summary"

post_run:
  - handler: shell
    workdir: /workspace
    command: |
      meshctl stop 2>/dev/null || true
      pkill -f "spring-boot:run" 2>/dev/null || true
      pkill -f "java.*employee" 2>/dev/null || true
      pkill -f "java.*analyst" 2>/dev/null || true
    ignore_errors: true
  - routine: global.cleanup_workspace
