# Test Case: Multi-Function LLM Race Condition - Python
# Verifies per-function tool updates don't delete sibling LLM functions' provider_proxy
# Related Issue: https://github.com/dhyansraj/mcp-mesh/issues/598

name: "Multi-Function LLM Race Condition - Py"
description: "Verify multiple @mesh.llm functions in same agent don't lose provider_proxy"
tags:
  - llm
  - claude
  - race
  - python
  - multi-function
timeout: 150
pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"
test:
  # Copy UC-level Claude provider artifacts
  - name: "Copy Claude provider to workspace"
    handler: shell
    command: "cp -r /uc-artifacts/claude-provider /workspace/"
    capture: copy_provider_output
  # Copy TC-level calculator-agent artifacts
  - name: "Copy calculator-agent to workspace"
    handler: shell
    command: "cp -r /artifacts/calculator-agent /workspace/"
    capture: copy_calc_output
  # Copy TC-level multi-llm-agent artifacts
  - name: "Copy multi-llm-agent to workspace"
    handler: shell
    command: "cp -r /artifacts/multi-llm-agent /workspace/"
    capture: copy_agent_output
  # Create env file with secrets
  - name: "Create env file with secrets"
    handler: secrets
    target: /workspace/.env
  # Verify workspace files
  - name: "Verify workspace files"
    handler: shell
    command: "ls -la /workspace/"
    capture: ls_output
  # Start calculator-agent first (provides tools)
  - name: "Start calculator-agent"
    handler: shell
    command: "meshctl start calculator-agent/main.py -d"
    workdir: /workspace
    capture: start_calc_output
  # Wait for calculator to register
  - name: "Wait for calculator to register"
    handler: wait
    seconds: 3
  # Start Claude provider (provides LLM)
  - name: "Start Claude provider"
    handler: shell
    command: "meshctl start claude-provider/main.py --env-file .env -d"
    workdir: /workspace
    capture: start_provider_output
  # Wait for provider to register
  - name: "Wait for provider to register"
    handler: wait
    seconds: 15
  # Verify both are running
  - name: "Verify calculator and provider running"
    handler: shell
    command: "meshctl list"
    workdir: /workspace
    capture: pre_agent_list_output
  # Start multi-llm-agent (depends on BOTH calculator and claude-provider)
  # This agent has TWO @mesh.llm functions, both with provider and filter
  - name: "Start multi-llm-agent"
    handler: shell
    command: "meshctl start multi-llm-agent/main.py -d"
    workdir: /workspace
    capture: start_agent_output
  # Wait for agent to register and resolve BOTH providers and tools
  # Use longer wait to allow multiple heartbeats — the bug manifests
  # when tool update events for different functions arrive in separate heartbeats
  - name: "Wait for agent to register and resolve dependencies"
    handler: wait
    seconds: 15
  # Verify all agents running
  - name: "Verify all agents running"
    handler: shell
    command: "meshctl list"
    workdir: /workspace
    capture: all_list_output
  # List available tools
  - name: "List available tools"
    handler: shell
    command: "meshctl list -t"
    workdir: /workspace
    capture: tools_output
  # Call math_assistant first
  - name: "Call math_assistant - simple math"
    handler: shell
    command: |
      meshctl call math_assistant '{"ctx": {"question": "What is 2 plus 2?"}}'
    workdir: /workspace
    capture: math_response
  # Small wait between calls
  - name: "Wait between calls"
    handler: wait
    seconds: 2
  # Call science_assistant - THIS is the one likely to fail with the bug
  # Because math_assistant's tool update may have deleted science_assistant's provider_proxy
  - name: "Call science_assistant - simple science"
    handler: shell
    command: |
      meshctl call science_assistant '{"ctx": {"question": "What is the speed of light in meters per second?"}}'
    workdir: /workspace
    capture: science_response
  # Stop all agents
  - name: "Stop all agents"
    handler: shell
    command: "meshctl stop"
    workdir: /workspace
assertions:
  # Calculator started successfully
  - expr: ${captured.pre_agent_list_output} contains 'calculator-agent'
    message: "calculator-agent should appear in meshctl list"
  # Provider started successfully
  - expr: ${captured.pre_agent_list_output} contains 'claude-provider'
    message: "claude-provider should appear in meshctl list"
  # Multi-LLM agent started successfully
  - expr: ${captured.all_list_output} contains 'multi-llm-agent'
    message: "multi-llm-agent should appear in meshctl list"
  # Both tools are registered
  - expr: ${captured.tools_output} contains 'math_assistant'
    message: "math_assistant tool should be listed"
  - expr: ${captured.tools_output} contains 'science_assistant'
    message: "science_assistant tool should be listed"
  # Calculator tools are also visible
  - expr: ${captured.tools_output} contains 'calc_add'
    message: "calc_add tool should be listed"
  # math_assistant response should NOT contain race condition errors
  - expr: ${captured.math_response} not contains 'Mesh provider not resolved'
    message: "math_assistant should NOT have 'Mesh provider not resolved' error"
  - expr: ${captured.math_response} not contains "'NoneType' object is not callable"
    message: "math_assistant should NOT have NoneType error"
  - expr: ${captured.math_response} not contains 'multi-function race bug'
    message: "math_assistant should NOT have race condition RuntimeError"
  # science_assistant response should NOT contain race condition errors
  # This is the KEY assertion — science_assistant is most likely to fail
  # because its provider_proxy gets deleted by math_assistant's tool update
  - expr: ${captured.science_response} not contains 'Mesh provider not resolved'
    message: "science_assistant should NOT have 'Mesh provider not resolved' error"
  - expr: ${captured.science_response} not contains "'NoneType' object is not callable"
    message: "science_assistant should NOT have NoneType error"
  - expr: ${captured.science_response} not contains 'multi-function race bug'
    message: "science_assistant should NOT have race condition RuntimeError"
  # Both responses should contain reasonable answers
  - expr: ${captured.math_response} contains '4'
    message: "math_assistant response should contain the answer 4"
  - expr: ${captured.science_response} contains '299'
    message: "science_assistant response should reference speed of light (~299,792,458 m/s)"
post_run:
  - handler: shell
    command: "meshctl stop 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true
  - routine: global.cleanup_workspace
