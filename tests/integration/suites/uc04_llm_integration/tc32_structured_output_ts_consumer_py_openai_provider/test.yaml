name: "Cross-Runtime Structured Output - TS Consumer -> Py OpenAI"
description: "Verify TypeScript consumer receives structured JSON from Python OpenAI provider"
tags:
  - llm
  - openai
  - structured-output
  - cross-runtime
  - typescript
  - python
timeout: 180
pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"
  - routine: global.setup_environment
    params:
      meshctl_version: "${config.packages.cli_version}"
test:
  - name: "Copy Python OpenAI provider to workspace"
    handler: shell
    command: "cp -r /uc-artifacts/openai-provider /workspace/"
    capture: copy_provider_output
  - name: "Copy TS OpenAI consumer to workspace"
    handler: shell
    command: "cp -r /artifacts/structured-consumer-openai-ts /workspace/"
    capture: copy_consumer_output
  - name: "Create env file with secrets"
    handler: secrets
    target: /workspace/.env
  - name: "Install npm dependencies for TS consumer"
    handler: npm-install
    path: /workspace/structured-consumer-openai-ts
  - name: "Start Python OpenAI provider"
    handler: shell
    workdir: /workspace
    command: "meshctl start openai-provider/main.py --env-file .env -d"
    capture: start_provider_output
  - name: "Wait for provider to register"
    handler: wait
    seconds: 10
  - name: "Verify provider is running"
    handler: shell
    workdir: /workspace
    command: "meshctl list"
    capture: provider_list_output
  - name: "List provider tools"
    handler: shell
    workdir: /workspace
    command: "meshctl list -t"
    capture: provider_tools_output
  - name: "Start TS OpenAI consumer"
    handler: shell
    workdir: /workspace
    command: "meshctl start structured-consumer-openai-ts/src/index.ts --env-file .env --env MCP_MESH_HTTP_PORT=9048 -d"
    capture: start_consumer_output
  - name: "Wait for consumer to register"
    handler: wait
    seconds: 15
  - name: "Verify all agents running"
    handler: shell
    workdir: /workspace
    command: "meshctl list"
    capture: all_list_output
  - name: "List all tools"
    handler: shell
    workdir: /workspace
    command: "meshctl list -t"
    capture: all_tools_output
  - name: "Call get_country_info - France"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call get_country_info '{"ctx": {"country": "France"}}'
    capture: france_response
  - name: "Call get_country_info - Japan"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call get_country_info '{"ctx": {"country": "Japan"}}'
    capture: japan_response
  - name: "Stop all agents"
    handler: shell
    workdir: /workspace
    command: "meshctl stop"
assertions:
  - expr: ${captured.provider_list_output} contains 'openai-provider'
    message: "Python OpenAI provider should appear in meshctl list"
  - expr: ${captured.provider_tools_output} contains 'openai_provider'
    message: "openai_provider tool should be listed"
  - expr: ${captured.all_list_output} contains 'structured-consumer-openai-ts'
    message: "TypeScript OpenAI consumer should appear in meshctl list"
  - expr: ${captured.all_tools_output} contains 'get_country_info'
    message: "get_country_info tool should be listed"
  - expr: "${jq:captured.france_response:.content[0].text | fromjson | .name} icontains 'france'"
    message: "France response name should contain France"
  - expr: "${jq:captured.france_response:.content[0].text | fromjson | .capital} icontains 'paris'"
    message: "France response capital should be Paris"
  - expr: "${jq:captured.france_response:.content[0].text | fromjson | .continent} != ''"
    message: "France response should have a continent"
  - expr: "${jq:captured.japan_response:.content[0].text | fromjson | .name} icontains 'japan'"
    message: "Japan response name should contain Japan"
  - expr: "${jq:captured.japan_response:.content[0].text | fromjson | .capital} icontains 'tokyo'"
    message: "Japan response capital should be Tokyo"
  - expr: ${captured.france_response} not contains 'Expecting value'
    message: "France response should not have JSON parse error"
  - expr: ${captured.japan_response} not contains 'Expecting value'
    message: "Japan response should not have JSON parse error"
post_run:
  - handler: shell
    command: "meshctl stop 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true
  - routine: global.cleanup_workspace
