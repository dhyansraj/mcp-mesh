# Test Case: Cross-Agent Call
# Tests that Agent A can call Agent B's tools via dependency injection.
#
# Scenario:
#   - py-calculator-agent provides calc_add and calc_multiply capabilities
#   - py-report-agent depends on "calc_add" / "calc_multiply"
#   - Calling sum_report triggers cross-agent calls to calc_add
#
# The report agent appends "(local)" to its output when it falls back to
# local computation, so the assertions below verify the result came from
# the mesh-injected dependency, not the local fallback.
#
# Uses UC-level artifacts from /uc-artifacts

name: "Cross-Agent Call"
description: "Verify agent can call another agent's tools via dependency"
tags:
  - tools
  - cross-agent
  - dependency
  - python
timeout: 180

pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"

test:
  # Copy artifacts
  - name: "Copy artifacts to workspace"
    handler: shell
    command: |
      cp -r /uc-artifacts/py-calculator-agent /workspace/
      cp -r /uc-artifacts/py-report-agent /workspace/
    capture: copy_output

  # Start provider. No registration wait before starting the consumer:
  # the consumer's settle window covers dependency arrival order.
  - name: "Start calculator agent (provider)"
    handler: shell
    command: "meshctl start py-calculator-agent/main.py -d"
    workdir: /workspace
    capture: start_calculator

  # Start consumer.
  # MCP_MESH_SETTLE_TIMEOUT=60 (settling-window dependency grace, PR #1200):
  # calls arriving before the calc_add/calc_multiply dependencies resolve are held until
  # resolution lands — the fixed dep-resolution sleeps are gone.
  - name: "Start report agent (consumer)"
    handler: shell
    command: "meshctl start py-report-agent/main.py --env MCP_MESH_SETTLE_TIMEOUT=60 -d"
    workdir: /workspace
    capture: start_report

  # Liveness only: wait for both agents to REGISTER (meshctl call routes via
  # the registry). Dependency resolution is covered by the settle window —
  # no fixed dep-resolution sleep needed.
  - name: "Wait for both agents to register"
    handler: shell
    workdir: /workspace
    command: |
      echo "Waiting for both agents to register..."
      for i in $(seq 1 60); do
        AGENTS=$(meshctl list 2>/dev/null || true)
        if echo "$AGENTS" | grep -q "py-calculator-agent" && echo "$AGENTS" | grep -q "py-report-agent"; then
          echo "Both agents registered after ~${i}s"
          exit 0
        fi
        sleep 1
      done
      echo "ERROR: agents did not register within 60s"
      meshctl list 2>/dev/null || true
      exit 1
    capture: wait_registration
    timeout: 90

  # Verify both agents are registered
  - name: "Verify both agents are registered"
    handler: shell
    command: |
      meshctl list
      if meshctl list 2>/dev/null | grep -q "py-calculator-agent" && \
         meshctl list 2>/dev/null | grep -q "py-report-agent"; then
        echo "PASS: Both agents registered"
      else
        echo "FAIL: Not all agents registered"
        exit 1
      fi
    workdir: /workspace
    capture: both_registered

  # Check wiring status - report-agent should depend on calculator
  - name: "Check wiring status"
    handler: shell
    command: |
      meshctl status
      echo "=== Checking dependencies ==="
      STATUS=$(meshctl status 2>&1)
      if echo "$STATUS" | grep -q "calc_add"; then
        echo "PASS: Dependency on calc_add visible"
      else
        echo "INFO: Dependency might be implicit"
        echo "PASS: Status check complete"
      fi
    workdir: /workspace
    capture: wiring_status

  # Call sum_report which internally calls calc_add
  - name: "Call sum_report (cross-agent)"
    handler: shell
    command: |
      echo "=== Calling sum_report ==="
      RESULT=$(meshctl call sum_report '{"numbers": [1, 2, 3, 4, 5]}' 2>&1)
      echo "Result: $RESULT"
      # The agent appends "(local)" when calc_add is NOT injected - that
      # means the cross-agent call never happened, even if the sum is right.
      if echo "$RESULT" | grep -q "(local)"; then
        echo "FAIL: sum_report used local fallback - calc_add was not injected"
        exit 1
      fi
      # Sum of 1+2+3+4+5 = 15
      if echo "$RESULT" | grep -q "15"; then
        echo "PASS: sum_report cross-agent call worked (mesh-injected calc_add)"
      else
        echo "FAIL: Expected sum of 15"
        exit 1
      fi
    workdir: /workspace
    capture: sum_report_call

  # Call product_report which internally calls calc_multiply
  - name: "Call product_report (cross-agent)"
    handler: shell
    command: |
      echo "=== Calling product_report ==="
      RESULT=$(meshctl call product_report '{"numbers": [2, 3, 4]}' 2>&1)
      echo "Result: $RESULT"
      # "(local)" marks the local fallback - the cross-agent call did not happen.
      if echo "$RESULT" | grep -q "(local)"; then
        echo "FAIL: product_report used local fallback - calc_multiply was not injected"
        exit 1
      fi
      # Product of 2*3*4 = 24
      if echo "$RESULT" | grep -q "24"; then
        echo "PASS: product_report cross-agent call worked (mesh-injected calc_multiply)"
      else
        echo "FAIL: Expected product of 24"
        exit 1
      fi
    workdir: /workspace
    capture: product_report_call

assertions:
  - expr: "${captured.both_registered} contains 'PASS'"
    message: "Both agents should be registered"

  - expr: "${captured.sum_report_call} contains 'PASS'"
    message: "sum_report should call calculator and return correct sum"

  - expr: "${captured.sum_report_call} not contains '(local)'"
    message: "sum_report must use the mesh-injected calc_add, not the local fallback"

  - expr: "${captured.product_report_call} contains 'PASS'"
    message: "product_report should call calculator and return correct product"

  - expr: "${captured.product_report_call} not contains '(local)'"
    message: "product_report must use the mesh-injected calc_multiply, not the local fallback"

post_run:
  - handler: shell
    command: "meshctl stop 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true
  - routine: global.cleanup_workspace
