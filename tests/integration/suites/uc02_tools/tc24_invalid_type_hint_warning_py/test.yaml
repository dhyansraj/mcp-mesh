# Test Case: Invalid Type Hint Warning (Python)
# Verifies that a tool with an unresolvable forward reference type hint
# (e.g. value: "NonExistentType") triggers a warning log from
# signature_analyzer.get_mesh_agent_parameter_names instead of being
# silently swallowed, and that the agent still comes up gracefully.
#
# Regression test for GitHub issue #792.
#
# Uses UC-level artifacts from /uc-artifacts

name: "Invalid Type Hint Warning (Python)"
description: "Verify malformed type hints log a warning and agent degrades gracefully"
tags:
  - tools
  - signature-analyzer
  - logging
  - python
timeout: 120

pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"

test:
  # Copy artifact
  - name: "Copy artifact to workspace"
    handler: shell
    command: |
      cp -r /uc-artifacts/py-bad-hints-agent /workspace/
    capture: copy_output

  # Start agent (must include MCP_MESH_LOG_LEVEL=DEBUG-or-WARNING-or-default
  # default level captures WARNING already)
  - name: "Start agent with invalid type hint"
    handler: shell
    command: "meshctl start py-bad-hints-agent/main.py -d"
    workdir: /workspace
    capture: start_agent

  # Wait for registration
  - name: "Wait for registration"
    handler: wait
    seconds: 10

  # Inspect log file for the warning we emit from signature_analyzer.
  # We grep for the WARNING-level prefix together with the message so
  # a future downgrade to DEBUG/INFO would surface as a test failure.
  - name: "Inspect agent log for signature warning"
    handler: shell
    command: |
      LOG_FILE="$HOME/.mcp-mesh/logs/py-bad-hints-agent.log"
      if [ ! -f "$LOG_FILE" ]; then
        echo "FAIL: Log file not found at $LOG_FILE"
        ls -la "$HOME/.mcp-mesh/logs/" 2>/dev/null || true
        exit 1
      fi
      echo "=== Matching warning lines ==="
      grep -E "WARNING.*Failed to analyze signature for" "$LOG_FILE" || true
      if grep -Eq "WARNING.*Failed to analyze signature for" "$LOG_FILE"; then
        echo "PASS: WARNING-level signature analyzer log was emitted"
      else
        echo "FAIL: Expected 'WARNING ... Failed to analyze signature for' not found in log"
        echo "=== Last 50 log lines ==="
        tail -50 "$LOG_FILE"
        exit 1
      fi
    workdir: /workspace
    capture: log_check

assertions:
  # We do NOT directly assert the agent registers under its declared
  # name. Reason: a separate latent mcp-mesh bug causes
  # @mesh.agent(name=...) config to drop when a sibling @mesh.tool
  # decoration encounters a typing-resolution failure (the very condition
  # this test induces). The agent still registers and reaches healthy —
  # just under an auto-generated 'agent-XXXX' name. The log inspection
  # step above is the real fix verification: the log file's existence at
  # the expected directory-derived path (meshctl uses the agent dir name
  # for log paths, not the registered agent name) AND the WARNING regex
  # match together prove that signature_analyzer no longer silently
  # swallows the type-hint failure.

  # Tightened: assert the WARNING level prefix is present together
  # with the message — a downgrade to DEBUG/INFO would now fail.
  - expr: "${captured.log_check} matches 'WARNING.*Failed to analyze signature for'"
    message: "signature_analyzer should emit a WARNING-level log (not silently swallow or downgrade)"

  - expr: "${captured.log_check} contains 'PASS: WARNING-level signature analyzer log was emitted'"
    message: "Inspection step should report PASS for the WARNING-level grep"

post_run:
  - handler: shell
    command: "meshctl stop 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true
  - routine: global.cleanup_workspace
