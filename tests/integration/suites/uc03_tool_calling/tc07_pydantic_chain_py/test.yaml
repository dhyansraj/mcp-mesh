# UC03-TC07: Python Pydantic model serialization in cross-agent calls
#
# Regression test: Pydantic BaseModel arguments must be correctly
# serialized in the HTTP direct path. Previously orjson could not
# serialize Pydantic models, causing 100% fallback to FastMCP.

name: "Python Pydantic model cross-agent call"
description: "Verify Pydantic BaseModel arguments serialize correctly in HTTP direct path"
tags:
  - tool_calling
  - python
  - pydantic
  - regression
timeout: 300

pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"

test:
  # Copy artifacts to workspace
  - name: "Copy artifacts to workspace"
    handler: shell
    command: "cp -r /artifacts/* /workspace/"

  # Start provider first (no dependencies)
  - name: "Start pydantic-provider"
    handler: shell
    command: "meshctl start py-pydantic-provider/main.py --env MCP_MESH_HTTP_PORT=3010 -d"
    workdir: /workspace
    capture: start_provider_output

  - name: "Wait for provider to register"
    handler: wait
    seconds: 5

  # Start caller (depends on execute_task from provider)
  - name: "Start pydantic-caller"
    handler: shell
    command: "meshctl start py-pydantic-caller/main.py --env MCP_MESH_HTTP_PORT=3011 --env MCP_MESH_LOG_LEVEL=DEBUG -d 2>&1 || echo 'START_FAILED'"
    workdir: /workspace
    capture: start_caller_output

  - name: "Wait for dependency resolution"
    handler: wait
    seconds: 10

  # Debug: Check caller startup logs
  - name: "Debug: Check caller startup logs"
    handler: shell
    command: "meshctl logs pydantic-caller 2>&1 | tail -50 || echo 'NO_CALLER_LOGS'"
    workdir: /workspace
    capture: caller_start_logs

  # Verify both agents are running
  - name: "Verify both agents are running"
    handler: shell
    command: "meshctl list"
    workdir: /workspace
    capture: list_output

  # List tools
  - name: "List all available tools"
    handler: shell
    command: "meshctl list --tools"
    workdir: /workspace
    capture: tools_output

  # Test: Call run_task with Pydantic model arguments
  - name: "Call run_task with Pydantic model args"
    handler: shell
    command: 'meshctl call run_task ''{"request": {"task": "greet", "name": "MCP Mesh", "count": 2}}'' 2>&1 || echo ''CALL_FAILED'''
    workdir: /workspace
    capture: task_result

  # Check caller logs for HTTP path usage
  - name: "Check caller logs for HTTP direct path"
    handler: shell
    command: "meshctl logs pydantic-caller 2>&1 | grep -i 'HTTP call:\\|HTTP transport failed\\|FastMCP fallback' | tail -10; if [ ${PIPESTATUS[1]} -ne 0 ]; then echo 'NO_HTTP_LOG_LINES'; fi"
    workdir: /workspace
    capture: caller_http_logs

  # Get provider logs for debugging
  - name: "Get provider logs"
    handler: shell
    command: "meshctl logs pydantic-provider 2>/dev/null | tail -20 || echo 'no provider logs'"
    workdir: /workspace
    capture: provider_logs

  # Stop all agents
  - name: "Stop all agents"
    handler: shell
    command: "meshctl stop"
    workdir: /workspace

assertions:
  # Both agents running
  - expr: ${captured.list_output} contains 'pydantic-provider'
    message: "pydantic-provider should be running"

  - expr: ${captured.list_output} contains 'pydantic-caller'
    message: "pydantic-caller should be running"

  # Tools available
  - expr: ${captured.tools_output} contains 'run_task'
    message: "run_task tool should be available"

  - expr: ${captured.tools_output} contains 'execute_task'
    message: "execute_task tool should be available"

  # Pydantic model call should succeed with correct result
  - expr: ${captured.task_result} contains 'Hello MCP Mesh'
    message: "Pydantic model arguments should be passed correctly to provider"

  - expr: ${captured.task_result} contains 'provider'
    message: "Response should come from the provider service"

  # HTTP direct path should be used (not FastMCP fallback)
  - expr: ${captured.caller_http_logs} contains 'HTTP call:'
    message: "Cross-agent call should use HTTP direct path"

  - expr: ${captured.caller_http_logs} not_contains 'FastMCP fallback'
    message: "Pydantic serialization should not cause fallback to FastMCP"

post_run:
  - handler: shell
    command: "meshctl stop 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true
  - routine: global.cleanup_workspace
