# tc09_cancel_aborts_outbound_http_java — Java port of uc21/tc09.
#
# Three-agent chain (all Java):
#   consumer (commission_downstream)
#     -> provider.report_with_downstream_call (task=true, injects
#        slow_downstream McpMeshTool dependency)
#         -> downstream-sleeper-java.slow_downstream (sleeps 30s)
#
# After submit, wait until the producer has flushed its first progress
# update ("calling downstream") — i.e. it is mid-downstream-call — then
# cancel. The producer's JobController cancel token fires (#889 Phase A)
# and aborts the in-flight McpHttpClient request to slow_downstream
# (#900), so the job reaches status=cancelled in well under the 30s the
# sleeper would otherwise sleep.
#
# Wave 1 (feat/java-claim-path-parity) brought the Java claim path to
# parity with Python: a task=true producer may now declare McpMeshTool /
# @Selector dependencies and have them resolved + injected on the claim
# path. The fixture's report_with_downstream_call therefore takes a real
# injected `slow_downstream` McpMeshTool dependency and calls it via the
# SDK's McpHttpClient proxy path — the same surface #900's outbound
# abort hook instruments — instead of hand-rolling a java.net.http call.
# This mirrors Python's uc21/tc09 (slow_downstream McpMeshAgent dep)
# exactly, so the assertions are now the producer-side correctness ones:
#   (1) cancel ack ok
#   (2) final status == cancelled
#   (3) status is NOT completed (proves the in-flight downstream call
#       was aborted, not awaited to natural finish)
#   (4) progress frozen at "calling downstream" (cancel landed while the
#       producer was still inside the downstream call)
#
# NOTE on the downstream `sleep CANCELLED` marker: as in Python's
# uc21/tc09, the sleeper writes that line from its interrupt handler,
# but inbound client-disconnect is not currently surfaced to the
# downstream handler — so the sleeper keeps running past the
# producer-side cancel and the marker never lands. The producer-side
# correctness is still fully proven by (1)-(4) above. The downstream
# propagation gap is tracked separately (#886-style).

name: "MeshJob Java: cancel aborts in-flight downstream HTTP call"
description: "Java — provider injects slow_downstream and calls it (30s); cancel must abort the in-flight McpHttpClient call and finish cancelled, not completed"
tags:
  - meshjob
  - java
  - issue-890
  - issue-889
  - issue-900
  - cancel
  - propagation
timeout: 480

pre_run:
  - routine: global.setup_for_java_agent

test:
  - name: "Copy artifacts"
    handler: shell
    workdir: /workspace
    command: |
      cp -rL /uc-artifacts/long-task-provider-java /workspace/
      cp -rL /uc-artifacts/long-task-consumer-java /workspace/
      cp -rL /uc-artifacts/downstream-sleeper-java /workspace/

  - name: "Install provider deps"
    handler: maven-install
    path: /workspace/long-task-provider-java
    timeout: 600

  - name: "Install consumer deps"
    handler: maven-install
    path: /workspace/long-task-consumer-java
    timeout: 600

  - name: "Install sleeper deps"
    handler: maven-install
    path: /workspace/downstream-sleeper-java
    timeout: 600

  - routine: start_registry_with_fast_sweep

  - name: "Start downstream-sleeper-java (port 9122) FIRST"
    handler: shell
    workdir: /workspace
    command: meshctl start downstream-sleeper-java --env MCP_MESH_HTTP_PORT=9122 -d

  - name: "Wait for sleeper healthy"
    handler: shell
    workdir: /workspace
    command: |
      for i in $(seq 1 60); do
        S=$(curl -s http://localhost:8000/agents | jq -r '.agents[] | select(.name=="downstream-sleeper-java") | .status' 2>/dev/null)
        [ "$S" = "healthy" ] && exit 0; sleep 2
      done; exit 1
    timeout: 150

  - name: "Start provider (port 9120)"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-provider-java --env MCP_MESH_HTTP_PORT=9120 --env MCP_MESH_SETTLE_TIMEOUT=60 -d

  - name: "Wait for provider healthy"
    handler: shell
    workdir: /workspace
    command: |
      for i in $(seq 1 60); do
        S=$(curl -s http://localhost:8000/agents | jq -r '.agents[] | select(.name=="long-task-provider-java") | .status' 2>/dev/null)
        [ "$S" = "healthy" ] && exit 0; sleep 2
      done; exit 1
    timeout: 150

  - name: "Start consumer (port 9121)"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-consumer-java --env MCP_MESH_HTTP_PORT=9121 --env MCP_MESH_SETTLE_TIMEOUT=60 -d

  # Liveness only: wait until all named agents are registered AND healthy
  # (Java startup is slow and can flap). DI resolution — including the
  # provider's slow_downstream dep on the claim path — is covered by the
  # settle window (MCP_MESH_SETTLE_TIMEOUT=60 on provider + consumer).
  - name: "Wait for all three agents healthy"
    handler: shell
    workdir: /workspace
    command: |
      for i in $(seq 1 60); do
        AGENTS=$(curl -s http://localhost:8000/agents)
        OK=1
        S=$(echo "$AGENTS" | jq -r '.agents[] | select(.name=="downstream-sleeper-java") | .status' 2>/dev/null)
        [ "$S" = "healthy" ] || OK=0
        S=$(echo "$AGENTS" | jq -r '.agents[] | select(.name=="long-task-provider-java") | .status' 2>/dev/null)
        [ "$S" = "healthy" ] || OK=0
        S=$(echo "$AGENTS" | jq -r '.agents[] | select(.name=="long-task-consumer-java") | .status' 2>/dev/null)
        [ "$S" = "healthy" ] || OK=0
        if [ "$OK" = "1" ]; then
          echo "all agents healthy after ${i}x2s"
          exit 0
        fi
        sleep 2
      done
      echo "ERROR: agents not healthy within 120s"
      meshctl logs downstream-sleeper-java 2>&1 | tail -50 || true
      meshctl logs long-task-provider-java 2>&1 | tail -50 || true
      meshctl logs long-task-consumer-java 2>&1 | tail -50 || true
      curl -s http://localhost:8000/agents | jq '.agents[] | {name, status, last_seen}'
      exit 1
    timeout: 150

  - name: "Submit job that calls downstream"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call commission_downstream '{"user_id":"alice"}' --raw
    capture: submit_resp
    timeout: 30

  # Deterministic pre-cancel gate (mirror of Python uc21/tc09): poll the
  # job status until the producer has claimed AND flushed the 0.1 /
  # "calling downstream" progress update — i.e. it is mid-downstream
  # call. The downstream sleeper sleeps 30s, so cancelling any time
  # inside this window preserves the test's semantics. Per #889 the
  # registry-side cancel handler always succeeds, so this gate also
  # guards against a false pass where the producer never reached the
  # downstream call.
  - name: "Wait until producer is mid-downstream call"
    handler: shell
    workdir: /workspace
    command: |
      JOB_ID=$(echo '${captured.submit_resp}' | jq -r '.content[0].text | fromjson | .job_id')
      echo "JOB_ID=${JOB_ID}"
      for i in $(seq 1 30); do
        STATUS=$(meshctl call __mesh_job_status "{\"job_id\":\"${JOB_ID}\"}" 2>/dev/null || true)
        if echo "$STATUS" | grep -q "calling downstream"; then
          echo "producer is mid-downstream after ~${i}s"
          exit 0
        fi
        sleep 1
      done
      echo "ERROR: producer never reached 'calling downstream' within 30s"
      echo "$STATUS"
      curl -s "http://localhost:8000/jobs/${JOB_ID}" | jq .
      exit 1
    capture: wait_middownstream
    timeout: 45

  - name: "Cancel the job"
    handler: shell
    workdir: /workspace
    command: |
      JOB_ID=$(echo '${captured.submit_resp}' | jq -r '.content[0].text | fromjson | .job_id')
      echo "JOB_ID=${JOB_ID}"
      meshctl call __mesh_job_cancel "{\"job_id\":\"${JOB_ID}\"}"
    capture: cancel_response
    timeout: 15

  # Should propagate within a few seconds — definitely well below the
  # 30s sleep that's still running on the sleeper.
  - name: "Wait for cancel to propagate"
    handler: wait
    seconds: 8

  - name: "Read final status + sleeper log"
    handler: shell
    workdir: /workspace
    command: |
      JOB_ID=$(echo '${captured.submit_resp}' | jq -r '.content[0].text | fromjson | .job_id')
      echo "=== final status ==="
      meshctl call __mesh_job_status "{\"job_id\":\"${JOB_ID}\"}"
      echo
      echo "=== downstream-sleeper-java log tail ==="
      meshctl logs downstream-sleeper-java 2>&1 | tail -30
    capture: final_check

assertions:
  - expr: "${captured.cancel_response} contains '\\\"ok\\\":true'"
    message: "cancel should ack with ok:true"
  - expr: "${captured.final_check} contains '\\\"status\\\":\\\"cancelled\\\"'"
    message: "job status should be cancelled"
  # The progress at cancel time should still reflect the producer being
  # mid-downstream-call (progress=0.1, message="calling downstream"). If
  # the cancel had not propagated through the downstream call, the
  # producer would have continued past updateProgress(0.1, "calling
  # downstream") and either reached complete() or hung — neither of
  # which leaves the row cancelled with that exact mid-call progress.
  - expr: "${captured.final_check} contains 'calling downstream'"
    message: "cancel should land while producer is still in the downstream call (progress message frozen at 'calling downstream')"
  - expr: "${captured.final_check} not contains '\\\"status\\\":\\\"completed\\\"'"
    message: "the producer should NOT have reached complete() — the downstream HTTP must have been aborted, not awaited to natural finish"

post_run:
  - routine: stop_all
  - routine: global.cleanup_workspace
