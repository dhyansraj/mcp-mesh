# tc24_event_injection_happy_path — recv_event / post_event happy path (issue #1032).
#
# Verifies the basic event-injection round trip end-to-end through a real
# registry and two real Python agents:
#
#   1. Producer task=True tool ``run_with_event`` parks on
#      ``await job.recv_event(types=["signal"], timeout_secs=10.0)``.
#   2. Consumer's ``commission_event`` submits the job, sleeps ~2s so the
#      producer reaches the long-poll, then calls the Phase C helper
#      ``mesh.jobs.post_event(job_id, "signal", {"hello": "world", "n": 42})``.
#   3. The registry persists the event, the producer's long-poll wakes,
#      ``recv_event`` returns the event dict, the handler returns it via
#      ``job.complete(...)``.
#   4. Consumer awaits ``proxy.wait()`` and surfaces the structured payload.
#
# Asserts:
#   - the producer returned ``status=got_event`` (not ``timeout``)
#   - the payload echoes ``{"hello": "world", "n": 42}`` exactly
#   - the receipt's seq is 1 (first event posted into this job)
#
# This is the headline regression for the Phase C ``mesh.jobs.post_event``
# helper in a real-agent context — the unit tests cover the helper itself
# but they bind to a fake registry HTTP server, so this is the first time
# we exercise the helper from inside a running ``@app.tool()`` body.

name: "MeshJob: post_event helper wakes a producer parked on recv_event"
description: "Producer recv_event → consumer post_event → handler completes with event payload"
tags:
  - meshjob
  - python
  - issue-1032
  - events
timeout: 90

pre_run:
  - routine: global.setup_for_python_agent

test:
  - name: "Copy artifacts"
    handler: shell
    workdir: /workspace
    command: |
      cp -rL /uc-artifacts/long-task-provider /workspace/
      cp -rL /uc-artifacts/long-task-consumer /workspace/

  - name: "Install provider deps"
    handler: pip-install
    path: /workspace/long-task-provider

  - name: "Install consumer deps"
    handler: pip-install
    path: /workspace/long-task-consumer

  - routine: start_registry_with_fast_sweep

  - name: "Start provider (port 9100)"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-provider/main.py --env MCP_MESH_HTTP_PORT=9100 -d

  - name: "Start consumer (port 9101)"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-consumer/main.py --env MCP_MESH_HTTP_PORT=9101 --env MCP_MESH_SETTLE_TIMEOUT=60 -d

  # Liveness only: wait for both agents to REGISTER (meshctl call routes via
  # the registry). Dependency resolution is covered by the settle window —
  # no fixed dep-resolution sleep needed.
  - name: "Wait for both agents to register"
    handler: shell
    workdir: /workspace
    command: |
      echo "Waiting for both agents to register..."
      for i in $(seq 1 60); do
        AGENTS=$(meshctl list 2>/dev/null || true)
        if echo "$AGENTS" | grep -q "long-task-provider" && echo "$AGENTS" | grep -q "long-task-consumer"; then
          echo "Both agents registered after ~${i}s"
          exit 0
        fi
        sleep 1
      done
      echo "ERROR: agents did not register within 60s"
      meshctl list 2>/dev/null || true
      exit 1
    capture: wait_registration
    timeout: 90

  - name: "Call commission_event — submit, post one event, wait for result"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call commission_event '{}'
    capture: commission_response
    timeout: 60

assertions:
  # MCP envelope check: must not be an error response.
  - expr: "${captured.commission_response} not contains '\"isError\": true'"
    message: "commission_event should NOT return an MCP error envelope"
  # Producer reached recv_event AND woke on the posted signal.
  - expr: "${captured.commission_response} contains '\"status\": \"got_event\"'"
    message: "producer must report status=got_event (proves recv_event woke on the post)"
  - expr: "${captured.commission_response} not contains '\"status\": \"timeout\"'"
    message: "producer must NOT have timed out — the post should have woken it"
  # Payload echo: full event payload must round-trip through the registry.
  - expr: "${captured.commission_response} contains '\"hello\": \"world\"'"
    message: "payload string field must round-trip through recv_event"
  - expr: "${captured.commission_response} contains '\"n\": 42'"
    message: "payload numeric field must round-trip through recv_event"
  - expr: "${captured.commission_response} contains '\"type\": \"signal\"'"
    message: "event type must be surfaced on the producer side"
  # Receipt seq: this was the first event posted into the job.
  - expr: "${captured.commission_response} contains '\"post_seq\": 1'"
    message: "first post_event into a fresh job must return seq=1"

post_run:
  - routine: stop_all
  - routine: global.cleanup_workspace
