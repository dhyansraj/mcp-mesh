# tc23_retry_on_raise — fast retry path via @mesh.tool(retry_on=...).
#
# Producer fixture ``report_with_transient_failures`` raises
# ``OSError`` on the first 2 attempts and succeeds on the 3rd. The tool
# is decorated with ``retry_on=(OSError,)`` so the SDK calls
# ``controller.release_lease(reason)`` instead of ``controller.fail()``
# — the registry resets ``owner_instance_id`` (claim already counted
# this attempt; release does NOT increment), and the next claim cycle
# (~5s) re-runs the handler and bumps attempt_count for that attempt.
#
# Asserts:
#   - status=completed
#   - attempt_count=3 (initial + 2 retries via release-lease path)
#   - total wall time < 30s — proves the fast retry path engaged. Lease-
#     expiry recovery would take ~max_duration seconds per attempt
#     (here 30s), so 3 attempts would push past 60s.
#
# Tags: retry, issue-879

name: "MeshJob: retry_on per-tool exception whitelist drives fast retry"
description: "Handler raises OSError on attempts 1+2, succeeds on 3; retry_on=(OSError,) → release_lease path completes within ~15s"
tags:
  - meshjob
  - python
  - issue-879
  - retry
timeout: 90

pre_run:
  - routine: global.setup_for_python_agent

test:
  - name: "Reset retry counter from any prior run"
    handler: shell
    workdir: /workspace
    command: |
      rm -f /tmp/mesh-retry-on-counter || true
      echo "counter cleared"

  - name: "Copy artifacts"
    handler: shell
    workdir: /workspace
    command: |
      cp -rL /uc-artifacts/long-task-provider /workspace/
      cp -rL /uc-artifacts/long-task-consumer /workspace/

  - name: "Install provider deps"
    handler: pip-install
    path: /workspace/long-task-provider

  - name: "Install consumer deps"
    handler: pip-install
    path: /workspace/long-task-consumer

  - routine: start_registry_with_fast_sweep

  - name: "Start provider"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-provider/main.py --env MCP_MESH_HTTP_PORT=9100 -d

  - name: "Start consumer"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-consumer/main.py --env MCP_MESH_HTTP_PORT=9101 --env MCP_MESH_SETTLE_TIMEOUT=60 -d

  # Liveness only: wait for both agents to REGISTER (meshctl call routes via
  # the registry). Dependency resolution is covered by the settle window —
  # no fixed dep-resolution sleep needed.
  - name: "Wait for both agents to register"
    handler: shell
    workdir: /workspace
    command: |
      echo "Waiting for both agents to register..."
      for i in $(seq 1 60); do
        AGENTS=$(meshctl list 2>/dev/null || true)
        if echo "$AGENTS" | grep -q "long-task-provider" && echo "$AGENTS" | grep -q "long-task-consumer"; then
          echo "Both agents registered after ~${i}s"
          exit 0
        fi
        sleep 1
      done
      echo "ERROR: agents did not register within 60s"
      meshctl list 2>/dev/null || true
      exit 1
    capture: wait_registration
    timeout: 90

  - name: "Capture wall-clock start"
    handler: shell
    workdir: /workspace
    command: date +%s
    capture: ts_start

  - name: "Submit transient-failures job: max_retries=3, transient_failures=2"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call commission_transient_failures \
        '{"user_id":"alice","max_retries":3,"transient_failures":2,"wait_timeout_secs":40}'
    capture: commission_response
    timeout: 60

  - name: "Capture wall-clock end"
    handler: shell
    workdir: /workspace
    command: date +%s
    capture: ts_end

  - name: "Compute elapsed wall-clock seconds"
    handler: shell
    workdir: /workspace
    command: |
      START='${captured.ts_start}'
      END='${captured.ts_end}'
      START_NUM=$(echo "$START" | tr -d -c '0-9')
      END_NUM=$(echo "$END" | tr -d -c '0-9')
      echo "elapsed=$((END_NUM - START_NUM))"
    capture: elapsed

  - name: "Read final job status"
    handler: shell
    workdir: /workspace
    command: |
      JOB_ID=$(echo '${captured.commission_response}' | jq -r '.. | objects | select(has("job_id")) | .job_id' | head -1)
      echo "JOB_ID=${JOB_ID}"
      curl -s "http://localhost:8000/jobs/${JOB_ID}" | jq '{status,attempt_count,error}'
    capture: final_status

  # Fast retry: 3 attempts via release_lease should land in <30s. Lease-
  # expiry recovery (the slow path) would require waiting for the lease
  # to time out per attempt, pushing total well past 60s. Numeric guard
  # avoids the false-positive/false-negative pitfalls of substring checks.
  - name: "Assert elapsed wall-clock < 30s (fast retry, not lease-expiry)"
    handler: shell
    workdir: /workspace
    command: |
      ELAPSED=$(echo '${captured.elapsed}' | grep -oE 'elapsed=[0-9]+' | sed 's/elapsed=//')
      if [ -z "$ELAPSED" ]; then
        echo "ERROR: could not extract elapsed from: ${captured.elapsed}"
        exit 1
      fi
      if [ "$ELAPSED" -ge 30 ]; then
        echo "ERROR: elapsed=$ELAPSED >= 30s — likely hit lease-expiry slow path"
        exit 1
      fi
      echo "OK: elapsed=$ELAPSED < 30s (fast retry path)"

assertions:
  - expr: "${captured.final_status} contains '\"status\": \"completed\"'"
    message: "job must complete successfully on the 3rd attempt"
  - expr: "${captured.final_status} contains '\"attempt_count\": 3'"
    message: "attempt_count must be 3 — initial + 2 retries via release_lease path"
  - expr: "${captured.commission_response} contains 'succeeded_on_attempt'"
    message: "consumer should see the success-marker payload"

post_run:
  - routine: stop_all
  - routine: global.cleanup_workspace
  - name: "Clean up retry counter file"
    handler: shell
    workdir: /workspace
    command: rm -f /tmp/mesh-retry-on-counter || true
