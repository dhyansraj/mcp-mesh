# tc02_tasks_send_sync — Python consumer ↔ TS producer sync round-trip (issue #933 Chunk 1C-integration).
#
# Polyglot pairing: a known-good Python A2A consumer
# (examples/a2a/consumer_date_agent.py) bridges the TS producer's
# get-date skill onto the mesh as a regular current-date capability,
# then meshctl call drives the consumer end-to-end. This exercises:
#
#   - TS mesh.a2a.mount(...) JSON-RPC dispatch (tasks/send → state=completed)
#   - Artifact-text round-trip (handler object → JSON-stringified into
#     parts[0].text → consumer json.loads back to dict)
#   - TS-side DDDI: producer's dependencies=["date_service"] resolves
#     against the Python system-agent (cross-runtime DDDI inside an A2A
#     handler).
#
# Same artifact-text contract as uc25 tc02 (Python ↔ Python) and uc28
# tc02 (Python ↔ Java) — the only moving piece is which runtime owns
# the producer. tc02's success here proves the TS producer is
# wire-compatible with the existing Python consumer ecosystem.

name: "A2A Producer (TS): tasks/send sync via Python consumer"
description: "Python consumer drives TS mesh.a2a.mount tasks/send → state=completed → artifact text round-trip"
tags:
  - a2a
  - typescript
  - polyglot
  - smoke
  - issue-933
  - producer
timeout: 900

pre_run:
  - routine: global.setup_for_python_agent
  - routine: global.setup_for_typescript_agent

test:
  - name: "Copy artifacts"
    handler: shell
    workdir: /workspace
    command: |
      cp -rL /uc-artifacts/system-agent /workspace/
      cp -rL /uc-artifacts/producer-date-agent-ts /workspace/
      cp -rL /uc-artifacts/consumer-date-agent /workspace/

  - name: "Install system-agent deps"
    handler: pip-install
    path: /workspace/system-agent

  - name: "Install producer-date-agent-ts deps"
    handler: npm-install
    path: /workspace/producer-date-agent-ts

  - name: "Install consumer-date-agent deps"
    handler: pip-install
    path: /workspace/consumer-date-agent

  - routine: start_registry_a2a

  - name: "Start system-agent (port 9100, provides date_service)"
    handler: shell
    workdir: /workspace
    command: meshctl start system-agent/main.py --env MCP_MESH_HTTP_PORT=9100 -d

  - name: "Start producer-date-agent-ts (port 9090)"
    handler: shell
    workdir: /workspace
    command: meshctl start producer-date-agent-ts/src/index.ts --env MCP_MESH_HTTP_PORT=9090 --env MCP_MESH_SETTLE_TIMEOUT=60 -d

  - name: "Wait for TS producer to be healthy + a2a"
    handler: shell
    workdir: /workspace
    command: |
      for i in $(seq 1 75); do
        RESP=$(curl -fsS --max-time 10 http://localhost:8000/agents 2>/dev/null || echo "")
        STATUS=$(echo "$RESP" | jq -r '.agents[] | select(.name=="date-a2a-agent") | .status' 2>/dev/null || echo "")
        TYPE=$(echo "$RESP" | jq -r '.agents[] | select(.name=="date-a2a-agent") | .agent_type' 2>/dev/null || echo "")
        if [ "$STATUS" = "healthy" ] && [ "$TYPE" = "a2a" ]; then
          echo "TS producer healthy after ${i}x2s"
          exit 0
        fi
        sleep 2
      done
      echo "ERROR: TS producer not healthy within 150s (last status='$STATUS' type='$TYPE')"
      meshctl logs producer-date-agent-ts 2>&1 | tail -120 || true
      exit 1
    timeout: 150

  - name: "Start consumer-date-agent (port 9201)"
    handler: shell
    workdir: /workspace
    command: meshctl start consumer-date-agent/main.py --env MCP_MESH_SETTLE_TIMEOUT=60 -d

  # Liveness only: poll for consumer registration (replaces the fixed sleep).
  # DI resolution is covered by the settle window (MCP_MESH_SETTLE_TIMEOUT=60).

  - name: "Wait for consumer registration"
    handler: shell
    workdir: /workspace
    command: |
      for i in $(seq 1 60); do
        AGENTS=$(meshctl list 2>/dev/null || true)
        if echo "$AGENTS" | grep -q "date-consumer"; then
          echo "Registered after $((i*1))s"
          exit 0
        fi
        sleep 1
      done
      echo "ERROR: not registered within 60s"
      meshctl list 2>/dev/null || true
      exit 1
    capture: wait_consumer
    timeout: 90

  - name: "Verify all 3 agents registered"
    handler: shell
    workdir: /workspace
    command: meshctl list
    capture: agent_list

  - name: "Call the consumer's current-date tool (drives TS producer via A2A)"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call current_date '{}' --raw
    capture: tool_response
    timeout: 30

  # ALSO call the TS producer directly with raw JSON-RPC to assert the
  # exact wire shape (state=completed, artifacts[0].name=result, etc.)
  # per spec §4.3.
  - name: "POST tasks/send directly to TS producer"
    handler: shell
    workdir: /workspace
    command: |
      curl -s -X POST http://localhost:9090/agents/date \
        -H 'Content-Type: application/json' \
        -d '{"jsonrpc":"2.0","id":1,"method":"tasks/send","params":{"id":"t1","message":{"role":"user","parts":[{"type":"text","text":"now"}]}}}'
    capture: direct_send_response
    timeout: 15

assertions:
  - expr: "${captured.agent_list} contains 'system-agent'"
    message: "system-agent should be registered"
  - expr: "${captured.agent_list} contains 'date-a2a-agent'"
    message: "TS producer should be registered"
  - expr: "${captured.agent_list} contains 'date-consumer'"
    message: "Python consumer should be registered"

  # Direct JSON-RPC: verify the wire shape (spec §4.3).
  - expr: "${captured.direct_send_response} contains '\"state\":\"completed\"'"
    message: "sync handler should yield state=completed"
  - expr: "${captured.direct_send_response} contains '\"id\":\"t1\"'"
    message: "envelope should echo the submitted task id"
  - expr: "${captured.direct_send_response} contains '\"sessionId\":\"t1\"'"
    message: "sessionId should default to task id"
  - expr: "${captured.direct_send_response} contains '\"artifacts\"'"
    message: "envelope should carry artifacts array"
  - expr: "${captured.direct_send_response} contains '\"name\":\"result\"'"
    message: "artifact[0].name should be 'result'"
  - expr: "${captured.direct_send_response} contains 'date'"
    message: "artifact text should carry the JSON-stringified {date: ...} payload"

  # End-to-end via Python consumer: the consumer parsed parts[0].text as
  # JSON and returns the original {"date": ...} dict to meshctl.
  - expr: "${captured.tool_response} not contains '\"isError\": true'"
    message: "tool call should not return an MCP error envelope"
  - expr: "${captured.tool_response} contains 'date'"
    message: "tool response should carry the producer's date payload"

post_run:
  - routine: stop_all
  - routine: global.cleanup_workspace
