# tc24_event_injection_happy_path_ts — TS port of uc21/tc24
# (recvEvent / postEvent happy path; issue #1032 / PR #1041).
#
# Verifies the basic event-injection round trip end-to-end through a real
# registry and two real TypeScript agents:
#
#   1. Producer task=true tool `run_with_event` parks on
#      `await job.recvEvent(["signal"], 10)`.
#   2. Consumer's `commission_event` submits the job, sleeps ~2s so the
#      producer reaches the long-poll, then calls the new SDK helper
#      `mesh.jobs.postEvent(jobId, "signal", {hello: "world", n: 42})`.
#   3. The registry persists the event, the producer's long-poll wakes,
#      `recvEvent` returns the event object, the handler returns it via
#      `job.complete(...)`.
#   4. Consumer awaits `proxy.wait()` and surfaces the structured payload.
#
# Asserts:
#   - the producer returned `status=got_event` (not `timeout`)
#   - the payload echoes `{hello: "world", n: 42}` exactly
#   - the receipt's seq is 1 (first event posted into this job)
#
# This is the TS headline regression for the new `mesh.jobs.postEvent`
# helper in a real-agent context — the unit tests cover the helper
# itself but they mock the napi-rs binding, so this is the first time we
# exercise the helper from inside a running tool body.

name: "MeshJob TS: postEvent helper wakes a producer parked on recvEvent"
description: "TS producer recvEvent → TS consumer postEvent → handler completes with event payload"
tags:
  - meshjob
  - typescript
  - issue-1032
  - events
timeout: 90

pre_run:
  - routine: global.setup_for_typescript_agent

test:
  - name: "Copy artifacts"
    handler: shell
    workdir: /workspace
    command: |
      cp -rL /uc-artifacts/long-task-provider-ts /workspace/
      cp -rL /uc-artifacts/long-task-consumer-ts /workspace/

  - name: "Install provider deps"
    handler: npm-install
    path: /workspace/long-task-provider-ts

  - name: "Install consumer deps"
    handler: npm-install
    path: /workspace/long-task-consumer-ts

  - routine: start_registry_with_fast_sweep

  - name: "Start provider (port 9110)"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-provider-ts/src/index.ts --env MCP_MESH_HTTP_PORT=9110 -d

  - name: "Wait for provider registration"
    handler: wait
    seconds: 15

  - name: "Start consumer (port 9111)"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-consumer-ts/src/index.ts --env MCP_MESH_HTTP_PORT=9111 -d

  - name: "Wait for consumer + DI resolution"
    handler: wait
    seconds: 22

  - name: "Call commission_event — submit, post one event, wait for result"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call commission_event '{}'
    capture: commission_response
    timeout: 60

assertions:
  # MCP envelope check: must not be an error response. TS runtime emits
  # compact JSON (no spaces) so the assertion form differs from the
  # Python suite's `\"isError\": true` shape.
  - expr: "${captured.commission_response} not contains '\"isError\":true'"
    message: "commission_event should NOT return an MCP error envelope"
  # Producer reached recvEvent AND woke on the posted signal. TS
  # serializes compactly; meshctl JSON-escapes the inner text so the
  # captured string carries `\"status\":\"got_event\"`.
  - expr: "${captured.commission_response} contains '\\\"status\\\":\\\"got_event\\\"'"
    message: "producer must report status=got_event (proves recvEvent woke on the post)"
  - expr: "${captured.commission_response} not contains '\\\"status\\\":\\\"timeout\\\"'"
    message: "producer must NOT have timed out — the post should have woken it"
  # Payload echo: full event payload must round-trip through the registry.
  - expr: "${captured.commission_response} contains '\\\"hello\\\":\\\"world\\\"'"
    message: "payload string field must round-trip through recvEvent"
  - expr: "${captured.commission_response} contains '\\\"n\\\":42'"
    message: "payload numeric field must round-trip through recvEvent"
  - expr: "${captured.commission_response} contains '\\\"type\\\":\\\"signal\\\"'"
    message: "event type must be surfaced on the producer side"
  # Receipt seq: this was the first event posted into the job.
  - expr: "${captured.commission_response} contains '\\\"post_seq\\\":1'"
    message: "first postEvent into a fresh job must return seq=1"

post_run:
  - routine: stop_all
  - routine: global.cleanup_workspace
