# tc27_subscribe_events_streams_observer_pattern_ts — TS port of uc21/tc27
# (JobProxy.subscribeEvents observer pattern; issue #1048, follow-up to
# #1047 which shipped the Python vertical).
#
# Verifies the consumer-side observer iterator built on the
# `mesh.jobs.subscribeEvents` async generator. Unlike `recvEvent`
# (single per-controller cursor that advances on consumption),
# `subscribeEvents` is an OBSERVER — it has a per-call cursor, so
# multiple subscribers can watch the same job's events without
# disturbing the producer's consumption.
#
# Sequence (driven by `commission_subscribe_observer`):
#   1. Submit `run_until_done` (producer that consumes 'work' events
#      until one carries `{ final: true }`).
#   2. Spawn a subscriber via `mesh.jobs.subscribeEvents(jobId,
#      { types: ["work"] })` in a background async task. It collects
#      every 'work' event into an array, breaks when it sees
#      `{ final: true }`.
#   3. Concurrently post 3 'work' events with `mesh.jobs.postEvent`,
#      the 3rd carrying `{ final: true }`.
#   4. Wait for both the subscriber + `proxy.wait()` to complete.
#
# Asserts:
#   - producer's job result has `status=done` + `processed_count=3`
#     (proves the recvEvent side consumed all 3 in order)
#   - subscriber observed all 3 events
#     (proves subscribeEvents runs independently of the producer's cursor)
#   - subscriber_status == "ok" (no observer timeout)
#   - posted seqs are 1/2/3 (first events on a fresh job)
#
# This is the headline regression for the TS `mesh.jobs.subscribeEvents`
# async iterator surface — unit tests cover the helper itself but they
# mock the napi binding, so this is the first time we exercise the
# iterator against a real registry + Rust core.

name: "MeshJob TS: subscribeEvents streams events to an observer running alongside the producer"
description: "TS producer recvEvent + TS observer subscribeEvents run independently against the same event stream"
tags:
  - meshjob
  - typescript
  - issue-1048
  - events
  - subscribe
timeout: 90

pre_run:
  - routine: global.setup_for_typescript_agent

test:
  - name: "Copy artifacts"
    handler: shell
    workdir: /workspace
    command: |
      cp -rL /uc-artifacts/long-task-provider-ts /workspace/
      cp -rL /uc-artifacts/long-task-consumer-ts /workspace/

  - name: "Install provider deps"
    handler: npm-install
    path: /workspace/long-task-provider-ts

  - name: "Install consumer deps"
    handler: npm-install
    path: /workspace/long-task-consumer-ts

  - routine: start_registry_with_fast_sweep

  - name: "Start provider (port 9110)"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-provider-ts/src/index.ts --env MCP_MESH_HTTP_PORT=9110 -d

  - name: "Wait for provider registration"
    handler: wait
    seconds: 15

  - name: "Start consumer (port 9111)"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-consumer-ts/src/index.ts --env MCP_MESH_HTTP_PORT=9111 -d

  - name: "Wait for consumer + DI resolution"
    handler: wait
    seconds: 22

  - name: "Call commission_subscribe_observer — submit, post 3 events, observe via subscribeEvents"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call commission_subscribe_observer '{}'
    capture: commission_response
    timeout: 60

assertions:
  # MCP envelope check: must not be an error response. TS runtime emits
  # compact JSON (no spaces) so the assertion form differs from the
  # Python suite's `\"isError\": true` shape.
  - expr: "${captured.commission_response} not contains '\"isError\":true'"
    message: "commission_subscribe_observer should NOT return an MCP error envelope"

  # Subscriber finished cleanly (no observer timeout). TS serializes
  # compactly; meshctl JSON-escapes the inner text so the captured
  # string carries `\"subscriber_status\":\"ok\"`.
  - expr: "${captured.commission_response} contains '\\\"subscriber_status\\\":\\\"ok\\\"'"
    message: "subscriber task must complete cleanly (observed the final event before timeout)"
  - expr: "${captured.commission_response} not contains '\\\"subscriber_status\\\":\\\"timeout\\\"'"
    message: "subscriber must NOT have timed out — the final event should have arrived in time"

  # Observer-side event count: subscribeEvents yields all 3 'work' events.
  - expr: "${captured.commission_response} contains '\\\"observed_count\\\":3'"
    message: "subscribeEvents must yield all 3 'work' events the consumer posted (observer cursor is independent of producer's)"

  # Producer-side processing: recvEvent also consumed all 3 events.
  - expr: "${captured.commission_response} contains '\\\"processed_count\\\":3'"
    message: "producer must have processed all 3 'work' events via recvEvent (independent cursor from subscriber)"
  - expr: "${captured.commission_response} contains '\\\"status\\\":\\\"done\\\"'"
    message: "producer must report status=done after observing the final event"

  # Posted seqs prove the events landed in order on a fresh job.
  # We assert each seq is present near a posted_seqs reference; we don't
  # match the array literal exactly because meshctl's encoder spacing may
  # differ between the structuredContent block and the embedded MCP text
  # field. Asserting on individual seqs is encoder-spacing tolerant.
  - expr: "${captured.commission_response} contains 'posted_seqs'"
    message: "commission response must include posted_seqs key from the postEvent return values"
  - expr: "${captured.commission_response} contains '\\\"seq\\\":1'"
    message: "first posted event must have seq=1"
  - expr: "${captured.commission_response} contains '\\\"seq\\\":2'"
    message: "second posted event must have seq=2"
  - expr: "${captured.commission_response} contains '\\\"seq\\\":3'"
    message: "third posted event must have seq=3"

  # Payload round-trip: the final event's marker reaches both observers.
  - expr: "${captured.commission_response} contains '\\\"final\\\":true'"
    message: "the final event's payload marker must round-trip through both recvEvent and subscribeEvents"

post_run:
  - routine: stop_all
  - routine: global.cleanup_workspace
