# tc25_event_type_filter_ts — TS port of uc21/tc25
# (recvEvent type filter skips unrelated events; issue #1032).
#
# Producer `run_with_filter` calls `recvEvent(["target"], 15)` and
# must IGNORE events whose `type` is not in that list. Consumer posts
# three events in sequence:
#
#   1. `ignore_a` — wrong type, must be skipped
#   2. `ignore_b` — wrong type, must be skipped
#   3. `target`   — matching type, producer wakes here
#
# Asserts:
#   - the producer returned the THIRD event (seq=3), not the first or
#     second
#   - payload echoes `{got_it: true}`
#   - producer did NOT time out (would fail the seq=3 assertion anyway,
#     but a dedicated message helps triage)
#
# This proves the type-filter is applied during the long-poll: a broken
# filter would wake on seq=1 (`ignore_a`), return `{n: 1}` instead of
# `{got_it: true}`, and complete the job with the wrong payload.

name: "MeshJob TS: recvEvent type filter skips unrelated events and wakes on matching type"
description: "Post 2 ignored events + 1 matching; producer must see only the matching one (seq=3)"
tags:
  - meshjob
  - typescript
  - issue-1032
  - events
timeout: 90

pre_run:
  - routine: global.setup_for_typescript_agent

test:
  - name: "Copy artifacts"
    handler: shell
    workdir: /workspace
    command: |
      cp -rL /uc-artifacts/long-task-provider-ts /workspace/
      cp -rL /uc-artifacts/long-task-consumer-ts /workspace/

  - name: "Install provider deps"
    handler: npm-install
    path: /workspace/long-task-provider-ts

  - name: "Install consumer deps"
    handler: npm-install
    path: /workspace/long-task-consumer-ts

  - routine: start_registry_with_fast_sweep

  - name: "Start provider (port 9110)"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-provider-ts/src/index.ts --env MCP_MESH_HTTP_PORT=9110 -d

  - name: "Start consumer (port 9111)"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-consumer-ts/src/index.ts --env MCP_MESH_HTTP_PORT=9111 --env MCP_MESH_SETTLE_TIMEOUT=60 -d

  # Liveness only: wait for both agents to REGISTER (meshctl call routes via
  # the registry). Dependency resolution is covered by the settle window —
  # no fixed dep-resolution sleep needed.
  - name: "Wait for both agents to register"
    handler: shell
    workdir: /workspace
    command: |
      echo "Waiting for both agents to register..."
      for i in $(seq 1 60); do
        AGENTS=$(meshctl list 2>/dev/null || true)
        if echo "$AGENTS" | grep -q "long-task-provider-ts" && echo "$AGENTS" | grep -q "long-task-consumer-ts"; then
          echo "Both agents registered after ~${i}s"
          exit 0
        fi
        sleep 1
      done
      echo "ERROR: agents did not register within 60s"
      meshctl list 2>/dev/null || true
      exit 1
    capture: wait_registration
    timeout: 90

  - name: "Call commission_event_filter — post 3 events, expect producer to wake only on 'target'"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call commission_event_filter '{}'
    capture: commission_response
    timeout: 60

assertions:
  - expr: "${captured.commission_response} not contains '\"isError\":true'"
    message: "commission_event_filter should NOT return an MCP error envelope"
  # Producer must not have timed out.
  - expr: "${captured.commission_response} not contains '\\\"timeout\\\":true'"
    message: "producer must NOT have timed out — the 'target' event should have woken it"
  # The matching event was the 3rd posted; producer must surface its
  # type and payload — NOT the ignored events'.
  - expr: "${captured.commission_response} contains '\\\"type\\\":\\\"target\\\"'"
    message: "producer must wake on the 'target' event type"
  - expr: "${captured.commission_response} contains '\\\"got_it\\\":true'"
    message: "payload of the matching event must round-trip to the producer"
  # Belt-and-suspenders: ensure the producer's result is NOT one of the
  # ignored events. A broken filter would wake on the first post and
  # complete with payload={n:1} type=ignore_a.
  - expr: "${captured.commission_response} not contains '\\\"type\\\":\\\"ignore_a\\\"'"
    message: "producer must NOT have woken on the 'ignore_a' event (filter broken)"
  - expr: "${captured.commission_response} not contains '\\\"type\\\":\\\"ignore_b\\\"'"
    message: "producer must NOT have woken on the 'ignore_b' event (filter broken)"
  # Sequence number: the matching event was the 3rd post into this job.
  - expr: "${captured.commission_response} contains '\\\"target_seq\\\":3'"
    message: "the matching event must have been the 3rd post (seq=3)"

post_run:
  - routine: stop_all
  - routine: global.cleanup_workspace
