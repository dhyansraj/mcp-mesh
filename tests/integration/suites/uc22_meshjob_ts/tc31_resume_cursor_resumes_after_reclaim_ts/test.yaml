# tc31_resume_cursor_resumes_after_reclaim_ts — TS port of uc21/tc31
# (durable recvEvent cursor RESUME on re-claim, issue #1277).
#
# First e2e exercise of the napi binding's core resume: the Wave-2 TS unit
# tests (claim-dispatcher-resume-cursor.test.ts) bind to MOCKED controllers, so
# this is the first proof that `resumeCursor: true` seeds the SAME Rust
# JobController through napi and `recvEvent` resumes after the persisted cursor.
#
# See uc21_meshjob/tc31_resume_cursor_resumes_after_reclaim/test.yaml for the
# full mechanism, reclaim-mechanism rationale and assertion-shape writeup — this
# is the name-for-name TS port (ports 9110/9111, sink /tmp/uc22-resume-*).
#
# TIMEOUT BUDGET (warm-cache convention): 2x npm-install warm + tsx transpile
# startup (TS is slower than Python — README note) + registration (~20s) +
# submit/post (~5s) + flush gate (~10s) + reclaim + re-claim poll (~15s) +
# completion poll (~10s) + slack. 300s.

name: "MeshJob TS: resume_cursor RESUMES recvEvent after a forced reclaim (no replay-from-0)"
description: "TS resumeCursor:true task, re-claimed via meshctl job reclaim, resumes after the persisted recv_cursor — early durably-flushed events consumed exactly once, proving the napi binding seeds the core"
tags:
  - meshjob
  - typescript
  - issue-1277
  - events
  - resume-cursor
  - reclaim
  - slow
timeout: 300

pre_run:
  - routine: global.setup_for_typescript_agent

test:
  - name: "Copy artifacts"
    handler: shell
    workdir: /workspace
    command: |
      cp -rL /uc-artifacts/long-task-provider-ts /workspace/
      cp -rL /uc-artifacts/long-task-consumer-ts /workspace/

  - name: "Install provider deps"
    handler: npm-install
    path: /workspace/long-task-provider-ts

  - name: "Install consumer deps"
    handler: npm-install
    path: /workspace/long-task-consumer-ts

  # DEFAULT knobs — the forced reclaim must be the ONLY lease actor.
  - routine: start_registry

  - name: "Start provider (port 9110)"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-provider-ts/src/index.ts --env MCP_MESH_HTTP_PORT=9110 -d

  - name: "Start consumer (port 9111)"
    handler: shell
    workdir: /workspace
    command: meshctl start long-task-consumer-ts/src/index.ts --env MCP_MESH_HTTP_PORT=9111 --env MCP_MESH_SETTLE_TIMEOUT=60 -d

  - name: "Wait for both agents to register"
    handler: shell
    workdir: /workspace
    command: |
      echo "Waiting for both agents to register..."
      for i in $(seq 1 60); do
        AGENTS=$(meshctl list 2>/dev/null || true)
        if echo "$AGENTS" | grep -q "long-task-provider-ts" && echo "$AGENTS" | grep -q "long-task-consumer-ts"; then
          echo "Both agents registered after ~${i}s"
          exit 0
        fi
        sleep 1
      done
      echo "ERROR: agents did not register within 60s"
      meshctl list 2>/dev/null || true
      exit 1
    capture: wait_registration
    timeout: 90

  - name: "Submit resume_task (resumeCursor ON)"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call commission_resume '{}'
    capture: submit_resp
    timeout: 60

  - name: "Capture job_id"
    handler: shell
    workdir: /workspace
    command: |
      # Portable job_id extraction across all three runtimes (#1282): the
      # job_id lives as escaped JSON inside content[0].text on EVERY runtime,
      # whereas structuredContent.job_id exists only on Python. fromjson?
      # guards absent/non-JSON text → empty (no crash) so a bad response
      # surfaces as an empty JOB_ID the gate step fails loudly on.
      JOB_ID=$(echo '${captured.submit_resp}' | jq -r '.content[0].text | fromjson? | .job_id // empty' 2>/dev/null)
      echo "JOB_ID=${JOB_ID}"
    capture: job_id_extract

  - name: "Post work events e1..e5 (non-final)"
    handler: shell
    workdir: /workspace
    command: |
      JOB_ID=$(echo '${captured.job_id_extract}' | grep '^JOB_ID=' | cut -d= -f2)
      echo "JOB_ID=${JOB_ID}"
      for n in 1 2 3 4 5; do
        SEQ=$(curl -s -X POST "http://localhost:8000/jobs/${JOB_ID}/events" \
          -H 'Content-Type: application/json' \
          -d "{\"type\":\"work\",\"payload\":{\"i\":${n}}}" | jq -r '.seq')
        echo "posted work i=${n} seq=${SEQ}"
      done
    capture: post_events
    timeout: 30

  - name: "Gate: durable recv_cursor.work flushed >= 2"
    handler: shell
    workdir: /workspace
    command: |
      JOB_ID=$(echo '${captured.job_id_extract}' | grep '^JOB_ID=' | cut -d= -f2)
      for i in $(seq 1 40); do
        RC=$(curl -s "http://localhost:8000/jobs/${JOB_ID}" | jq -r '.recv_cursor.work // 0')
        echo "poll ${i}: recv_cursor.work=${RC}"
        if [ "${RC}" -ge 2 ] 2>/dev/null; then
          echo "CURSOR_FLUSHED=1 recv_cursor.work=${RC}"
          exit 0
        fi
        sleep 1
      done
      echo "ERROR: recv_cursor.work never reached 2 within 40s"
      curl -s "http://localhost:8000/jobs/${JOB_ID}" | jq '{status, recv_cursor, attempt_count, claim_epoch}'
      exit 1
    capture: flush_gate
    timeout: 50

  - name: "Force-reclaim the job via meshctl"
    handler: shell
    workdir: /workspace
    command: |
      JOB_ID=$(echo '${captured.job_id_extract}' | grep '^JOB_ID=' | cut -d= -f2)
      meshctl job reclaim "${JOB_ID}"
    capture: reclaim_out
    timeout: 30

  - name: "Wait for the re-claim (epoch 2, attempt 2)"
    handler: shell
    workdir: /workspace
    command: |
      JOB_ID=$(echo '${captured.job_id_extract}' | grep '^JOB_ID=' | cut -d= -f2)
      for i in $(seq 1 40); do
        ROW=$(curl -s "http://localhost:8000/jobs/${JOB_ID}")
        OK=$(echo "$ROW" | jq '(.claim_epoch == 2) and (.attempt_count == 2)')
        if [ "$OK" = "true" ]; then
          echo "RECLAIMED_E2=1 after ~${i}s"
          echo "$ROW" | jq -c '{status, owner_instance_id, claim_epoch, attempt_count, recv_cursor}'
          exit 0
        fi
        sleep 1
      done
      echo "ERROR: job was not re-claimed at epoch 2 within 40s"
      curl -s "http://localhost:8000/jobs/${JOB_ID}" | jq '.'
      exit 1
    capture: reclaim2_wait
    timeout: 50

  - name: "Post the final terminator and wait for completion"
    handler: shell
    workdir: /workspace
    command: |
      JOB_ID=$(echo '${captured.job_id_extract}' | grep '^JOB_ID=' | cut -d= -f2)
      SEQ=$(curl -s -X POST "http://localhost:8000/jobs/${JOB_ID}/events" \
        -H 'Content-Type: application/json' \
        -d '{"type":"work","payload":{"i":6,"final":true}}' | jq -r '.seq')
      echo "posted terminator seq=${SEQ}"
      for i in $(seq 1 30); do
        ST=$(curl -s "http://localhost:8000/jobs/${JOB_ID}" | jq -r '.status')
        echo "poll ${i}: status=${ST}"
        if [ "$ST" = "completed" ]; then
          echo "COMPLETED=1 after ~${i}s"
          exit 0
        fi
        sleep 1
      done
      echo "ERROR: job did not complete within 30s of the terminator"
      curl -s "http://localhost:8000/jobs/${JOB_ID}" | jq '{status, error, recv_cursor}'
      exit 1
    capture: completion_wait
    timeout: 45

  - name: "Compute processed-seq counts from the sink"
    handler: shell
    workdir: /workspace
    command: |
      JOB_ID=$(echo '${captured.job_id_extract}' | grep '^JOB_ID=' | cut -d= -f2)
      SINK="/tmp/uc22-resume-processed-${JOB_ID}"
      echo "SINK=${SINK}"
      # grep -c prints 0 AND exits 1 on a zero count, so a bare `|| echo 0`
      # would emit a doubled `0`. Capture then default-to-0 so exactly one
      # value is emitted per seq (single-0 on zero/absent).
      S1=$(grep -c '^seq=1$' "${SINK}" 2>/dev/null || true); echo "SEQ1_COUNT=${S1:-0}"
      S2=$(grep -c '^seq=2$' "${SINK}" 2>/dev/null || true); echo "SEQ2_COUNT=${S2:-0}"
      S6=$(grep -c '^seq=6$' "${SINK}" 2>/dev/null || true); echo "SEQ6_COUNT=${S6:-0}"
      echo "--- full sink ---"
      cat "${SINK}" 2>/dev/null || echo "(sink missing)"
    capture: sink_counts

assertions:
  - expr: "${captured.wait_registration} contains 'registered'"
    message: "both agents must register before the job is submitted"
  - expr: "${captured.flush_gate} contains 'CURSOR_FLUSHED=1'"
    message: "the durable recv_cursor for 'work' must reach >= 2 before the reclaim — don't race the flush"
  - expr: "${captured.reclaim_out} contains 'reclaimed'"
    message: "meshctl job reclaim must report success"
  - expr: "${captured.reclaim_out} not contains '(none'"
    message: "an actual owner must have been evicted — the parked attempt 1 was claimed when reclaimed"
  - expr: "${captured.reclaim2_wait} contains 'RECLAIMED_E2=1'"
    message: "the reclaimed job must be re-claimed at epoch 2 / attempt 2 (the resumed execution)"
  - expr: "${captured.completion_wait} contains 'COMPLETED=1'"
    message: "the resumed attempt must drive the job to completed via the final terminator"

  # THE DISTINGUISHING PROOF — resume through the napi binding, NOT replay-from-0.
  - expr: "${captured.sink_counts} contains 'SEQ1_COUNT=1'"
    message: "RESUME PROOF: seq=1 processed exactly ONCE across both claims — a value of 2 means the napi resume replayed from seq 0 (feature broken)"
  - expr: "${captured.sink_counts} contains 'SEQ2_COUNT=1'"
    message: "RESUME PROOF: seq=2 processed exactly ONCE — a value of 2 means replay-from-0"
  - expr: "${captured.sink_counts} not contains 'SEQ1_COUNT=2'"
    message: "seq=1 must NOT be reprocessed by the resumed attempt (that is full replay, the failure mode this TC exists to catch)"
  - expr: "${captured.sink_counts} contains 'SEQ6_COUNT=1'"
    message: "the resumed attempt must process the final terminator (seq=6) exactly once and complete"

post_run:
  - routine: stop_all
  - routine: global.cleanup_workspace
