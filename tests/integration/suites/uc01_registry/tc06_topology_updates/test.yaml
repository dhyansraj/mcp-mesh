# Test Case: Topology Updates
# Tests that registry correctly tracks agent join/leave/rejoin:
#   1. Start agent 1 → list shows 1 agent
#   2. Start agent 2 → list shows 2 agents
#   3. Stop agent 1 → list shows 1 agent (only agent 2)
#   4. Start agent 1 again → list shows 2 agents
#
# DIAGNOSTIC INSTRUMENTATION (temporary, for triaging meshctl lifecycle regression):
#   - All `meshctl start` invocations use --debug for richer wrapper/child logs.
#   - A "DIAGNOSTIC: capture state" step runs after every wait and after stop, capturing
#     all agent logs, registry log, ~/.mcp-mesh tree, pids/* + registry/deps/* contents,
#     running processes, listening ports, and raw `meshctl list`. ignore_errors: true so
#     real assertions still drive pass/fail.
#
# Uses UC-level artifacts from /uc-artifacts

name: "Topology Updates"
description: "Verify registry tracks agent joins and leaves correctly"
tags:
  - registry
  - topology
  - join
  - leave
  - python
  - typescript
timeout: 180

pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"

test:
  # Copy artifacts
  - name: "Copy artifacts to workspace"
    handler: shell
    command: |
      cp -r /uc-artifacts/py-simple-agent /workspace/
      cp -r /uc-artifacts/ts-simple-agent /workspace/
    capture: copy_output

  # Install TypeScript dependencies (handler auto-detects local/published mode)
  - name: "Install TypeScript dependencies"
    handler: npm-install
    path: /workspace/ts-simple-agent

  # === STEP 1: Start agent 1, verify 1 agent in list ===
  - name: "Start first agent (py-simple-agent)"
    handler: shell
    command: "meshctl start py-simple-agent/main.py -d --debug"
    workdir: /workspace
    capture: start_1

  - name: "Wait for first agent registration"
    handler: wait
    seconds: 8

  - name: "DIAGNOSTIC: state after first start"
    handler: shell
    command: |
      echo "===== ALL AGENT LOGS ====="
      for log in ~/.mcp-mesh/logs/*.log; do
        echo "--- $log ---"
        tail -200 "$log" 2>&1 || echo "(unreadable)"
      done
      echo ""
      echo "===== ~/.mcp-mesh STATE ====="
      find ~/.mcp-mesh -type f 2>&1 | head -60
      echo ""
      echo "===== pids/ contents ====="
      for f in ~/.mcp-mesh/pids/*; do
        echo "--- $f ---"
        cat "$f" 2>&1 || true
      done
      echo ""
      echo "===== registry/deps contents ====="
      for f in ~/.mcp-mesh/registry/deps/* 2>/dev/null; do
        echo "--- $f ---"
        cat "$f" 2>&1 || true
      done
      echo ""
      echo "===== running processes ====="
      ps -ef | grep -E "python|node|meshctl|registry" | grep -v grep || true
      echo ""
      echo "===== listening ports ====="
      ss -tnlp 2>/dev/null | head -30 || netstat -tnlp 2>/dev/null | head -30 || true
      echo ""
      echo "===== meshctl list (raw) ====="
      meshctl list 2>&1 || true
    workdir: /workspace
    capture: diag_after_1
    ignore_errors: true

  - name: "Verify 1 agent after first join"
    handler: shell
    command: |
      echo "=== After starting py-simple-agent ==="
      meshctl list
      count=$(meshctl list 2>/dev/null | grep -c "simple-agent" || echo "0")
      echo "Agent count: $count"
      if [ "$count" -eq 1 ]; then
        echo "PASS: 1 agent after first join"
      else
        echo "FAIL: Expected 1 agent, found $count"
        exit 1
      fi
    workdir: /workspace
    capture: list_after_1

  # === STEP 2: Start agent 2, verify 2 agents in list ===
  - name: "Start second agent (ts-simple-agent)"
    handler: shell
    command: "meshctl start ts-simple-agent/src/index.ts -d --debug"
    workdir: /workspace
    capture: start_2

  - name: "Wait for second agent registration"
    handler: wait
    seconds: 8

  - name: "DIAGNOSTIC: state after second start"
    handler: shell
    command: |
      echo "===== ALL AGENT LOGS ====="
      for log in ~/.mcp-mesh/logs/*.log; do
        echo "--- $log ---"
        tail -200 "$log" 2>&1 || echo "(unreadable)"
      done
      echo ""
      echo "===== ~/.mcp-mesh STATE ====="
      find ~/.mcp-mesh -type f 2>&1 | head -60
      echo ""
      echo "===== pids/ contents ====="
      for f in ~/.mcp-mesh/pids/*; do
        echo "--- $f ---"
        cat "$f" 2>&1 || true
      done
      echo ""
      echo "===== registry/deps contents ====="
      for f in ~/.mcp-mesh/registry/deps/* 2>/dev/null; do
        echo "--- $f ---"
        cat "$f" 2>&1 || true
      done
      echo ""
      echo "===== running processes ====="
      ps -ef | grep -E "python|node|meshctl|registry" | grep -v grep || true
      echo ""
      echo "===== listening ports ====="
      ss -tnlp 2>/dev/null | head -30 || netstat -tnlp 2>/dev/null | head -30 || true
      echo ""
      echo "===== meshctl list (raw) ====="
      meshctl list 2>&1 || true
    workdir: /workspace
    capture: diag_after_2
    ignore_errors: true

  - name: "Verify 2 agents after second join"
    handler: shell
    command: |
      echo "=== After starting ts-simple-agent ==="
      meshctl list
      count=$(meshctl list 2>/dev/null | grep -c "simple-agent" || echo "0")
      echo "Agent count: $count"
      if [ "$count" -eq 2 ]; then
        echo "PASS: 2 agents after second join"
      else
        echo "FAIL: Expected 2 agents, found $count"
        exit 1
      fi
    workdir: /workspace
    capture: list_after_2

  # === STEP 3: Stop agent 1, verify only agent 2 remains ===
  - name: "Stop first agent (py-simple-agent)"
    handler: shell
    command: "meshctl stop py-simple-agent"
    workdir: /workspace
    capture: stop_1

  - name: "Wait for agent to unregister"
    handler: wait
    seconds: 5

  - name: "DIAGNOSTIC: state after stop"
    handler: shell
    command: |
      echo "===== ALL AGENT LOGS ====="
      for log in ~/.mcp-mesh/logs/*.log; do
        echo "--- $log ---"
        tail -200 "$log" 2>&1 || echo "(unreadable)"
      done
      echo ""
      echo "===== ~/.mcp-mesh STATE ====="
      find ~/.mcp-mesh -type f 2>&1 | head -60
      echo ""
      echo "===== pids/ contents ====="
      for f in ~/.mcp-mesh/pids/*; do
        echo "--- $f ---"
        cat "$f" 2>&1 || true
      done
      echo ""
      echo "===== registry/deps contents ====="
      for f in ~/.mcp-mesh/registry/deps/* 2>/dev/null; do
        echo "--- $f ---"
        cat "$f" 2>&1 || true
      done
      echo ""
      echo "===== running processes ====="
      ps -ef | grep -E "python|node|meshctl|registry" | grep -v grep || true
      echo ""
      echo "===== listening ports ====="
      ss -tnlp 2>/dev/null | head -30 || netstat -tnlp 2>/dev/null | head -30 || true
      echo ""
      echo "===== meshctl list (raw) ====="
      meshctl list 2>&1 || true
    workdir: /workspace
    capture: diag_after_stop
    ignore_errors: true

  - name: "Verify only ts-simple-agent remains"
    handler: shell
    command: |
      echo "=== After stopping py-simple-agent ==="
      meshctl list
      # Verify py-simple-agent is gone
      if meshctl list 2>/dev/null | grep -q "py-simple-agent"; then
        echo "FAIL: py-simple-agent still in list after stop"
        exit 1
      fi
      # Verify ts-simple-agent is still there
      if meshctl list 2>/dev/null | grep -q "ts-simple-agent"; then
        echo "PASS: ts-simple-agent still running, py-simple-agent left"
      else
        echo "FAIL: ts-simple-agent should still be running"
        exit 1
      fi
    workdir: /workspace
    capture: list_after_leave

  # === STEP 4: Start agent 1 again, verify 2 agents ===
  - name: "Rejoin first agent (py-simple-agent)"
    handler: shell
    command: "meshctl start py-simple-agent/main.py -d --debug"
    workdir: /workspace
    capture: rejoin_1

  - name: "Wait for rejoin registration"
    handler: wait
    seconds: 8

  - name: "DIAGNOSTIC: state after rejoin"
    handler: shell
    command: |
      echo "===== ALL AGENT LOGS ====="
      for log in ~/.mcp-mesh/logs/*.log; do
        echo "--- $log ---"
        tail -200 "$log" 2>&1 || echo "(unreadable)"
      done
      echo ""
      echo "===== ~/.mcp-mesh STATE ====="
      find ~/.mcp-mesh -type f 2>&1 | head -60
      echo ""
      echo "===== pids/ contents ====="
      for f in ~/.mcp-mesh/pids/*; do
        echo "--- $f ---"
        cat "$f" 2>&1 || true
      done
      echo ""
      echo "===== registry/deps contents ====="
      for f in ~/.mcp-mesh/registry/deps/* 2>/dev/null; do
        echo "--- $f ---"
        cat "$f" 2>&1 || true
      done
      echo ""
      echo "===== running processes ====="
      ps -ef | grep -E "python|node|meshctl|registry" | grep -v grep || true
      echo ""
      echo "===== listening ports ====="
      ss -tnlp 2>/dev/null | head -30 || netstat -tnlp 2>/dev/null | head -30 || true
      echo ""
      echo "===== meshctl list (raw) ====="
      meshctl list 2>&1 || true
    workdir: /workspace
    capture: diag_after_rejoin
    ignore_errors: true

  - name: "Verify both agents present after rejoin"
    handler: shell
    command: |
      echo "=== After py-simple-agent rejoins ==="
      meshctl list
      count=$(meshctl list 2>/dev/null | grep -c "simple-agent" || echo "0")
      echo "Agent count: $count"
      if [ "$count" -eq 2 ]; then
        echo "PASS: 2 agents after rejoin"
      else
        echo "FAIL: Expected 2 agents after rejoin, found $count"
        exit 1
      fi
      # Verify both are present
      LIST=$(meshctl list 2>/dev/null)
      if echo "$LIST" | grep -q "py-simple-agent" && echo "$LIST" | grep -q "ts-simple-agent"; then
        echo "PASS: Both agents present after rejoin"
      else
        echo "FAIL: Both agents should be present"
        exit 1
      fi
    workdir: /workspace
    capture: list_after_rejoin

assertions:
  # Step 1: One agent after first join
  - expr: "${captured.list_after_1} contains 'PASS'"
    message: "Should have 1 agent after first join"

  # Step 2: Two agents after second join
  - expr: "${captured.list_after_2} contains 'PASS'"
    message: "Should have 2 agents after second join"

  # Step 3: One agent after first leaves
  - expr: "${captured.list_after_leave} contains 'PASS'"
    message: "Should have 1 agent after py-simple-agent leaves"

  # Step 4: Two agents after rejoin
  - expr: "${captured.list_after_rejoin} contains 'PASS'"
    message: "Should have 2 agents after py-simple-agent rejoins"

post_run:
  - handler: shell
    command: "meshctl stop 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true
  - routine: global.cleanup_workspace
