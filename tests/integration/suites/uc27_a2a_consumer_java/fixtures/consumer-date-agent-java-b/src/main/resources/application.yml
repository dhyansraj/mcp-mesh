spring:
  application:
    name: consumer-date-agent-java-b

server:
  port: ${MCP_MESH_HTTP_PORT:9202}

mesh:
  registry:
    url: ${MCP_MESH_REGISTRY_URL:http://localhost:8000}
  agent:
    name: ${MCP_MESH_AGENT_NAME:date-consumer-alt}
    namespace: ${MCP_MESH_NAMESPACE:default}

logging:
  level:
    io.mcpmesh: INFO
    com.example: DEBUG
