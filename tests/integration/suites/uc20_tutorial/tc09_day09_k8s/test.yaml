# Test Case: Day 9 — Kubernetes
# Validates the Day 9 tutorial narrative: deploy agents to Kubernetes with
# Helm charts, verify registration, call flight_search, verify gateway health.
#
# Requires a running Kubernetes cluster (minikube or similar) with Helm 3.8+.
# Agent images must be pre-built and available to the cluster.
# Tagged with 'k8s' so CI can skip when no cluster is available.

name: "Tutorial Day 9: Kubernetes"
description: "Verify agents deploy to k8s with Helm, register with the registry, and gateway responds"
tags:
  - tutorial
  - day09
  - python
  - k8s
  - helm
  - meshctl
  - gateway
  - fastapi
timeout: 600

pre_run:
  - handler: shell
    command: "kubectl version --client --short 2>/dev/null || kubectl version --client"
  - handler: shell
    command: "helm version --short"

test:
  # Copy helm values and k8s manifests to workspace
  - name: "Copy artifacts to workspace"
    handler: shell
    command: |
      cp -r /artifacts/* /workspace/
    capture: copy_output

  # Create namespace and secrets
  - name: "Create namespace and secrets"
    handler: shell
    command: |
      kubectl create namespace trip-planner --dry-run=client -o yaml | kubectl apply -f -
      kubectl -n trip-planner create secret generic llm-keys \
        --from-literal=ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY:-placeholder}" \
        --from-literal=OPENAI_API_KEY="${OPENAI_API_KEY:-placeholder}" \
        --dry-run=client -o yaml | kubectl apply -f -
    capture: ns_output

  # Install core infrastructure
  - name: "Install mcp-mesh-core"
    handler: shell
    command: |
      helm upgrade --install mcp-core oci://ghcr.io/dhyansraj/mcp-mesh/mcp-mesh-core \
        --version 1.2.0 \
        -n trip-planner \
        -f /workspace/helm/values-core.yaml \
        --wait --timeout 5m
    timeout: 360
    capture: core_install

  # Wait for registry
  - name: "Wait for registry"
    handler: shell
    command: |
      kubectl wait --for=condition=available deployment/mcp-core-mcp-mesh-registry \
        -n trip-planner --timeout=120s
    timeout: 130
    capture: registry_wait

  # Install all agents
  - name: "Install agents"
    handler: shell
    command: |
      AGENTS=(flight-agent hotel-agent weather-agent poi-agent user-prefs-agent
              chat-history-agent claude-provider openai-provider planner-agent
              gateway budget-analyst adventure-advisor logistics-planner)
      for agent in "${AGENTS[@]}"; do
        echo "Installing $agent..."
        helm upgrade --install "$agent" oci://ghcr.io/dhyansraj/mcp-mesh/mcp-mesh-agent \
          --version 1.2.0 \
          -n trip-planner \
          -f "/workspace/helm/values-${agent}.yaml"
      done
    timeout: 300
    capture: agents_install

  # Wait for agents to start
  - name: "Wait for agents to register"
    handler: wait
    seconds: 30

  # Check pods
  - name: "Check pod status"
    handler: shell
    command: "kubectl -n trip-planner get pods"
    capture: pod_status

  # Port-forward registry
  - name: "Port-forward registry"
    handler: shell
    command: |
      kubectl -n trip-planner port-forward svc/mcp-core-mcp-mesh-registry 8000:8000 &
      sleep 2
      echo "Port-forward started"
    capture: pf_registry

  # Verify agent registration
  - name: "Verify agent registration"
    handler: shell
    command: "meshctl list --registry-url http://localhost:8000"
    capture: list_output

  # Port-forward gateway
  - name: "Port-forward gateway"
    handler: shell
    command: |
      kubectl -n trip-planner port-forward svc/gateway-mcp-mesh-agent 8080:8080 &
      sleep 2
      echo "Port-forward started"
    capture: pf_gateway

  # Verify gateway health
  - name: "Verify gateway health"
    handler: shell
    command: |
      RESPONSE=$(curl -s http://localhost:8080/health 2>&1)
      echo "$RESPONSE"
      if echo "$RESPONSE" | grep -q '"healthy"'; then
        echo "PASS: gateway health check passed"
      else
        echo "FAIL: gateway health check failed"
        exit 1
      fi
    capture: health_check

  # Call flight_search directly
  - name: "Call flight_search on k8s"
    handler: shell
    command: |
      RESULT=$(meshctl call flight_search '{"origin":"SFO","destination":"NRT","date":"2026-06-01"}' \
        --registry-url http://localhost:8000 2>&1)
      echo "$RESULT"
      if echo "$RESULT" | grep -q '"carrier"'; then
        echo "PASS: flight_search returned data from k8s"
      else
        echo "FAIL: flight_search did not return expected data"
        exit 1
      fi
    capture: flight_call

assertions:
  # Key agents registered
  - expr: "${captured.list_output} contains 'flight-agent'"
    message: "flight-agent should appear in meshctl list"

  - expr: "${captured.list_output} contains 'planner-agent'"
    message: "planner-agent should appear in meshctl list"

  - expr: "${captured.list_output} contains 'gateway'"
    message: "gateway should appear in meshctl list"

  - expr: "${captured.list_output} contains 'claude-provider'"
    message: "claude-provider should appear in meshctl list"

  - expr: "${captured.list_output} contains '13 healthy'"
    message: "All 13 agents should be healthy"

  # Gateway health check
  - expr: "${captured.health_check} contains 'PASS'"
    message: "gateway health endpoint should return healthy"

  # Flight search works on k8s
  - expr: "${captured.flight_call} contains 'PASS'"
    message: "flight_search should return data from Kubernetes"

post_run:
  - handler: shell
    command: |
      # Kill port-forwards
      kill %1 %2 2>/dev/null || true
      # Uninstall everything
      AGENTS=(flight-agent hotel-agent weather-agent poi-agent user-prefs-agent
              chat-history-agent claude-provider openai-provider planner-agent
              gateway budget-analyst adventure-advisor logistics-planner)
      for agent in "${AGENTS[@]}"; do
        helm uninstall "$agent" -n trip-planner 2>/dev/null || true
      done
      helm uninstall mcp-core -n trip-planner 2>/dev/null || true
      kubectl delete namespace trip-planner --ignore-not-found 2>/dev/null || true
    ignore_errors: true
