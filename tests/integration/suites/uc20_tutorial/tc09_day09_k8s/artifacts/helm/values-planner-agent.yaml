# Helm values for planner-agent — scaffolded by meshctl, adapted for k8s
# LLM agent: needs API keys for the provider agents it calls

image:
  repository: trip-planner/planner-agent
  tag: "latest"
  pullPolicy: IfNotPresent  # Use Never for minikube local builds

agent:
  name: planner-agent
  runtime: python

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

mesh:
  enabled: true

registry:
  host: "mcp-core-mcp-mesh-registry"
  port: "8000"
