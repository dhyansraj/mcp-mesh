# Helm values for weather-agent — scaffolded by meshctl, adapted for k8s

image:
  repository: trip-planner/weather-agent
  tag: "latest"
  pullPolicy: IfNotPresent  # Use Never for minikube local builds

agent:
  name: weather-agent
  runtime: python

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

mesh:
  enabled: true

registry:
  host: "mcp-core-mcp-mesh-registry"
  port: "8000"
