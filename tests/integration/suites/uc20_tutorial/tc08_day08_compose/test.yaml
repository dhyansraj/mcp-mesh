# Test Case: Day 8 — Docker Compose
# Validates the Day 8 tutorial narrative: generate docker-compose.yml with
# meshctl scaffold --compose --observability, start all services with
# docker compose up, verify agents register and gateway responds.
#
# Requires Docker daemon and docker compose v2.
# Requires ANTHROPIC_API_KEY and OPENAI_API_KEY — tagged with 'llm' so CI can skip.
# Uses tc-level artifacts from /artifacts

name: "Tutorial Day 8: Docker Compose"
description: "Verify scaffold generates compose, all 13 agents start in containers, gateway responds"
tags:
  - tutorial
  - day08
  - python
  - llm
  - docker
  - redis
  - meshctl
  - gateway
  - fastapi
timeout: 600

pre_run:
  - handler: shell
    command: "docker compose version"

test:
  # Copy all artifacts to workspace
  - name: "Copy artifacts to workspace"
    handler: shell
    command: |
      cp -r /artifacts/* /workspace/
    capture: copy_output

  # Start all services with docker compose
  - name: "Start docker compose"
    handler: shell
    command: "docker compose up -d"
    workdir: /workspace
    timeout: 300
    capture: compose_up_output

  # Wait for all services to become healthy
  - name: "Wait for services to start"
    handler: wait
    seconds: 60

  # Check all services are running
  - name: "Check docker compose ps"
    handler: shell
    command: "docker compose ps --format '{{.Name}} {{.Status}}'"
    workdir: /workspace
    capture: compose_ps

  # Verify agents are registered via meshctl
  - name: "Verify agent registration"
    handler: shell
    command: "meshctl list --registry-url http://localhost:8000"
    workdir: /workspace
    capture: list_output

  # Verify gateway health
  - name: "Verify gateway health"
    handler: shell
    command: |
      RESPONSE=$(curl -s http://localhost:8080/health 2>&1)
      echo "$RESPONSE"
      if echo "$RESPONSE" | grep -q '"healthy"'; then
        echo "PASS: gateway health check passed"
      else
        echo "FAIL: gateway health check failed"
        exit 1
      fi
    workdir: /workspace
    capture: health_check

  # Call planner via gateway
  - name: "Call planner via containerized gateway"
    handler: shell
    command: |
      echo "=== Calling planner via docker compose gateway ==="
      RESPONSE=$(curl -s --max-time 300 -X POST http://localhost:8080/plan \
        -H "Content-Type: application/json" \
        -H "X-Session-Id: test-session-day8" \
        -d '{"destination":"Kyoto","dates":"June 1-5, 2026","budget":"$2000"}' 2>&1)
      echo "$RESPONSE"
      if echo "$RESPONSE" | grep -qi 'kyoto\|trip\|plan\|itinerary'; then
        echo "PASS: Gateway returned trip plan"
      else
        echo "FAIL: Gateway did not return trip plan"
        exit 1
      fi
    workdir: /workspace
    timeout: 360
    capture: planner_result

  # Verify mesh UI is accessible
  - name: "Verify Mesh UI health"
    handler: shell
    command: |
      RESPONSE=$(curl -s http://localhost:3080/health 2>&1)
      echo "$RESPONSE"
      if echo "$RESPONSE" | grep -qi 'healthy\|ok'; then
        echo "PASS: Mesh UI is accessible"
      else
        echo "FAIL: Mesh UI not accessible"
        exit 1
      fi
    workdir: /workspace
    capture: ui_health

assertions:
  # All key agents registered
  - expr: "${captured.list_output} contains 'flight-agent'"
    message: "flight-agent should appear in meshctl list"

  - expr: "${captured.list_output} contains 'hotel-agent'"
    message: "hotel-agent should appear in meshctl list"

  - expr: "${captured.list_output} contains 'weather-agent'"
    message: "weather-agent should appear in meshctl list"

  - expr: "${captured.list_output} contains 'planner-agent'"
    message: "planner-agent should appear in meshctl list"

  - expr: "${captured.list_output} contains 'claude-provider'"
    message: "claude-provider should appear in meshctl list"

  - expr: "${captured.list_output} contains 'budget-analyst'"
    message: "budget-analyst should appear in meshctl list"

  - expr: "${captured.list_output} contains 'adventure-advisor'"
    message: "adventure-advisor should appear in meshctl list"

  - expr: "${captured.list_output} contains 'logistics-planner'"
    message: "logistics-planner should appear in meshctl list"

  # Gateway health check
  - expr: "${captured.health_check} contains 'PASS'"
    message: "gateway health endpoint should return healthy"

  # Planner call succeeded
  - expr: "${captured.planner_result} contains 'PASS'"
    message: "Gateway should return a trip plan"

  # Mesh UI accessible
  - expr: "${captured.ui_health} contains 'PASS'"
    message: "Mesh UI should be accessible at localhost:3080"

post_run:
  - handler: shell
    command: "docker compose down -v 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true
