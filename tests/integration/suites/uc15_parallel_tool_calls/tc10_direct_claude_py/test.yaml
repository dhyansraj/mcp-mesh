# Test Case: TC10 - Python Direct Claude Parallel Tool Calls
# Tests parallel tool execution in Python direct-mode LLM agent with Claude
#
# Scenario:
#   - Start slow-tool-py (3 tools, each sleeps 3s) on port 9001
#   - Start direct-consumer-claude-py (direct mode, parallel_tool_calls=True) on port 9002
#   - Query triggers all 3 tools simultaneously
#   - Assert all 3 tool results are in the response

name: "Python Direct Claude Parallel Tool Calls"
description: "Test parallel_tool_calls=True in Python direct-mode LLM agent with Claude and 3 slow financial tools"
tags:
  - parallel
  - python
  - claude
  - direct
  - issue-672
timeout: 300

pre_run:
  - routine: global.setup_for_python_agent

test:
  # 1. Copy artifacts
  - name: "Copy artifacts"
    handler: shell
    command: |
      cp -r /uc-artifacts/slow-tool-py /workspace/
      cp -r /uc-artifacts/direct-consumer-claude-py /workspace/
      ls -la /workspace/

  # 2. Create env file
  - name: "Create env file with secrets"
    handler: secrets
    target: /workspace/.env
    keys:
      - ANTHROPIC_API_KEY

  # 3. Install dependencies
  - name: "Install tool dependencies"
    handler: pip-install
    path: /workspace/slow-tool-py

  - name: "Install consumer dependencies"
    handler: pip-install
    path: /workspace/direct-consumer-claude-py

  # 4. Start slow tool agent (port 9001)
  - name: "Start slow tool agent"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start slow-tool-py/main.py --env MCP_MESH_HTTP_PORT=9001 -d
      echo "Slow tool agent starting..."
    capture: start_tool

  - name: "Wait for tool agent"
    handler: wait
    seconds: 15

  # 5. Start direct consumer (port 9002)
  - name: "Start direct consumer"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start direct-consumer-claude-py/main.py --env-file .env --env MCP_MESH_HTTP_PORT=9002 -d
      echo "Direct consumer starting..."
    capture: start_consumer

  - name: "Wait for consumer and resolution"
    handler: wait
    seconds: 25

  # 6. Verify agents registered
  - name: "Verify agents registered"
    handler: shell
    workdir: /workspace
    command: |
      meshctl list
    capture: agent_list

  # 7. Call parallel_analyze with stock query (should trigger all 3 tools)
  - name: "Parallel tool query"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call parallel_analyze --timeout 120 '{"ctx": {"query": "Give me a comprehensive analysis of AAPL stock. Get the stock price, company info, and market sentiment.", "ticker": "AAPL"}}'
    capture: parallel_response
    timeout: 120

  # 8. Check consumer logs for parallel mode
  - name: "Check consumer logs for parallel mode"
    handler: shell
    workdir: /workspace
    command: |
      meshctl logs direct-consumer-claude-py 2>&1
    capture: consumer_logs

assertions:
  # Verify agents registered
  - expr: "${captured.agent_list} contains 'slow-tool-py'"
    message: "Slow tool agent should be registered"
  - expr: "${captured.agent_list} contains 'direct-consumer-claude-py'"
    message: "Direct Claude consumer should be registered"
  # Verify response contains data from all 3 tools
  - expr: "${captured.parallel_response} contains 'AAPL'"
    message: "Response should reference the AAPL ticker"
  - expr: "${captured.parallel_response} contains 'sentiment'"
    message: "Response should contain sentiment data (from get_market_sentiment)"
  # Assertion: parallel mode must be explicitly enabled in agent
  - expr: "${captured.consumer_logs} contains 'parallel tool calls enabled'"
    message: "Consumer agent should log 'parallel tool calls enabled' when parallel_tool_calls=True is set"
  # Assertion: consumer must execute tools in parallel
  - expr: "${captured.consumer_logs} contains 'tool calls in parallel'"
    message: "Consumer should execute tool calls in parallel, not sequentially"

post_run:
  - handler: shell
    workdir: /workspace
    command: |
      meshctl stop 2>/dev/null || true
    ignore_errors: true
  - routine: global.cleanup_workspace
