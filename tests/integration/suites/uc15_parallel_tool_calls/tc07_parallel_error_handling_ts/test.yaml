# Test Case: TC07 - TypeScript Parallel Error Handling
# Tests that when tools are unavailable in parallel mode, the agent handles gracefully
#
# Scenario:
#   - Start slow-tool-ts (3 tools) on port 9001
#   - Start claude-provider-py on port 9002
#   - Start parallel-consumer-ts on port 9003
#   - Stop slow-tool-ts to simulate tool unavailability
#   - Query - agent should handle gracefully without crashing
#
# Note: This is a TDD test. The error handling behavior (continue on
# partial failure) is part of the parallel_tool_calls feature spec.

name: "TypeScript Parallel Tool Error Handling"
description: "Test parallel tool execution handles partial failures in TypeScript"
tags:
  - parallel
  - typescript
  - claude
  - error-handling
  - issue-672
timeout: 300

pre_run:
  - routine: global.setup_for_python_agent
  - routine: global.setup_for_typescript_agent

test:
  # 1. Copy artifacts
  - name: "Copy artifacts"
    handler: shell
    command: |
      cp -r /uc-artifacts/slow-tool-ts /workspace/
      cp -r /uc-artifacts/claude-provider-py /workspace/
      cp -r /uc-artifacts/parallel-consumer-ts /workspace/

  # 2. Create env file
  - name: "Create env file with secrets"
    handler: secrets
    target: /workspace/.env
    keys:
      - ANTHROPIC_API_KEY

  # 3. Install dependencies
  - name: "Install provider dependencies"
    handler: pip-install
    path: /workspace/claude-provider-py

  - name: "Install tool dependencies"
    handler: npm-install
    path: /workspace/slow-tool-ts

  - name: "Install consumer dependencies"
    handler: npm-install
    path: /workspace/parallel-consumer-ts

  # 4. Start agents
  - name: "Start slow tool agent"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start slow-tool-ts/src/index.ts --env MCP_MESH_HTTP_PORT=9001 -d

  - name: "Wait for tool agent"
    handler: wait
    seconds: 15

  - name: "Start Claude provider"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start claude-provider-py/main.py --env-file .env --env MCP_MESH_HTTP_PORT=9002 -d

  - name: "Wait for provider"
    handler: wait
    seconds: 20

  - name: "Start parallel consumer"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start parallel-consumer-ts/src/index.ts --env MCP_MESH_HTTP_PORT=9003 -d

  - name: "Wait for consumer and resolution"
    handler: wait
    seconds: 25

  # 5. Stop the tool agent mid-session to simulate partial failure
  - name: "Stop slow tool agent to simulate failure"
    handler: shell
    workdir: /workspace
    command: |
      meshctl stop slow-tool-ts 2>/dev/null || true
      echo "Stopped slow-tool-ts to simulate tool unavailability"

  - name: "Wait for deregistration"
    handler: wait
    seconds: 5

  # 6. Query - tools are unavailable, agent should handle gracefully
  - name: "Query with unavailable tools"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call parallel_analyze --timeout 120 '{"ctx": {"query": "Analyze TSLA stock price, company info, and market sentiment.", "ticker": "TSLA"}}' 2>&1 || true
    capture: error_response
    timeout: 180

  # 7. Check consumer logs for parallel mode
  - name: "Check consumer logs for parallel mode"
    handler: shell
    workdir: /workspace
    command: |
      meshctl logs parallel-consumer-ts 2>&1
    capture: consumer_logs

assertions:
  # The agent should either:
  # a) Return an error indicating tools are unavailable, OR
  # b) Return a response using LLM knowledge (no tool data)
  # Either way, it should NOT crash or hang
  - expr: "${last.exit_code} == 0"
    message: "Agent should handle tool unavailability without crashing"
  # TDD assertion: parallel mode must be explicitly enabled
  - expr: "${captured.consumer_logs} contains 'parallel tool calls enabled'"
    message: "TDD: Consumer agent should log 'parallel tool calls enabled' when parallelToolCalls=true is set (feature not yet implemented)"

post_run:
  - handler: shell
    workdir: /workspace
    command: |
      meshctl stop 2>/dev/null || true
    ignore_errors: true
  - routine: global.cleanup_workspace
