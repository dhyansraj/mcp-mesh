# Test Case: TC18 - Java Direct Gemini Parallel Tool Calls
# Tests parallel tool execution in Java LLM agent with direct Gemini provider
#
# Scenario:
#   - Start slow-tool-java (3 tools, each sleeps 3s) on port 9001
#   - Start direct-consumer-gemini-java (direct mode, parallelToolCalls=true) on port 9002
#   - No separate LLM provider needed — direct mode calls Gemini API directly
#   - Query triggers all 3 tools simultaneously
#   - Assert all 3 tool results are in the response

name: "Java Direct Gemini Parallel Tool Calls"
description: "Test parallelToolCalls=true in Java direct-mode LLM agent with Gemini"
disabled: true # Spring AI Gemini starter dependency issue — not available in test container
# SKIP: Spring AI Google GenAI starter dependency not available in test container
tags:
  - parallel
  - java
  - gemini
  - direct
  - issue-672
  - skip-known-issue
timeout: 600

pre_run:
  - routine: global.setup_for_java_agent

test:
  # 1. Copy artifacts
  - name: "Copy artifacts"
    handler: shell
    command: |
      cp -r /uc-artifacts/slow-tool-java /workspace/
      cp -r /uc-artifacts/direct-consumer-gemini-java /workspace/
      ls -la /workspace/

  # 2. Create env file
  - name: "Create env file with secrets"
    handler: secrets
    target: /workspace/.env
    keys:
      - GOOGLE_API_KEY

  # 3. Install dependencies
  - name: "Install tool dependencies"
    handler: maven-install
    path: /workspace/slow-tool-java
    timeout: 600

  - name: "Install consumer dependencies"
    handler: maven-install
    path: /workspace/direct-consumer-gemini-java
    timeout: 600

  # 4. Start slow tool agent (port 9001)
  - name: "Start slow tool agent"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start slow-tool-java --env MCP_MESH_HTTP_PORT=9001 -d
      echo "Slow tool agent starting..."
    capture: start_tool

  - name: "Wait for tool agent"
    handler: wait
    seconds: 20

  # 5. Start direct consumer (port 9002)
  - name: "Start direct consumer"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start direct-consumer-gemini-java --env-file .env --env MCP_MESH_HTTP_PORT=9002 -d
      echo "Direct consumer starting..."
    capture: start_consumer

  - name: "Wait for consumer and resolution"
    handler: wait
    seconds: 45

  # 6. Verify all agents registered
  - name: "Verify agents registered"
    handler: shell
    workdir: /workspace
    command: |
      meshctl list
    capture: agent_list

  # 7. Call parallelAnalyze with stock query (should trigger all 3 tools)
  - name: "Parallel tool query"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call parallelAnalyze --timeout 120 '{"ctx": {"query": "Give me a comprehensive analysis of META stock. Get the stock price, company info, and market sentiment.", "ticker": "META"}}'
    capture: parallel_response
    timeout: 180

  # 8. Check consumer logs for parallel mode
  - name: "Check consumer logs for parallel mode"
    handler: shell
    workdir: /workspace
    command: |
      meshctl logs direct-consumer-gemini-java 2>&1
    capture: consumer_logs

assertions:
  # Verify agents registered
  - expr: "${captured.agent_list} contains 'slow-tool-java'"
    message: "Slow tool agent should be registered"
  - expr: "${captured.agent_list} contains 'direct-consumer-gemini-java'"
    message: "Direct consumer Gemini agent should be registered"
  # Verify response contains data from all 3 tools
  - expr: "${captured.parallel_response} contains 'META'"
    message: "Response should reference the META ticker"
  - expr: "${captured.parallel_response} contains 'sentiment'"
    message: "Response should contain sentiment data (from get_market_sentiment)"
post_run:
  - handler: shell
    workdir: /workspace
    command: |
      meshctl stop 2>/dev/null || true
      pkill -f "spring-boot:run" 2>/dev/null || true
    ignore_errors: true
  - routine: global.cleanup_workspace
