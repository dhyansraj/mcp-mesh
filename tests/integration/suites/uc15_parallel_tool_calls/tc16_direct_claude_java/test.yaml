# Test Case: TC16 - Java Direct Claude Parallel Tool Calls
# Tests parallel tool execution in Java LLM agent with direct Claude provider
#
# Scenario:
#   - Start slow-tool-java (3 tools, each sleeps 3s) on port 9001
#   - Start direct-consumer-claude-java (direct mode, parallelToolCalls=true) on port 9002
#   - No separate LLM provider needed — direct mode calls Claude API directly
#   - Query triggers all 3 tools simultaneously
#   - Assert all 3 tool results are in the response

name: "Java Direct Claude Parallel Tool Calls"
description: "Test parallelToolCalls=true in Java direct-mode LLM agent with Claude"
tags:
  - parallel
  - java
  - claude
  - direct
  - issue-672
  - skip-known-issue
timeout: 600

pre_run:
  - routine: global.setup_for_java_agent

test:
  # 1. Copy artifacts
  - name: "Copy artifacts"
    handler: shell
    command: |
      cp -r /uc-artifacts/slow-tool-java /workspace/
      cp -r /uc-artifacts/direct-consumer-claude-java /workspace/
      ls -la /workspace/

  # 2. Create env file
  - name: "Create env file with secrets"
    handler: secrets
    target: /workspace/.env
    keys:
      - ANTHROPIC_API_KEY

  # 3. Install dependencies
  - name: "Install tool dependencies"
    handler: maven-install
    path: /workspace/slow-tool-java
    timeout: 600

  - name: "Install consumer dependencies"
    handler: maven-install
    path: /workspace/direct-consumer-claude-java
    timeout: 600

  # 4. Start slow tool agent (port 9001)
  - name: "Start slow tool agent"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start slow-tool-java --env MCP_MESH_HTTP_PORT=9001 -d
      echo "Slow tool agent starting..."
    capture: start_tool

  - name: "Wait for tool agent"
    handler: wait
    seconds: 20

  # 5. Start direct consumer (port 9002)
  - name: "Start direct consumer"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start direct-consumer-claude-java --env-file .env --env MCP_MESH_HTTP_PORT=9002 -d
      echo "Direct consumer starting..."
    capture: start_consumer

  - name: "Wait for consumer and resolution"
    handler: wait
    seconds: 45

  # 6. Verify all agents registered
  - name: "Verify agents registered"
    handler: shell
    workdir: /workspace
    command: |
      meshctl list
    capture: agent_list

  # 7. Call parallelAnalyze with stock query (should trigger all 3 tools)
  # The prompt is imperative ("MUST call all three") and the verdict step
  # below checks for tool-returned literal values (Bullish/Bearish/Neutral),
  # not the word "sentiment" — Claude tends to write "sentiment" in prose
  # even when get_market_sentiment wasn't called, so the literal-value
  # check is a more reliable proof that all 3 parallel tools ran.
  - name: "Parallel tool query"
    handler: shell
    workdir: /workspace
    command: |
      RESPONSE=$(meshctl call parallelAnalyze --timeout 120 '{"ctx": {"query": "You MUST call all three tools in parallel for ticker NVDA: get_stock_price, get_company_info, AND get_market_sentiment. Return the raw values from each tool — do not summarize or omit any field. Include the literal sentiment value (Bullish/Bearish/Neutral) and recommendation (Buy/Hold/Sell) from get_market_sentiment.", "ticker": "NVDA"}}' 2>&1)
      echo "$RESPONSE"
      # Verdict token: did Claude actually call get_market_sentiment? The
      # tool returns one of {Bullish, Bearish, Neutral, Very Bullish, Very
      # Bearish}. tsuite assertion expressions don't support OR, so we
      # collapse the disjunction here in shell.
      if echo "$RESPONSE" | grep -qE 'Bullish|Bearish|Neutral'; then
        echo "SENTIMENT_TOOL_VERDICT=PASS"
      else
        echo "SENTIMENT_TOOL_VERDICT=FAIL"
      fi
    capture: parallel_response
    timeout: 180

  # 8. Check consumer logs for parallel mode
  - name: "Check consumer logs for parallel mode"
    handler: shell
    workdir: /workspace
    command: |
      meshctl logs direct-consumer-claude-java 2>&1
    capture: consumer_logs

assertions:
  # Verify agents registered
  - expr: "${captured.agent_list} contains 'slow-tool-java'"
    message: "Slow tool agent should be registered"
  - expr: "${captured.agent_list} contains 'direct-consumer-claude-java'"
    message: "Direct consumer Claude agent should be registered"
  # Verify response contains data from all 3 tools
  - expr: "${captured.parallel_response} contains 'NVDA'"
    message: "Response should reference the NVDA ticker"
  # Verdict-token pattern: shell collapses the OR-disjunction into a single
  # PASS/FAIL token because tsuite assertion expressions don't support OR.
  # PASS = Claude's response contains a sentiment value (Bullish/Bearish/
  # Neutral) returned by the get_market_sentiment tool, proving all 3
  # parallel tools were called.
  - expr: "${captured.parallel_response} contains 'SENTIMENT_TOOL_VERDICT=PASS'"
    message: "Response should contain a sentiment value (Bullish/Bearish/Neutral) returned by get_market_sentiment, proving all 3 parallel tools ran"
  - expr: "${captured.parallel_response} not contains 'SENTIMENT_TOOL_VERDICT=FAIL'"
    message: "Sentiment-tool verdict must be PASS (negative guard)"
post_run:
  - handler: shell
    workdir: /workspace
    command: |
      meshctl stop 2>/dev/null || true
      pkill -f "spring-boot:run" 2>/dev/null || true
    ignore_errors: true
  - routine: global.cleanup_workspace
