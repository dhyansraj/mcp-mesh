# Test Case: TC14 - TypeScript Parallel Tool Calls (OpenAI)
# Tests parallel tool execution in TypeScript LLM agent with mesh-delegated OpenAI provider
#
# Scenario:
#   - Start slow-tool-ts (3 tools, each sleeps 3s) on port 9001
#   - Start openai-provider-py on port 9002 (Python provider, mesh delegated)
#   - Start consumer-openai-ts (parallelToolCalls=true) on port 9003
#   - Query triggers all 3 tools simultaneously via OpenAI
#   - Assert all 3 tool results are in the response

name: "TypeScript Parallel Tool Calls (OpenAI)"
description: "Test parallelToolCalls=true in TypeScript LLM agent with OpenAI provider and 3 slow financial tools"
tags:
  - parallel
  - typescript
  - openai
  - llm
  - issue-672
timeout: 300

pre_run:
  - routine: global.setup_for_python_agent
  - routine: global.setup_for_typescript_agent

test:
  # 1. Copy artifacts
  - name: "Copy artifacts"
    handler: shell
    command: |
      cp -r /uc-artifacts/slow-tool-ts /workspace/
      cp -r /uc-artifacts/openai-provider-py /workspace/
      cp -r /uc-artifacts/consumer-openai-ts /workspace/
      ls -la /workspace/

  # 2. Create env file
  - name: "Create env file with secrets"
    handler: secrets
    target: /workspace/.env
    keys:
      - OPENAI_API_KEY

  # 3. Install dependencies
  - name: "Install provider dependencies"
    handler: pip-install
    path: /workspace/openai-provider-py

  - name: "Install tool dependencies"
    handler: npm-install
    path: /workspace/slow-tool-ts

  - name: "Install consumer dependencies"
    handler: npm-install
    path: /workspace/consumer-openai-ts

  # 4. Start slow tool agent (port 9001)
  - name: "Start slow tool agent"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start slow-tool-ts/src/index.ts --env MCP_MESH_HTTP_PORT=9001 -d
      echo "Slow tool agent starting..."
    capture: start_tool

  - name: "Wait for tool agent"
    handler: wait
    seconds: 15

  # 5. Start OpenAI provider (port 9002)
  - name: "Start OpenAI provider"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start openai-provider-py/main.py --env-file .env --env MCP_MESH_HTTP_PORT=9002 -d
      echo "Provider agent starting..."
    capture: start_provider

  - name: "Wait for provider"
    handler: wait
    seconds: 20

  # 6. Start consumer (port 9003)
  - name: "Start parallel consumer"
    handler: shell
    workdir: /workspace
    command: |
      cd /workspace
      meshctl start consumer-openai-ts/src/index.ts --env MCP_MESH_HTTP_PORT=9003 -d
      echo "Parallel consumer starting..."
    capture: start_consumer

  - name: "Wait for consumer and resolution"
    handler: wait
    seconds: 25

  # 7. Verify agents registered
  - name: "Verify agents registered"
    handler: shell
    workdir: /workspace
    command: |
      meshctl list
    capture: agent_list

  # 8. Call parallel_analyze with stock query (should trigger all 3 tools)
  - name: "Parallel tool query"
    handler: shell
    workdir: /workspace
    command: |
      meshctl call parallel_analyze --timeout 120 '{"ctx": {"query": "Give me a comprehensive analysis of GOOGL stock. Get the stock price, company info, and market sentiment.", "ticker": "GOOGL"}}'
    capture: parallel_response
    timeout: 120

  # 9. Check consumer logs for parallel mode
  - name: "Check consumer logs for parallel mode"
    handler: shell
    workdir: /workspace
    command: |
      meshctl logs consumer-openai-ts 2>&1
    capture: consumer_logs

  # 10. Check provider logs for parallel execution
  - name: "Check provider logs for parallel execution"
    handler: shell
    workdir: /workspace
    command: |
      meshctl logs openai-provider-py 2>&1
    capture: provider_logs

assertions:
  # Verify agents registered
  - expr: "${captured.agent_list} contains 'slow-tool-ts'"
    message: "Slow tool agent should be registered"
  - expr: "${captured.agent_list} contains 'openai-provider-py'"
    message: "OpenAI provider should be registered"
  - expr: "${captured.agent_list} contains 'consumer-openai-ts'"
    message: "Parallel consumer should be registered"
  # Verify response contains data from all 3 tools
  - expr: "${captured.parallel_response} contains 'GOOGL'"
    message: "Response should reference the GOOGL ticker"
  - expr: "${captured.parallel_response} contains 'sentiment'"
    message: "Response should contain sentiment data (from get_market_sentiment)"
  # Assertion: parallel mode must be explicitly enabled in agent
  - expr: "${captured.consumer_logs} contains 'parallel tool calls enabled'"
    message: "Consumer agent should log 'parallel tool calls enabled' when parallelToolCalls=true is set"
  # Assertion: provider must execute tools in parallel (fix for #713)
  - expr: "${captured.provider_logs} contains 'Provider executing'"
    message: "Provider should log parallel tool execution (fix #713: parallel_tool_calls in mesh delegation)"
  - expr: "${captured.provider_logs} contains 'tool calls in parallel'"
    message: "Provider should execute tool calls in parallel, not sequentially"

post_run:
  - handler: shell
    workdir: /workspace
    command: |
      meshctl stop 2>/dev/null || true
    ignore_errors: true
  - routine: global.cleanup_workspace
