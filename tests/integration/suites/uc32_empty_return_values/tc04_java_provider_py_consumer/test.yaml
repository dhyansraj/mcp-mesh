# Test Case: Empty return values round-trip (Java provider -> Python consumer)
# Cross-check anchor for issue #1250: the Java provider always emitted a real
# "[]" text block for empty lists, so every consumer parsed it correctly -
# the Python provider was the outlier. This test pins the working column so
# a fix to the Python provider (or to the consumers' empty-content recovery)
# cannot regress the Java provider path.
#
# Contract: [] -> [], {} -> {}, "" -> "", null -> None, [1,2,3] -> [1,2,3].
# Emptiness and absence are different values.
#
# Uses UC-level artifacts from /uc-artifacts

name: "Empty Return Round-Trip: Java provider -> Python consumer"
description: "Verify [], {}, '', null and [1,2,3] returned by a Java tool arrive unchanged at a Python consumer"
tags:
  - tools
  - cross-agent
  - dependency
  - empty-values
  - regression
  - java
  - python
timeout: 480

pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"
  - routine: global.setup_for_java_agent
    params:
      meshctl_version: "${config.packages.cli_version}"

test:
  # Copy artifacts
  - name: "Copy artifacts to workspace"
    handler: shell
    command: |
      cp -r /uc-artifacts/java-empty-provider /workspace/
      cp -r /uc-artifacts/py-empty-consumer /workspace/
    capture: copy_output

  # Install Maven dependencies for the Java provider
  - name: "Install Maven dependencies"
    handler: maven-install
    path: /workspace/java-empty-provider
    timeout: 600

  # Start provider. No registration wait before starting the consumer:
  # the consumer's settle window covers dependency arrival order.
  - name: "Start empty-value provider (Java)"
    handler: shell
    command: "meshctl start /workspace/java-empty-provider -d"
    workdir: /workspace
    capture: start_provider

  # Start consumer.
  # MCP_MESH_SETTLE_TIMEOUT=60 (settling-window dependency grace, PR #1200):
  # calls arriving before the empty_value_source dependency resolves are held
  # until resolution lands - no fixed dep-resolution sleeps.
  # (The consumer's second tool depends on empty_list_typed, which this
  # provider does not offer - that tool is not called here; unresolved
  # dependencies soft-fail by design.)
  - name: "Start probe consumer (Python)"
    handler: shell
    command: "meshctl start py-empty-consumer/main.py --env MCP_MESH_SETTLE_TIMEOUT=60 -d"
    workdir: /workspace
    capture: start_consumer

  # Liveness only: wait for both agents to REGISTER (meshctl call routes via
  # the registry). The Java provider cold-compiles (mvn spring-boot:run) at
  # start, which can exceed 90s under cluster load - hence the 240s loop.
  # Dependency resolution is covered by the settle window.
  - name: "Wait for both agents to register"
    handler: shell
    workdir: /workspace
    command: |
      echo "Waiting for both agents to register..."
      for i in $(seq 1 120); do
        AGENTS=$(meshctl list 2>/dev/null || true)
        if echo "$AGENTS" | grep -q "java-empty-provider" && echo "$AGENTS" | grep -q "py-empty-consumer"; then
          echo "Both agents registered after ~$((i*2))s"
          exit 0
        fi
        sleep 2
      done
      echo "ERROR: agents did not register within 240s"
      echo "=== Agent logs ==="
      meshctl logs java-empty-provider 2>/dev/null | tail -50 || true
      meshctl logs py-empty-consumer 2>/dev/null | tail -50 || true
      exit 1
    capture: wait_registration
    timeout: 260

  # Probe each boundary value through the injected proxy
  - name: "Probe empty list"
    handler: shell
    workdir: /workspace
    command: 'meshctl call probe_roundtrip ''{"kind": "empty_list"}'''
    capture: probe_empty_list

  - name: "Probe empty dict"
    handler: shell
    workdir: /workspace
    command: 'meshctl call probe_roundtrip ''{"kind": "empty_dict"}'''
    capture: probe_empty_dict

  - name: "Probe empty string"
    handler: shell
    workdir: /workspace
    command: 'meshctl call probe_roundtrip ''{"kind": "empty_string"}'''
    capture: probe_empty_string

  - name: "Probe null value"
    handler: shell
    workdir: /workspace
    command: 'meshctl call probe_roundtrip ''{"kind": "null_value"}'''
    capture: probe_null_value

  - name: "Probe non-empty list (regression anchor)"
    handler: shell
    workdir: /workspace
    command: 'meshctl call probe_roundtrip ''{"kind": "nonempty_list"}'''
    capture: probe_nonempty_list

assertions:
  # IDIOM: the equality lives INSIDE the jq filter so the interpolation
  # yields a bare true/false. tsuite Go-formats extracted values before
  # comparison ({} -> map[], null -> <nil>, [1,2,3] -> [1 2 3]), so direct
  # string comparison of extracted values is unreliable. Also, tsuite's
  # interpolation body cannot contain '}' (parsed as [^}]+), hence the
  # type+length check for the empty-dict case instead of == "{}".

  # Dependency was injected in every probe (no local-fallback accommodation)
  - expr: "${captured.probe_empty_list} not contains 'not injected'"
    message: "empty_value_source dependency must be injected"

  # [] stays []
  - expr: "${jq:captured.probe_empty_list:(.content[0].text | fromjson | .value_json | fromjson) == []} == 'true'"
    message: "Empty list from the Java provider must arrive as []"
  - expr: "${jq:captured.probe_empty_list:(.content[0].text | fromjson | .is_none) == false} == 'true'"
    message: "Empty list must NOT collapse to None"
  - expr: "${jq:captured.probe_empty_list:(.content[0].text | fromjson | .value_type) == \"list\"} == 'true'"
    message: "Empty list must arrive as a Python list"

  # {} stays {} (object with zero keys - see idiom note re: '}')
  - expr: "${jq:captured.probe_empty_dict:(.content[0].text | fromjson | .value_json | fromjson) | (type == \"object\" and length == 0)} == 'true'"
    message: "Empty dict must arrive as {}"
  - expr: "${jq:captured.probe_empty_dict:(.content[0].text | fromjson | .is_none) == false} == 'true'"
    message: "Empty dict must NOT collapse to None"

  # '' stays ''
  - expr: "${jq:captured.probe_empty_string:(.content[0].text | fromjson | .value_json | fromjson) == \"\"} == 'true'"
    message: "Empty string must arrive as ''"
  - expr: "${jq:captured.probe_empty_string:(.content[0].text | fromjson | .is_none) == false} == 'true'"
    message: "Empty string must NOT collapse to None"

  # null stays None (absence preserved - not resurrected as [] or '')
  - expr: "${jq:captured.probe_null_value:(.content[0].text | fromjson | .is_none) == true} == 'true'"
    message: "null must arrive as None"
  - expr: "${jq:captured.probe_null_value:(.content[0].text | fromjson | .value_json | fromjson) == null} == 'true'"
    message: "null must serialize as null - not [] or ''"

  # [1,2,3] stays [1,2,3] (regression anchor)
  - expr: "${jq:captured.probe_nonempty_list:(.content[0].text | fromjson | .value_json | fromjson) == [1,2,3]} == 'true'"
    message: "Non-empty list must arrive unchanged as [1,2,3]"

post_run:
  - handler: shell
    workdir: /workspace
    command: |
      meshctl stop 2>/dev/null || true
      pkill -f "spring-boot:run" 2>/dev/null || true
      pkill -f "java.*empty" 2>/dev/null || true
    ignore_errors: true
  - routine: global.cleanup_workspace
