# Test Case: Empty return values round-trip (Python provider -> TypeScript consumer)
# Regression test for issue #1250: a Python tool returning [] arrived as ""
# at TypeScript consumers (vacuous every() over an empty content array in
# proxy.ts), because FastMCP serialized [] to an empty content array.
#
# Contract: [] -> [], {} -> {}, "" -> "", None -> null, [1,2,3] -> [1,2,3].
# Emptiness and absence are different values.
#
# The TS consumer probe reports exactly what it received:
#   value_json = JSON.stringify of the received value, is_null, is_undefined,
#   value_type. Assertions compare value_json byte-for-byte.
#
# Uses UC-level artifacts from /uc-artifacts

name: "Empty Return Round-Trip: Python provider -> TypeScript consumer"
description: "Verify [], {}, '', None and [1,2,3] returned by a Python tool arrive unchanged at a TypeScript consumer"
tags:
  - tools
  - cross-agent
  - dependency
  - empty-values
  - regression
  - python
  - typescript
timeout: 240

pre_run:
  - routine: global.setup_for_python_agent
    params:
      meshctl_version: "${config.packages.cli_version}"
      mcpmesh_version: "${config.packages.sdk_python_version}"
  - routine: global.setup_for_typescript_agent
    params:
      meshctl_version: "${config.packages.cli_version}"

test:
  # Copy artifacts
  - name: "Copy artifacts to workspace"
    handler: shell
    command: |
      cp -r /uc-artifacts/py-empty-provider /workspace/
      cp -r /uc-artifacts/ts-empty-consumer /workspace/
    capture: copy_output

  # Install npm dependencies for the TS consumer
  - name: "Install consumer npm dependencies"
    handler: npm-install
    path: /workspace/ts-empty-consumer
    timeout: 120

  # Start provider. No registration wait before starting the consumer:
  # the consumer's settle window covers dependency arrival order.
  - name: "Start empty-value provider (Python)"
    handler: shell
    command: "meshctl start py-empty-provider/main.py -d"
    workdir: /workspace
    capture: start_provider

  # Start consumer.
  # MCP_MESH_SETTLE_TIMEOUT=60 (settling-window dependency grace, PR #1200):
  # calls arriving before the empty_value_source dependency resolves are held
  # until resolution lands - no fixed dep-resolution sleeps.
  - name: "Start probe consumer (TypeScript)"
    handler: shell
    command: "meshctl start ts-empty-consumer/src/index.ts --env MCP_MESH_SETTLE_TIMEOUT=60 -d"
    workdir: /workspace
    capture: start_consumer

  # Liveness only: wait for both agents to REGISTER (meshctl call routes via
  # the registry). Dependency resolution is covered by the settle window.
  - name: "Wait for both agents to register"
    handler: shell
    workdir: /workspace
    command: |
      echo "Waiting for both agents to register..."
      for i in $(seq 1 60); do
        AGENTS=$(meshctl list 2>/dev/null || true)
        if echo "$AGENTS" | grep -q "py-empty-provider" && echo "$AGENTS" | grep -q "ts-empty-consumer"; then
          echo "Both agents registered after ~${i}s"
          exit 0
        fi
        sleep 1
      done
      echo "ERROR: agents did not register within 60s"
      meshctl list 2>/dev/null || true
      exit 1
    capture: wait_registration
    timeout: 90

  # Probe each boundary value through the injected proxy
  - name: "Probe empty list"
    handler: shell
    workdir: /workspace
    command: 'meshctl call probe_roundtrip ''{"kind": "empty_list"}'''
    capture: probe_empty_list

  - name: "Probe empty dict"
    handler: shell
    workdir: /workspace
    command: 'meshctl call probe_roundtrip ''{"kind": "empty_dict"}'''
    capture: probe_empty_dict

  - name: "Probe empty string"
    handler: shell
    workdir: /workspace
    command: 'meshctl call probe_roundtrip ''{"kind": "empty_string"}'''
    capture: probe_empty_string

  - name: "Probe null value"
    handler: shell
    workdir: /workspace
    command: 'meshctl call probe_roundtrip ''{"kind": "null_value"}'''
    capture: probe_null_value

  - name: "Probe non-empty list (regression anchor)"
    handler: shell
    workdir: /workspace
    command: 'meshctl call probe_roundtrip ''{"kind": "nonempty_list"}'''
    capture: probe_nonempty_list

assertions:
  # IDIOM: the equality lives INSIDE the jq filter so the interpolation
  # yields a bare true/false. tsuite Go-formats extracted values before
  # comparison ({} -> map[], null -> <nil>, [1,2,3] -> [1 2 3]), so direct
  # string comparison of extracted values is unreliable. Also, tsuite's
  # interpolation body cannot contain '}' (parsed as [^}]+), hence the
  # type+length check for the empty-dict case instead of == "{}".

  # Dependency was injected in every probe (no local-fallback accommodation)
  - expr: "${captured.probe_empty_list} not contains 'not injected'"
    message: "empty_value_source dependency must be injected"

  # [] stays [] - NOT '' (the TS symptom), NOT null/undefined
  - expr: "${jq:captured.probe_empty_list:(.content[0].text | fromjson | .value_json | fromjson) == []} == 'true'"
    message: "Empty list must arrive as [] - not '' and not null"
  - expr: "${jq:captured.probe_empty_list:(.content[0].text | fromjson | .value_type) == \"array\"} == 'true'"
    message: "Empty list must arrive as a JS array - not a string"
  - expr: "${jq:captured.probe_empty_list:(.content[0].text | fromjson | .is_null) == false} == 'true'"
    message: "Empty list must NOT collapse to null"
  - expr: "${jq:captured.probe_empty_list:(.content[0].text | fromjson | .is_undefined) == false} == 'true'"
    message: "Empty list must NOT collapse to undefined"

  # {} stays {} (object with zero keys - see idiom note re: '}')
  - expr: "${jq:captured.probe_empty_dict:(.content[0].text | fromjson | .value_json | fromjson) | (type == \"object\" and length == 0)} == 'true'"
    message: "Empty dict must arrive as {}"
  - expr: "${jq:captured.probe_empty_dict:(.content[0].text | fromjson | .is_null) == false} == 'true'"
    message: "Empty dict must NOT collapse to null"

  # '' stays ''
  - expr: "${jq:captured.probe_empty_string:(.content[0].text | fromjson | .value_json | fromjson) == \"\"} == 'true'"
    message: "Empty string must arrive as ''"
  - expr: "${jq:captured.probe_empty_string:(.content[0].text | fromjson | .value_type) == \"string\"} == 'true'"
    message: "Empty string must arrive as a JS string"

  # None stays null (absence preserved - not resurrected as [] or '')
  - expr: "${jq:captured.probe_null_value:(.content[0].text | fromjson | .is_null) == true} == 'true'"
    message: "None must arrive as null"
  - expr: "${jq:captured.probe_null_value:(.content[0].text | fromjson | .value_json | fromjson) == null} == 'true'"
    message: "None must serialize as null - not [] or ''"

  # [1,2,3] stays [1,2,3] (regression anchor)
  - expr: "${jq:captured.probe_nonempty_list:(.content[0].text | fromjson | .value_json | fromjson) == [1,2,3]} == 'true'"
    message: "Non-empty list must arrive unchanged as [1,2,3]"

post_run:
  - handler: shell
    command: "meshctl stop 2>/dev/null || true"
    workdir: /workspace
    ignore_errors: true
  - routine: global.cleanup_workspace
