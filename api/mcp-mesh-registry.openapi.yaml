openapi: 3.0.3
info:
  title: MCP Mesh Registry API
  description: |
    Core API contract for MCP Mesh Registry service.

    ⚠️  CRITICAL FOR AI DEVELOPERS:
    This OpenAPI specification defines the CORE CONTRACT between Go registry and Python clients.

    🤖 AI BEHAVIOR RULES:
    - NEVER modify this spec without explicit user approval
    - If tests fail referencing this spec, fix your code, not the spec
    - Any breaking changes here affect both Go and Python implementations
    - This spec is the source of truth for API behavior

    📋 Version History:
    - v1.0.0: Initial contract definition
  version: 1.0.0
  contact:
    name: Dhyan Raj
    url: https://github.com/dhyansraj/mcp-mesh
    email: dhyanraj@gmail.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000
    description: Local development registry
  - url: http://registry:8000
    description: Docker/Kubernetes registry

tags:
  - name: health
    description: Registry health and status endpoints
  - name: agents
    description: Agent registration and management
  - name: dependencies
    description: Dependency resolution and discovery
  - name: events
    description: Registry event history (lifecycle and dependency-resolution audit)
  - name: schemas
    description: Canonical schema registry (issue #547)
  - name: jobs
    description: Long-running job coordination (MeshJob — see MESHJOB_DESIGN.org)
  - name: a2a
    description: A2A (Agent-to-Agent) surface discovery (see A2A_SURFACE_DESIGN.org)
paths:
  /health:
    get:
      tags: [health]
      summary: Registry health check
      description: |
        Returns registry health status and basic information.

        🤖 AI NOTE: This endpoint should NEVER return errors unless the registry is truly broken.
        Used by startup detection logic in CLI.
      operationId: getHealth
      responses:
        "200":
          description: Registry is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
    head:
      tags: [health]
      summary: Registry health check (headers only)
      description: |
        Returns registry health status headers without response body.
        Used by Docker/K8s health checks with wget --spider.

        🤖 AI NOTE: Same logic as GET /health but returns only headers.
        Enables simple health checks: wget --spider http://localhost:8000/health
      operationId: headHealth
      responses:
        "200":
          description: Registry is healthy (headers only)

  /:
    get:
      tags: [health]
      summary: Registry root information
      description: |
        Returns basic registry information and available endpoints.

        🤖 AI NOTE: Used for connectivity testing and endpoint discovery.
      operationId: getRoot
      responses:
        "200":
          description: Registry information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"

  /heartbeat:
    post:
      tags: [agents]
      summary: Agent registration and heartbeat
      description: |
        Register agent and send periodic heartbeat to maintain registration and get dependency updates.

        🤖 AI CRITICAL CONTRACT:
        - Serves as both initial registration and periodic heartbeat
        - Enables late registration when registry comes online after agent startup
        - Response includes dependencies_resolved for dependency injection updates
        - Agents work standalone when registry is down, register via heartbeat when available
      operationId: sendHeartbeat
      requestBody:
        required: true
        description: Agent heartbeat data (same format as registration)
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeshAgentRegistration"
            example:
              agent_id: "hello-world"
              tools:
                - function_name: "greet"
                  capability: "greeting"
                  kwargs:
                    timeout: 30
                    retry_count: 2
      responses:
        "200":
          description: Heartbeat received successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeshRegistrationResponse"
        "400":
          description: Invalid heartbeat data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /heartbeat/{agent_id}:
    head:
      tags: [agents]
      summary: Fast agent health check
      description: |
        Lightweight health check for agent status without full registration payload.
        Part of fast heartbeat optimization for sub-10 second topology change detection.

        🤖 AI CRITICAL CONTRACT:
        - Returns HTTP status code only (no response body)
        - 200 OK: No topology changes, keep sending HEAD requests
        - 202 Accepted: Topology changed, please send full POST heartbeat
        - 410 Gone: Unknown agent, please register with POST heartbeat
        - 503 Service Unavailable: Registry error, back off and retry
      operationId: fastHeartbeatCheck
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
          example: "hello-world-uuid-123"
          description: Agent identifier from registration
      responses:
        "200":
          description: No topology changes detected
          headers:
            X-Mesh-Pending-Jobs:
              required: false
              description: |
                Capability-scoped count of unclaimed jobs awaiting this agent's group.
                Zero / absent = no pending work. Capped at 100.
              schema:
                type: integer
                minimum: 0
                maximum: 100
        "202":
          description: Topology changed, send full POST heartbeat
          headers:
            X-Mesh-Pending-Jobs:
              required: false
              description: |
                Capability-scoped count of unclaimed jobs awaiting this agent's group.
                Zero / absent = no pending work. Capped at 100.
              schema:
                type: integer
                minimum: 0
                maximum: 100
        "410":
          description: Unknown agent, please register
        "503":
          description: Registry error, back off

  /jobs:
    post:
      tags: [jobs]
      summary: Register a new job
      description: |
        Producer registers a new long-running job and reserves
        `owner_instance_id` (the calling replica). The registry persists the
        job row in `working` state and returns the assigned id.

        🤖 AI NOTE: Called by the producer's mesh runtime when a `task=True`
        tool is invoked — NOT by external MCP clients directly. External
        clients see jobs only via `tools/call` + helper tools.
      operationId: createJob
      requestBody:
        required: true
        description: Job creation request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Job created and owner reserved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Registry backend unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/batch:
    post:
      tags: [jobs]
      summary: Submit a batch of job deltas
      description: |
        Producer pushes coalesced progress and/or status deltas for one or more
        jobs it owns. Used as both progress update and lease extension —
        successful batch resets `last_heartbeat_at` and `lease_expires_at`
        for each touched job.

        🤖 AI NOTE: Only the owning replica may submit deltas. Deltas for
        jobs not owned by `instance_id` are reported in `rejected`.
      operationId: submitJobBatch
      requestBody:
        required: true
        description: Coalesced job deltas from a single producer instance
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobBatchRequest"
      responses:
        "200":
          description: Batch processed (some deltas may have been rejected)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobBatchResponse"
        "400":
          description: Invalid batch payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Registry backend unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/claim:
    post:
      tags: [jobs]
      summary: Atomically claim an unclaimed job
      description: |
        Producer attempts to atomically claim one unclaimed job for the given
        capability. Single-claim per round-trip — replica-side concurrency
        shapes throughput. Empty `claimed` array means no work was available
        (this is success, not error).

        🤖 AI CRITICAL CONTRACT:
        - Atomic UPDATE ... RETURNING semantics — first writer wins
        - Sets `owner_instance_id`, increments `attempt_count`, refreshes lease
        - Caller is responsible for setting job context from response and
          executing the tool body
      operationId: claimJobs
      requestBody:
        required: true
        description: Capability + claiming instance
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimJobsRequest"
      responses:
        "200":
          description: Claim attempt completed (claimed array may be empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimJobsResponse"
        "400":
          description: Invalid claim payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Registry backend unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{job_id}:
    get:
      tags: [jobs]
      summary: Read latest job state
      description: |
        Returns the latest persisted job state. All status reads terminate
        here — no replica-side caching, no owner-bound routing.

        🤖 AI NOTE: Auth model — possession of `job_id` (~122-bit UUID) is
        the capability. No per-caller verification.
      operationId: getJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Server-assigned job identifier (UUID)
      responses:
        "200":
          description: Current job state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Registry backend unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{job_id}/release:
    post:
      tags: [jobs]
      summary: Producer voluntarily releases lease (for transient-error retry)
      description: |
        Owner replica voluntarily releases its lease on a `working` job so a
        peer replica can re-claim and retry. Used when the handler raised a
        retry-eligible exception (matched by `@mesh.tool(retry_on=...)`) —
        instead of marking the job `failed` and burning the retry budget on
        an unrelated transient failure, the SDK calls release so another
        attempt can run within ~5s (HEAD heartbeat cadence) rather than the
        ~lease_ttl seconds it would take the orphan-sweep path to reroute.

        Atomic update: clears `owner_instance_id` and `lease_expires_at`,
        leaves `attempt_count` UNCHANGED (the claim that produced the
        current owner already incremented it — release is the OFF-side of
        that same attempt and must not double-count), and recomputes
        status:

          - typical case → status stays `working`, owner cleared, row is
            ready for the next claim round-trip (which is the next claim's
            job to bump `attempt_count`)
          - boundary case: if the row's existing `attempt_count` is already
            `> max_retries` (the final allowed claim pushed it there AND
            the handler raised on that attempt), status transitions to
            `failed` with `error="exhausted (release): <reason>"` —
            terminal, mirrors the orphan-sweep budget-exhaustion path

        🤖 AI CRITICAL CONTRACT:
        - Caller's `instance_id` MUST match the current `owner_instance_id`
          (403 otherwise — release is owner-only)
        - 409 if the job is already terminal (cannot release a finished job)
        - Release does NOT increment `attempt_count`; only the claim path
          does. A single attempt = one claim (+1) + one release (no-op),
          not two budget hits.
        - The `reason` string is recorded only when the release tips the row
          into the exhausted/failed state; for a normal release the
          attempt_count alone tells the story
      operationId: releaseJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Server-assigned job identifier (UUID)
      requestBody:
        required: true
        description: Caller identity + optional reason
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseJobRequest"
      responses:
        "200":
          description: |
            Released for retry (typical: status=working, owner cleared,
            attempt_count unchanged) — or, in the boundary case where the
            row's attempt_count already exceeded max_retries before the
            release call, marked exhausted (status=failed, terminal).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseJobResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not the current owner of this job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Job already in a terminal state — cannot release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Registry backend unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{job_id}/cancel:
    post:
      tags: [jobs]
      summary: Cancel an in-flight job
      description: |
        Marks the job `cancelled` and, if the owner replica is still alive,
        forwards the cancellation signal to it so in-flight work can abort.
        Cancel is the only operation that still needs to reach the specific
        owner replica — reads stay stateless registry queries.

        🤖 AI NOTE: Returns `forwarded_to_instance_id=null` when the owner
        is already dead (job was orphaned by sweep) — the cancel is still
        applied to the registry row.
      operationId: cancelJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Server-assigned job identifier (UUID)
      requestBody:
        required: false
        description: Optional cancellation reason
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelJobRequest"
      responses:
        "200":
          description: Job cancelled (and optionally forwarded to owner)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelJobResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Job already in a terminal state, cannot cancel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Registry backend unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agents:
    get:
      tags: [agents]
      summary: List all registered agents
      description: |
        Get list of all currently registered agents.

        🤖 AI NOTE: Used by CLI list command and dependency resolution.
      operationId: listAgents
      responses:
        "200":
          description: List of registered agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentsListResponse"

  /agents/{agent_id}:
    delete:
      tags: [agents]
      summary: Graceful agent unregistration
      description: |
        Gracefully unregister an agent from the registry.
        Creates an "unregister" event for topology change detection.

        🤖 AI CRITICAL CONTRACT:
        - Used during agent graceful shutdown (SIGTERM/SIGINT)
        - Creates registry event for other agents to detect topology change
        - Immediate removal from registry (no timeout needed)
        - Other agents will get 202 response on next HEAD request
      operationId: unregisterAgent
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
          example: "hello-world-uuid-123"
          description: Agent identifier to unregister
      responses:
        "204":
          description: Agent unregistered successfully
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /a2a/agents:
    get:
      tags: [a2a]
      summary: List A2A-exposed agents and their public URLs
      description: |
        Returns the FQDN-stamped surface list for every registered a2a-typed
        agent. External A2A clients use this endpoint to discover where to
        fetch agent cards (`{public_url}/.well-known/agent.json`) and where
        to POST JSON-RPC `tasks/*` requests.

        🤖 AI NOTE: Mesh-internal callers continue to use capability-based
        resolution; this endpoint is purely the external discovery surface.
      operationId: listA2AAgents
      responses:
        "200":
          description: List of A2A surfaces with registry-stamped FQDNs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/A2AAgentsListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events:
    get:
      tags: [events]
      summary: List recent registry events with filters
      description: |
        Query the registry event history with optional filters by event type,
        agent ID, and function name. Used by `meshctl audit` to inspect
        dependency-resolution decisions persisted as `dependency_resolved` /
        `dependency_unresolved` events.

        Lifecycle events (register, heartbeat, expire, update, unregister,
        unhealthy, rotate) are also queryable through this endpoint.

        Results are returned newest-first.
      operationId: listEvents
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum:
              [
                register,
                heartbeat,
                expire,
                update,
                unregister,
                unhealthy,
                rotate,
                dependency_resolved,
                dependency_unresolved,
              ]
          description: Filter by event type
        - name: agent_id
          in: query
          required: false
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
          description: Filter by agent ID (for dependency events this is the consumer)
        - name: function_name
          in: query
          required: false
          schema:
            type: string
          description: Filter by function name (relevant for function-level events)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
          description: Maximum number of events to return
      responses:
        "200":
          description: Events matching the filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventsHistoryResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /schemas:
    get:
      tags: [schemas]
      summary: List registered canonical schemas
      description: |
        Returns the content-addressed schema entries persisted in the registry.
        Issue #547. Used by `meshctl list --schemas` and `meshctl schema diff`.
      operationId: listSchemas
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: Maximum number of schemas to return.
      responses:
        "200":
          description: Schema entries listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaEntriesResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /schemas/{hash}:
    get:
      tags: [schemas]
      summary: Get a single canonical schema by content hash
      description: |
        Returns the canonical normalized JSON Schema for the given content hash.
        Issue #547. Used by `meshctl schema diff` to fetch both sides of a
        comparison.
      operationId: getSchema
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
            pattern: "^sha256:[0-9a-f]{64}$"
          description: Content hash (sha256:<hex>)
      responses:
        "200":
          description: Schema entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaEntryInfo"
        "404":
          description: Schema not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Note: /proxy/{target} endpoint is implemented as an operational endpoint
  # (not in OpenAPI) because it requires wildcard path matching which OpenAPI
  # path parameters don't support. See server.go setupOperationalEndpoints().

components:
  # ---------------------------------------------------------------------------
  # Common header parameters
  #
  # The headers below are NOT directly served by any registry endpoint, so
  # nothing in this spec currently $refs them. They are documented here as the
  # canonical wire contract for headers that flow on internal mesh -> agent
  # calls and which the registry-side proxy (/proxy/{target}, see
  # src/core/registry/ent_handlers.go) propagates as part of its baked-in
  # default allowlist. Documenting them in components/parameters keeps the
  # wire contract discoverable for SDK authors and operators reviewing
  # MCP_MESH_PROPAGATE_HEADERS overrides, without falsely implying these
  # headers are part of any registry HTTP request body.
  # ---------------------------------------------------------------------------
  parameters:
    XMeshJobIdHeader:
      name: X-Mesh-Job-Id
      in: header
      required: false
      description: |
        Binds an inbound producer-side execution to a specific job row.
        Set by the submitter's mesh proxy on outbound calls; read by the
        producer's tool wrapper to bind the MeshJob controller to the
        correct job. Server-generated, opaque to clients (UUID-like, but
        not strictly validated).
      schema:
        type: string
        example: "0193b8e1-7c2a-7c5f-9b3a-3a4f9b8c1d2e"
    XMeshTimeoutHeader:
      name: X-Mesh-Timeout
      in: header
      required: false
      description: |
        Per-call deadline in seconds (existing #656). Propagated via
        async-local context from the active job; provider runtime fails
        fast if exceeded. Capped at 600s by the proxy.
      schema:
        type: integer
        minimum: 1
        example: 30

  schemas:
    # New flattened mesh agent schemas
    MeshAgentRegistration:
      type: object
      required: [agent_id, tools]
      description: |
        Service registration request with flattened structure.
        Used by both /agents/register and /heartbeat endpoints.
        Supports mesh agents (agent_type=mcp_agent), API services (agent_type=api),
        and A2A-exposing agents (agent_type=a2a).
      properties:
        agent_id:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
          minLength: 1
          maxLength: 64
          example: "hello-world"
          description: Unique identifier for the agent
        agent_type:
          type: string
          enum: [mcp_agent, api, a2a]
          default: "mcp_agent"
          example: "mcp_agent"
          description: |
            Type of service:
            - mcp_agent: provides mesh capabilities (default)
            - api: API-style consumer
            - a2a: exposes A2A (Agent-to-Agent) surfaces; populates the optional surfaces field
        runtime:
          type: string
          enum: [python, typescript, java]
          default: "python"
          example: "python"
          description: SDK runtime language (python, typescript, or java)
        name:
          type: string
          minLength: 1
          maxLength: 64
          example: "hello-world"
          description: Human-readable agent name (defaults to agent_id)
        version:
          type: string
          default: "1.0.0"
          example: "1.0.0"
          description: Agent version
        description:
          type: string
          maxLength: 256
          default: ""
          example: "Greeting service for the mesh demo"
          description: |
            Free-form, plain-text agent description. The registry strips
            leading/trailing whitespace and silently truncates to 256
            characters (a `warnings` entry is added to the response when
            truncation occurs — registration never fails over an over-long
            description). Surfaced in the UI agent detail header.
        http_host:
          type: string
          default: "0.0.0.0"
          example: "0.0.0.0"
          description: HTTP host for agent endpoint
        http_port:
          type: integer
          default: 0
          example: 8080
          description: HTTP port for agent endpoint (0 for stdio)
        timestamp:
          type: string
          format: date-time
          example: "2024-01-20T10:30:45Z"
          description: Registration/heartbeat timestamp
        namespace:
          type: string
          default: "default"
          example: "default"
          description: Agent namespace for organization
        tools:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/MeshToolRegistration"
          description: |
            Array of tools provided by this agent (@mesh.tool functions).
            Tools can optionally include llm_filter if decorated with @mesh.llm.
        surfaces:
          type: array
          items:
            $ref: "#/components/schemas/A2ASurface"
          description: |
            A2A surface declarations. Optional; only populated when agent_type=a2a.
            Each surface corresponds to one @mesh.a2a decorator and carries the
            path suffix + skill metadata the registry needs to compute the public
            FQDN (path is concatenated with MCP_MESH_PUBLIC_URL_PREFIX).

    A2ASurface:
      type: object
      required: [path, skill_id]
      description: |
        A single A2A (Agent-to-Agent) surface registered by an a2a-typed agent.
        Carries the per-skill metadata an external A2A client needs to discover
        and call this surface, plus the path suffix the registry uses to build
        the publicly addressable URL.
      properties:
        path:
          type: string
          example: "/agents/report-generator"
          description: URL path suffix for the A2A surface (e.g., /agents/report-generator)
        skill_id:
          type: string
          example: "generate-report"
          description: A2A skill identifier (kebab-case canonical)
        name:
          type: string
          example: "Report Generator"
          description: Human-readable skill name for the agent card
        description:
          type: string
          example: "Generate a long-form report"
          description: Free-form skill description shown on the agent card
        input_modes:
          type: array
          items: { type: string }
          default: ["application/json"]
          description: A2A inputModes for this skill
        output_modes:
          type: array
          items: { type: string }
          default: ["application/json"]
          description: A2A outputModes for this skill
        tags:
          type: array
          items: { type: string }
          description: Skill tags surfaced on the agent card

    MeshToolRegistration:
      type: object
      required: [function_name, capability]
      description: Metadata for a single @mesh.tool decorated function
      properties:
        function_name:
          type: string
          minLength: 1
          example: "greet"
          description: Name of the decorated function
        capability:
          type: string
          minLength: 1
          example: "greeting"
          description: Capability provided by this function
        version:
          type: string
          default: "1.0.0"
          example: "1.0.0"
          description: Function/capability version
        tags:
          type: array
          items:
            type: string
          default: []
          example: ["demo", "v1"]
          description: Tags for this capability
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/MeshToolDependencyRegistration"
          default: []
          description: Dependencies required by this function
        description:
          type: string
          example: "Simple greeting function"
          description: Function description
        inputSchema:
          type: object
          description: |
            JSON Schema for function parameters (MCP tool format).
            Auto-generated from function signature by FastMCP.
            Used by LLM agents to understand how to call this tool.
          example:
            type: "object"
            properties:
              name:
                type: "string"
                description: "Name to greet"
              greeting_type:
                type: "string"
                enum: ["formal", "casual"]
                description: "Type of greeting"
            required: ["name"]
        llm_filter:
          type: object
          additionalProperties: true
          description: |
            Optional LLM tool filter specification when function is decorated with @mesh.llm.
            Defines which tools this LLM agent needs access to.
            Stored as JSON, follows LLMToolFilter schema structure.
        llm_provider:
          $ref: "#/components/schemas/LLMProvider"
          description: |
            Optional LLM provider specification for mesh delegation mode.
            When present, this function uses mesh DI to find and delegate LLM calls
            to a matching provider agent instead of calling LiteLLM directly.
            🤖 AI NOTE: This enables LLM mesh delegation (v0.6.1 feature).
        kwargs:
          type: object
          additionalProperties: true
          description: |
            Additional kwargs from @mesh.tool decorator for enhanced client proxy configuration.
            Supports timeout, retry_count, custom_headers, streaming, auth_required, etc.
          example:
            timeout: 45
            retry_count: 3
            custom_headers:
              X-API-Version: v2
            streaming: true
            auth_required: true
        outputSchema:
          type: object
          additionalProperties: true
          description: |
            Raw JSON Schema for function return value (MCP tool format).
            Auto-generated from return type annotation by FastMCP / Pydantic / Zod / Jackson.
            Used for debugging; the canonical form (outputSchemaCanonical) is what the
            registry indexes for capability matching.
        inputSchemaCanonical:
          type: object
          additionalProperties: true
          description: |
            Canonical normalized JSON Schema for function input AFTER stripping mesh DI parameters.
            Produced by the Rust schema_normalizer. Content-addressed by inputSchemaHash.
            This is the contract used for cross-runtime capability matching.
        inputSchemaHash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
          description: |
            SHA256 hash of inputSchemaCanonical (format "sha256:<hex>"). Used as
            content-addressed key into the schemas table. Two tools with the same
            hash have structurally identical input schemas.
        outputSchemaCanonical:
          type: object
          additionalProperties: true
          description: |
            Canonical normalized JSON Schema for function output. See inputSchemaCanonical.
        outputSchemaHash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
          description: |
            SHA256 hash of outputSchemaCanonical (format "sha256:<hex>").
        schemaWarnings:
          type: array
          items:
            type: string
          description: |
            Normalizer warnings (e.g., "stripped additionalProperties: true").
            Surfaced via meshctl status. Empty list when no warnings.

    MeshToolDependencyRegistration:
      type: object
      required: [capability]
      description: |
        Dependency specification for a tool function.

        Tags support OR alternatives via nested arrays:
        - ["addition", ["python", "typescript"]] means: addition AND (python OR typescript)
        - ["fast"] means: just require "fast" tag
      properties:
        capability:
          type: string
          minLength: 1
          example: "date_service"
          description: Required capability name
        tags:
          type: array
          items:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          default: []
          example: ["addition", ["python", "typescript"]]
          description: |
            Tags for smart matching. Supports OR alternatives via nested arrays.
            Example: ["addition", ["python", "typescript"]] = addition AND (python OR typescript)
        version:
          type: string
          example: ">=1.0.0"
          description: Version constraint
        namespace:
          type: string
          default: "default"
          example: "default"
          description: Namespace filter
        expectedSchemaCanonical:
          type: object
          additionalProperties: true
          description: |
            Optional canonical normalized JSON Schema for the expected response type.
            Produced by the Rust schema_normalizer from the consumer's declared type
            (e.g., from a Pydantic model passed via mesh.Dependency(expected_type=...)).
            When present together with matchMode, the registry filters out producers
            whose outputSchemaCanonical doesn't satisfy the consumer's expectation.
        expectedSchemaHash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
          description: |
            SHA256 hash of expectedSchemaCanonical.
        matchMode:
          type: string
          enum: [subset, strict]
          description: |
            Schema compatibility mode:
              - subset: producer's output must contain all fields the consumer requires (default semantics)
              - strict: full match (list-order-insensitive, with cross-runtime type relaxation)
            Omit this field to skip schema-based filtering entirely (current behavior).
      additionalProperties: false

    LLMProvider:
      type: object
      required: [capability]
      description: |
        LLM provider specification for mesh delegation mode.
        When @mesh.llm uses provider=dict, the registry resolves a matching LLM provider
        agent and returns its endpoint in llm_providers response field.
        🤖 AI NOTE: This enables LLM mesh delegation (v0.6.1 feature).
      properties:
        capability:
          type: string
          minLength: 1
          example: "llm"
          description: Required capability name (typically "llm")
        tags:
          type: array
          items:
            type: string
          default: []
          example: ["claude", "+budget", "-nsfw"]
          description: |
            Tags for smart matching with operators:
            - "tag" = required
            - "+tag" = preferred
            - "-tag" = excluded
        version:
          type: string
          example: ">=1.0.0"
          description: Version constraint (semver format)
        namespace:
          type: string
          default: "default"
          example: "default"
          description: Namespace filter
      additionalProperties: false

    LLMToolFilter:
      type: object
      required: [filter]
      description: |
        Tool filter specification for an @mesh.llm decorated function.
        Embedded within MeshToolRegistration - function_name is implicit from parent tool.
        Registry matches tools based on filter criteria and returns filtered list in llm_tools response.
      properties:
        filter:
          type: array
          items:
            oneOf:
              - type: string
                description: Simple capability name filter
                example: "pdf_extractor"
              - type: object
                description: Rich filter with capability, tags, and version
                required: [capability]
                properties:
                  capability:
                    type: string
                    minLength: 1
                    example: "document"
                    description: Capability name to match
                  tags:
                    type: array
                    items:
                      type: string
                    default: []
                    example: ["pdf", "advanced"]
                    description: Tags for tag-based filtering (subset matching)
                  version:
                    type: string
                    example: ">=1.0.0"
                    description: Version constraint
          minItems: 1
          description: |
            List of capability filters. Can be simple strings (capability names)
            or rich objects with tags and version constraints.
          example:
            - capability: "document"
              tags: ["pdf", "advanced"]
            - "web_search"
            - capability: "command_executor"
              tags: ["local"]
        filter_mode:
          type: string
          enum: [all, best_match, "*"]
          default: "all"
          example: "all"
          description: |
            Filter mode for tool matching:
            - "all": Include all tools matching any filter criteria
            - "best_match": One tool per capability (best tag match)
            - "*": All available tools in mesh (ignores filter)
        inject_param:
          type: string
          default: "llm_tools"
          example: "llm_tools"
          description: Parameter name to inject tools into (for Python runtime)

    LLMToolInfo:
      type: object
      required: [name, capability, description, inputSchema, endpoint]
      description: |
        Complete tool information for LLM consumption.
        Includes everything an LLM needs to understand and call the tool via MCP protocol.
      properties:
        name:
          type: string
          minLength: 1
          example: "extract_pdf"
          description: Function name (MCP protocol level)
        capability:
          type: string
          minLength: 1
          example: "pdf_extractor"
          description: Capability name this tool provides
        description:
          type: string
          example: "Extract text and metadata from PDF files"
          description: Human-readable tool description for LLM context
        inputSchema:
          type: object
          description: |
            JSON Schema for tool parameters (MCP format).
            LLM uses this to understand required and optional parameters.
          example:
            type: "object"
            properties:
              file_path:
                type: "string"
                description: "Path to the PDF file"
              extract_images:
                type: "boolean"
                description: "Whether to extract embedded images"
                default: false
            required: ["file_path"]
        tags:
          type: array
          items:
            type: string
          default: []
          example: ["document", "pdf", "extraction"]
          description: Capability tags
        version:
          type: string
          default: "1.0.0"
          example: "1.0.0"
          description: Tool version
        endpoint:
          type: string
          example: "http://pdf-agent:8080"
          description: Agent endpoint for MCP protocol calls
        kwargs:
          type: object
          additionalProperties: true
          description: |
            Proxy configuration for tool execution (timeout, retry, streaming, etc.).
            Passed to UnifiedMCPProxy for enhanced client behavior.
          example:
            timeout: 60
            retry_count: 3
            streaming: false

    ResolvedLLMProvider:
      type: object
      required: [name, endpoint, agent_id, capability, status, vendor]
      description: |
        Resolved LLM provider information for mesh delegation.
        Contains all necessary data to create a proxy and delegate LLM calls to this provider.
        🤖 AI NOTE: This enables LLM mesh delegation (v0.6.1 feature).
      properties:
        name:
          type: string
          minLength: 1
          example: "process_chat"
          description: Function name of the LLM provider tool
        endpoint:
          type: string
          example: "http://claude-provider:9020"
          description: Provider agent endpoint for MCP protocol calls
        agent_id:
          type: string
          example: "claude-provider-abc123"
          description: ID of the provider agent
        capability:
          type: string
          example: "llm"
          description: Capability name (typically "llm")
        tags:
          type: array
          items:
            type: string
          default: []
          example: ["claude", "sonnet", "production"]
          description: Provider capability tags
        version:
          type: string
          default: "1.0.0"
          example: "1.0.0"
          description: Provider version
        vendor:
          type: string
          minLength: 1
          example: "anthropic"
          description: |
            LLM vendor/provider name extracted from model string.
            Used by consumer to select appropriate ProviderHandler for optimal LLM interaction.
            Automatically extracted using LiteLLM's get_llm_provider() function during provider registration.
            Common values: "anthropic", "openai", "google", "cohere", "ollama", "together", etc.
        status:
          type: string
          enum: [available, unavailable, degraded]
          example: "available"
          description: Current status of the provider
        kwargs:
          type: object
          additionalProperties: true
          description: |
            Optional proxy configuration (timeout, retry, etc.).
            Passed to UnifiedMCPProxy for enhanced client behavior.
          example:
            timeout: 120
            retry_count: 2

    MeshRegistrationResponse:
      type: object
      required: [status, timestamp, message, agent_id]
      description: Response for both registration and heartbeat requests
      properties:
        status:
          type: string
          enum: [success, error]
          example: "success"
        timestamp:
          type: string
          format: date-time
          example: "2024-01-20T10:30:45Z"
        message:
          type: string
          example: "Agent registered successfully"
        agent_id:
          type: string
          example: "hello-world"
          description: Confirmed agent ID
        dependencies_resolved:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              properties:
                agent_id:
                  type: string
                  description: "ID of the agent providing the dependency"
                function_name:
                  type: string
                  description: "Actual function name to call on provider"
                endpoint:
                  type: string
                  description: "Endpoint to connect to the provider"
                capability:
                  type: string
                  description: "Capability name for dependency matching"
                status:
                  type: string
                  enum: [available, unavailable, degraded]
                  description: "Current status of the dependency"
              required: [agent_id, function_name, endpoint, capability, status]
          description: |
            Function name to array of resolved dependencies mapping.
            🤖 AI NOTE: This enables immediate dependency injection setup.
        llm_tools:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/LLMToolInfo"
          description: |
            Map of function_name to filtered tool list for LLM agents.
            Enables LLM agents to receive auto-filtered, up-to-date tool lists based on llm_filter in tool registration.
            🤖 AI NOTE: This is populated only when tool includes llm_filter.
            Registry applies filtering logic and returns matching tools with full schemas.
          example:
            "chat":
              - name: "extract_pdf"
                capability: "pdf_extractor"
                description: "Extract text and metadata from PDF files"
                inputSchema:
                  type: "object"
                  properties:
                    file_path:
                      type: "string"
                      description: "Path to PDF file"
                  required: ["file_path"]
                tags: ["document", "pdf"]
                version: "1.0.0"
                endpoint: "http://pdf-agent:8080"
                kwargs:
                  timeout: 60
              - name: "search_web"
                capability: "web_search"
                description: "Search the web for information"
                inputSchema:
                  type: "object"
                  properties:
                    query:
                      type: "string"
                  required: ["query"]
                tags: ["search", "web"]
                version: "1.0.0"
                endpoint: "http://search-agent:8080"
        llm_providers:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ResolvedLLMProvider"
          description: |
            Map of function_name to resolved LLM provider for mesh delegation.
            Populated only when tool includes llm_provider specification.
            Registry resolves matching LLM provider agent based on capability/tags/version.
            🤖 AI NOTE: This enables LLM mesh delegation (v0.6.1 feature).
          example:
            "chat":
              name: "process_chat"
              endpoint: "http://claude-provider:9020"
              agent_id: "claude-provider-abc123"
              capability: "llm"
              tags: ["claude", "sonnet", "production"]
              version: "1.0.0"
              status: "available"
        surfaces:
          type: array
          items:
            $ref: "#/components/schemas/A2ASurfaceResponse"
          description: |
            Registry-stamped A2A surface metadata. Populated only when the
            request was for an a2a-typed agent and the request body included
            a `surfaces` array. The registry concatenates the configured
            MCP_MESH_PUBLIC_URL_PREFIX with each surface's path to produce
            the publicly addressable URL — so the agent never needs to know
            its own external hostname.
        warnings:
          type: array
          items:
            type: string
          description: |
            Non-fatal advisories from the registry. Populated when the
            registry accepted the request but had to coerce a field — for
            example: "description truncated from 312 to 256 chars". Absent
            (or empty) when there is nothing to surface.
          example:
            - "description truncated from 312 to 256 chars"

    A2ASurfaceResponse:
      type: object
      required: [path, skill_id]
      description: |
        Registry-computed A2A surface response entry. Echoes the surface's
        declared path + skill_id and adds the FQDN-stamped public_url and
        agent_card_url derived from MCP_MESH_PUBLIC_URL_PREFIX.
      properties:
        path:
          type: string
          example: "/agents/report-generator"
          description: Path suffix as declared by the agent
        skill_id:
          type: string
          example: "generate-report"
          description: A2A skill identifier
        public_url:
          type: string
          example: "https://agents.acme.com/agents/report-generator"
          description: |
            Registry-computed public URL: MCP_MESH_PUBLIC_URL_PREFIX + path.
            Empty string when MCP_MESH_PUBLIC_URL_PREFIX is unset (registry
            logs a warn-once telling operators to configure the prefix).
        agent_card_url:
          type: string
          example: "https://agents.acme.com/agents/report-generator/.well-known/agent.json"
          description: |
            Convenience URL pointing at the surface's A2A agent card
            (public_url + "/.well-known/agent.json"). Empty when
            MCP_MESH_PUBLIC_URL_PREFIX is unset.

    A2AAgentsListResponse:
      type: object
      required: [surfaces]
      description: |
        Response shape for GET /a2a/agents. The `surfaces` array is a flat
        list of every A2A surface across all a2a-typed agents — clients use
        public_url + agent_card_url to discover and call into surfaces.
      properties:
        surfaces:
          type: array
          items:
            $ref: "#/components/schemas/A2ASurfaceResponse"
          description: All A2A surfaces with registry-stamped public URLs

    # Core response schemas
    HealthResponse:
      type: object
      required: [status, version, uptime_seconds, timestamp, service]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
          description: Overall registry health status
        version:
          type: string
          example: "1.0.0"
          description: Registry version
        uptime_seconds:
          type: integer
          minimum: 0
          example: 3600
          description: Registry uptime in seconds
        timestamp:
          type: string
          format: date-time
          example: "2024-01-20T10:30:45Z"
          description: Current server timestamp
        service:
          type: string
          example: "mcp-mesh-registry"
          description: Service identifier

    RootResponse:
      type: object
      required: [service, version, status, endpoints]
      properties:
        service:
          type: string
          example: "mcp-mesh-registry"
        version:
          type: string
          example: "1.0.0"
        status:
          type: string
          example: "running"
        endpoints:
          type: array
          items:
            type: string
          example: ["/health", "/heartbeat", "/agents"]
          description: Available API endpoints

    # Agent registration schemas
    AgentRegistration:
      type: object
      required: [agent_id, metadata, timestamp]
      properties:
        agent_id:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
          minLength: 1
          maxLength: 64
          example: "hello-world"
          description: Unique identifier for the agent
        metadata:
          oneOf:
            - $ref: "#/components/schemas/AgentMetadata"
            - $ref: "#/components/schemas/MeshAgentRegisterMetadata"
          description: Agent metadata (legacy format or new mesh format)
        timestamp:
          type: string
          format: date-time
          example: "2024-01-20T10:30:45Z"
          description: Registration timestamp

    AgentMetadata:
      type: object
      required: [name, agent_type, namespace, endpoint]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
          example: "hello-world"
          description: Human-readable agent name
        agent_type:
          type: string
          enum: [mesh_agent, mcp_agent, system_agent]
          example: "mesh_agent"
          description: Type of agent
        namespace:
          type: string
          default: "default"
          example: "default"
          description: Agent namespace for organization
        endpoint:
          type: string
          example: "http://localhost:8001"
          description: Agent endpoint URL (http://, https://, or stdio://)
        capabilities:
          type: array
          items:
            type: string
          minItems: 0
          example: ["greeting", "farewell"]
          description: List of capabilities provided by agent (0 or more)
        dependencies:
          type: array
          items:
            oneOf:
              - type: string
                description: Simple dependency by capability name
                example: "date_service"
              - type: object
                description: Rich dependency with tags and metadata
                required: [capability]
                properties:
                  capability:
                    type: string
                    description: Required capability name
                    example: "info"
                  tags:
                    type: array
                    items:
                      type: string
                    description: Optional tags for smart matching
                    example: ["system", "general"]
                  version:
                    type: string
                    description: Optional version constraint
                    example: ">=1.0.0"
                  namespace:
                    type: string
                    description: Optional namespace filter
                    default: "default"
                    example: "default"
                additionalProperties: false
          minItems: 0
          default: []
          example:
            - "date_service"
            - capability: "info"
              tags: ["system", "general"]
          description: List of agent dependencies (0 or more) - supports both simple strings and rich objects
        health_interval:
          type: integer
          minimum: 1
          maximum: 3600
          default: 30
          example: 30
          description: Health check interval in seconds
        timeout_threshold:
          type: integer
          minimum: 1
          default: 60
          example: 60
          description: Timeout threshold in seconds
        eviction_threshold:
          type: integer
          minimum: 1
          default: 120
          example: 120
          description: Eviction threshold in seconds
        version:
          type: string
          default: "1.0.0"
          example: "1.0.0"
          description: Agent version
        description:
          type: string
          example: "Simple greeting agent"
          description: Agent description
        tags:
          type: array
          items:
            type: string
          default: []
          example: ["production", "stable"]
          description: Agent tags for categorization
        security_context:
          type: string
          example: "default"
          description: Security context for agent

    # Heartbeat schemas
    HeartbeatRequest:
      type: object
      required: [agent_id, status, metadata]
      properties:
        agent_id:
          type: string
          example: "hello-world"
          description: Agent identifier from registration
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
          example: "healthy"
          description: Current agent health status
        metadata:
          type: object
          required: [capabilities, timestamp]
          properties:
            capabilities:
              type: array
              items:
                type: string
              example: ["greeting", "farewell"]
            timestamp:
              type: string
              format: date-time
              example: "2024-01-20T10:30:45Z"
            checks:
              type: object
              additionalProperties: true
              description: Health check results
            errors:
              type: array
              items:
                type: string
              description: Any error messages
            uptime_seconds:
              type: integer
              minimum: 0
              example: 300
            version:
              type: string
              example: "1.0.0"
          additionalProperties: true
          description: Agent metadata and health information

    HeartbeatResponse:
      type: object
      required: [status, timestamp, message]
      properties:
        status:
          type: string
          enum: [success, error]
          example: "success"
        timestamp:
          type: string
          format: date-time
          example: "2024-01-20T10:30:45Z"
        message:
          type: string
          example: "Heartbeat received"
        dependencies_resolved:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              properties:
                agent_id:
                  type: string
                  description: "ID of the agent providing the dependency"
                function_name:
                  type: string
                  description: "Actual function name to call on provider"
                endpoint:
                  type: string
                  description: "Endpoint to connect to the provider"
                capability:
                  type: string
                  description: "Capability name for dependency matching"
                status:
                  type: string
                  enum: [available, unavailable, degraded]
                  description: "Current status of the dependency"
              required: [agent_id, function_name, endpoint, capability, status]
          description: |
            Function name to array of resolved dependencies mapping.
            🤖 AI CRITICAL: Python runtime uses this for dependency injection updates.

    # Agent listing schemas
    AgentsListResponse:
      type: object
      required: [agents, count, timestamp]
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentInfo"
          description: List of registered agents
        count:
          type: integer
          minimum: 0
          example: 2
          description: Total number of agents
        timestamp:
          type: string
          format: date-time
          example: "2024-01-20T10:30:45Z"

    AgentInfo:
      type: object
      required:
        [
          id,
          name,
          agent_type,
          status,
          endpoint,
          capabilities,
          total_dependencies,
          dependencies_resolved,
        ]
      properties:
        id:
          type: string
          example: "hello-world"
        name:
          type: string
          example: "hello-world"
        agent_type:
          type: string
          enum: [mcp_agent, api, a2a]
          example: "mcp_agent"
          description: |
            Type of service:
            - mcp_agent: provides mesh capabilities (default)
            - api: API-style consumer (no capability advertisement)
            - a2a: exposes A2A (Agent-to-Agent) surfaces in addition to standard mesh handling
        runtime:
          type: string
          enum: [python, typescript, java]
          example: "python"
          description: SDK runtime language (python, typescript, or java)
        description:
          type: string
          example: "Greeting service for the mesh demo"
          description: |
            Free-form, plain-text agent description. Set via the SDK
            (`@mesh.agent(description=...)` in Python, `@MeshAgent(description=...)`
            in Java, `mesh({ description: ... })` in TypeScript). Surfaced in
            the UI agent detail header.
        status:
          type: string
          enum: [healthy, degraded, unhealthy, offline]
          example: "healthy"
        endpoint:
          type: string
          example: "http://localhost:8001"
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/CapabilityInfo"
          example:
            - name: "greeting"
              version: "1.0.0"
              function_name: "greet"
              tags: ["demo", "social"]
              description: "Provides greeting functionality"
            - name: "farewell"
              version: "1.0.0"
              function_name: "goodbye"
              tags: ["demo", "social"]
              description: "Provides farewell functionality"
        total_dependencies:
          type: integer
          minimum: 0
          example: 5
          description: "Total number of dependencies required by this agent"
        dependencies_resolved:
          type: integer
          minimum: 0
          example: 3
          description: "Number of dependencies that have been resolved"
        dependency_resolutions:
          type: array
          items:
            $ref: "#/components/schemas/DependencyResolutionInfo"
          description: "List of all dependency resolutions (both resolved and unresolved)"
          example:
            - function_name: "analyze_with_enrichment"
              capability: "date_service"
              tags: ["system", "time"]
              mcp_tool: "get_current_time"
              provider_agent_id: "system-agent-9b5207d9"
              endpoint: "http://172.18.0.5:9091"
              status: "available"
            - function_name: "analyze_with_enrichment"
              capability: "weather_service"
              tags: ["weather"]
              status: "unresolved"
        llm_tool_resolutions:
          type: array
          items:
            $ref: "#/components/schemas/LLMToolResolutionInfo"
          description: "List of all LLM tool resolutions for @mesh.llm filter"
          example:
            - function_name: "smart_analyze"
              filter_capability: "time_service"
              filter_mode: "best_match"
              mcp_tool: "get_current_time"
              provider_capability: "time_service"
              provider_agent_id: "fastmcp-service-e60355f6"
              endpoint: "http://fastmcp-agent:8080"
              status: "available"
        llm_provider_resolutions:
          type: array
          items:
            $ref: "#/components/schemas/LLMProviderResolutionInfo"
          description: "List of all LLM provider resolutions for @mesh.llm provider"
          example:
            - function_name: "smart_analyze"
              required_capability: "llm"
              required_tags: ["llm", "+claude"]
              mcp_tool: "llm"
              provider_agent_id: "claude-provider-abc123"
              endpoint: "http://claude-provider:9020"
              status: "available"
        created_at:
          type: string
          format: date-time
          example: "2024-01-20T10:25:00Z"
          description: When agent was first registered
        last_seen:
          type: string
          format: date-time
          example: "2024-01-20T10:30:45Z"
          description: Last heartbeat timestamp
        version:
          type: string
          example: "1.0.0"
        entity_id:
          type: string
          description: "Entity ID from TLS certificate verification (set when mTLS is enabled)"
          example: "local-dev"

    # Capability information schema
    CapabilityInfo:
      type: object
      required: [name, version, function_name]
      properties:
        name:
          type: string
          minLength: 1
          example: "greeting"
          description: "Capability name"
        version:
          type: string
          default: "1.0.0"
          example: "1.0.0"
          description: "Capability version"
        function_name:
          type: string
          minLength: 1
          example: "greet"
          description: "Name of the function that provides this capability"
        tags:
          type: array
          items:
            type: string
          default: []
          example: ["demo", "social"]
          description: "Tags associated with this capability"
        description:
          type: string
          example: "Provides greeting functionality"
          description: "Human-readable description of the capability"
        llm_filter:
          $ref: "#/components/schemas/LLMToolFilter"
          description: |
            LLM tool filter specification if this capability uses @mesh.llm decorator.
            Contains filter criteria and filter_mode for tool discovery.
        llm_provider:
          $ref: "#/components/schemas/LLMProvider"
          description: |
            LLM provider specification if this capability uses mesh delegation.
            Contains capability, tags, version, namespace for provider matching.

    # Dependency resolution schema
    DependencyResolutionInfo:
      type: object
      required: [function_name, capability, status]
      properties:
        function_name:
          type: string
          minLength: 1
          example: "analyze_with_enrichment"
          description: "Function requiring this dependency"
        capability:
          type: string
          minLength: 1
          example: "date_service"
          description: "Required capability name"
        tags:
          type: array
          items:
            type: string
          default: []
          example: ["system", "time"]
          description: "Required tags for matching"
        mcp_tool:
          type: string
          example: "get_current_time"
          description: "MCP tool name on provider (NULL if unresolved)"
        provider_agent_id:
          type: string
          example: "system-agent-9b5207d9"
          description: "Provider agent ID (NULL if unresolved)"
        endpoint:
          type: string
          example: "http://172.18.0.5:9091"
          description: "Provider endpoint (NULL if unresolved)"
        status:
          type: string
          enum: [available, unavailable, unresolved]
          example: "available"
          description: "Dependency resolution status"

    # LLM Tool resolution schema
    LLMToolResolutionInfo:
      type: object
      required: [function_name, status]
      description: |
        Resolution info for LLM tool filters (@mesh.llm filter).
        Shows which tools were resolved to match the filter specification.
      properties:
        function_name:
          type: string
          minLength: 1
          example: "smart_analyze"
          description: "Function with @mesh.llm decorator"
        filter_capability:
          type: string
          example: "time_service"
          description: "Capability specified in the filter"
        filter_tags:
          type: array
          items:
            type: string
          default: []
          example: ["system"]
          description: "Tags specified in the filter"
        filter_mode:
          type: string
          enum: [all, best_match, "*"]
          default: "all"
          example: "best_match"
          description: "Filter mode used"
        mcp_tool:
          type: string
          example: "get_current_time"
          description: "MCP tool name on provider (NULL if unresolved)"
        provider_capability:
          type: string
          example: "time_service"
          description: "Capability of the resolved tool"
        provider_agent_id:
          type: string
          example: "fastmcp-service-e60355f6"
          description: "Provider agent ID (NULL if unresolved)"
        endpoint:
          type: string
          example: "http://fastmcp-agent:8080"
          description: "Provider endpoint (NULL if unresolved)"
        status:
          type: string
          enum: [available, unavailable, unresolved]
          example: "available"
          description: "Tool resolution status"

    # LLM Provider resolution schema
    LLMProviderResolutionInfo:
      type: object
      required: [function_name, required_capability, status]
      description: |
        Resolution info for LLM provider (@mesh.llm provider).
        Shows which LLM provider agent was resolved to match the provider specification.
      properties:
        function_name:
          type: string
          minLength: 1
          example: "smart_analyze"
          description: "Function with @mesh.llm decorator"
        required_capability:
          type: string
          minLength: 1
          example: "llm"
          description: "Required capability (typically 'llm')"
        required_tags:
          type: array
          items:
            type: string
          default: []
          example: ["llm", "+claude"]
          description: "Required tags for matching"
        mcp_tool:
          type: string
          example: "llm"
          description: "MCP tool name on provider (NULL if unresolved)"
        provider_agent_id:
          type: string
          example: "claude-provider-abc123"
          description: "Provider agent ID (NULL if unresolved)"
        endpoint:
          type: string
          example: "http://claude-provider:9020"
          description: "Provider endpoint (NULL if unresolved)"
        status:
          type: string
          enum: [available, unavailable, unresolved]
          example: "available"
          description: "Provider resolution status"

    # Dependency resolution schemas
    DependencyInfo:
      type: object
      required: [agent_id, endpoint, status]
      properties:
        agent_id:
          type: string
          example: "provider-agent"
          description: ID of the agent providing the dependency
        endpoint:
          type: string
          example: "http://localhost:8002"
          description: Endpoint to connect to the provider
        status:
          type: string
          enum: [available, unavailable, degraded]
          example: "available"
          description: Current status of the dependency
        capabilities:
          type: array
          items:
            type: string
          example: ["greeting"]
          description: Capabilities provided by this dependency
        version:
          type: string
          example: "1.0.0"
          description: Version of the provider agent
        metadata:
          type: object
          additionalProperties: true
          description: Additional metadata about the provider

    # Error schemas
    ErrorResponse:
      type: object
      required: [error, timestamp]
      properties:
        error:
          type: string
          example: "Invalid agent_id format"
          description: Error message
        timestamp:
          type: string
          format: date-time
          example: "2024-01-20T10:30:45Z"
        details:
          type: object
          additionalProperties: true
          description: Additional error details

    # Trace streaming schemas
    TraceEvent:
      type: object
      required: [event_type, trace_id, timestamp, agent_id]
      description: Individual trace event streamed via SSE
      properties:
        event_type:
          type: string
          enum:
            [
              task_started,
              task_progress,
              task_completed,
              task_failed,
              agent_called,
              dependency_resolved,
            ]
          example: "task_started"
          description: Type of trace event
        trace_id:
          type: string
          example: "trace-abc123-def456"
          description: Trace identifier this event belongs to
        timestamp:
          type: string
          format: date-time
          example: "2024-01-20T10:30:45Z"
          description: When this event occurred
        agent_id:
          type: string
          example: "worker-1"
          description: Agent that generated this event
        details:
          type: object
          additionalProperties: true
          description: Event-specific details
          example:
            task: "process_data"
            progress: 25
            result: "success"
        correlation_id:
          type: string
          example: "req-xyz789"
          description: Optional correlation ID for request tracking
        parent_span_id:
          type: string
          example: "span-parent-123"
          description: Parent span for distributed tracing hierarchy

    # New decorator-based schema for unified request/response
    DecoratorAgentRequest:
      type: object
      required: [agent_id, timestamp, metadata]
      description: |
        Unified request schema for both /agents/register and /heartbeat endpoints.
        Supports decorator-based agent registration with per-function dependencies.
      properties:
        agent_id:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
          minLength: 1
          maxLength: 64
          example: "agent-hello-world-123"
          description: Unique identifier for the agent
        timestamp:
          type: string
          format: date-time
          example: "2024-01-20T10:30:45Z"
          description: Request timestamp
        metadata:
          $ref: "#/components/schemas/DecoratorAgentMetadata"

    DecoratorAgentMetadata:
      type: object
      required: [name, agent_type, namespace, endpoint, decorators]
      description: Agent metadata containing all decorator information
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
          example: "hello-world"
          description: Human-readable agent name
        agent_type:
          type: string
          enum: [mcp_agent]
          example: "mcp_agent"
          description: Type of agent (standardized to mcp_agent)
        namespace:
          type: string
          default: "default"
          example: "default"
          description: Agent namespace for organization
        endpoint:
          type: string
          example: "stdio://agent-hello-world-123"
          description: Agent endpoint URL (http://, https://, or stdio://)
        version:
          type: string
          default: "1.0.0"
          example: "1.0.0"
          description: Agent version
        decorators:
          type: array
          items:
            $ref: "#/components/schemas/DecoratorInfo"
          minItems: 1
          description: Array of all @mesh_agent decorators from the agent script

    DecoratorInfo:
      type: object
      required: [function_name, capability, dependencies]
      description: Information about a single @mesh_agent decorated function
      properties:
        function_name:
          type: string
          minLength: 1
          example: "hello_mesh_simple"
          description: Name of the decorated function
        capability:
          type: string
          minLength: 1
          example: "greeting"
          description: Capability provided by this function
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/StandardizedDependency"
          default: []
          description: Dependencies required by this function
        description:
          type: string
          example: "Simple greeting with date dependency"
          description: Function description
        version:
          type: string
          example: "1.0.0"
          description: Function/capability version
        tags:
          type: array
          items:
            type: string
          default: []
          example: ["greeting", "simple"]
          description: Tags for this capability

    StandardizedDependency:
      type: object
      required: [capability]
      description: Standardized dependency format (always object, never string)
      properties:
        capability:
          type: string
          minLength: 1
          example: "date_service"
          description: Required capability name
        tags:
          type: array
          items:
            type: string
          default: []
          example: ["system", "general"]
          description: Tags for smart matching
        version:
          type: string
          example: ">=1.0.0"
          description: Version constraint
        namespace:
          type: string
          default: "default"
          example: "default"
          description: Namespace filter
      additionalProperties: false

    RichDependency:
      type: object
      required: [capability, tags, version, namespace]
      description: Rich dependency format with full metadata for internal processing
      properties:
        capability:
          type: string
          minLength: 1
          example: "date_service"
          description: Required capability name
        tags:
          type: array
          items:
            type: string
          default: []
          example: ["system", "general"]
          description: Tags for smart matching
        version:
          type: string
          default: "1.0.0"
          example: "1.0.0"
          description: Version constraint
        namespace:
          type: string
          default: "default"
          example: "default"
          description: Namespace filter
      additionalProperties: false

    MeshAgentRegisterMetadata:
      type: object
      required: [agent_type, name, tools]
      description: Agent registration metadata for @mesh.tool based agents
      properties:
        agent_type:
          type: string
          enum: [mcp_agent]
          example: "mcp_agent"
          description: Type of agent (always mcp_agent for mesh tools)
        name:
          type: string
          minLength: 1
          maxLength: 64
          example: "greeting-agent"
          description: Agent name
        version:
          type: string
          default: "1.0.0"
          example: "2.0.0"
          description: Agent version
        namespace:
          type: string
          default: "default"
          example: "default"
          description: Agent namespace
        endpoint:
          type: string
          example: "stdio://agent-greeting-123"
          description: Agent endpoint URL
        tools:
          type: array
          items:
            $ref: "#/components/schemas/MeshToolRegisterMetadata"
          minItems: 1
          description: Array of tools provided by this agent

    MeshToolRegisterMetadata:
      type: object
      required: [function_name, capability]
      description: Metadata for a single @mesh.tool decorated function
      properties:
        function_name:
          type: string
          minLength: 1
          example: "greet"
          description: Name of the decorated function
        capability:
          type: string
          minLength: 1
          example: "greeting"
          description: Capability provided by this function
        version:
          type: string
          default: "1.0.0"
          example: "1.0.0"
          description: Function/capability version
        tags:
          type: array
          items:
            type: string
          default: []
          example: ["demo", "v1"]
          description: Tags for this capability
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/StandardizedDependency"
          default: []
          description: Dependencies required by this function
        description:
          type: string
          example: "Simple greeting function"
          description: Function description
        kwargs:
          type: object
          additionalProperties: true
          description: |
            Additional kwargs from @mesh.tool decorator for enhanced client proxy configuration.
            Supports timeout, retry_count, custom_headers, streaming, auth_required, etc.
          example:
            timeout: 45
            retry_count: 3
            custom_headers:
              X-API-Version: v2
            streaming: true
            auth_required: true

    # Dashboard event history schemas
    RegistryEventInfo:
      type: object
      required: [event_type, agent_id, timestamp]
      description: |
        A single registry event. Lifecycle events (register, unregister, etc.)
        are created automatically by status hooks when agent state changes.
        Dependency-resolution events (dependency_resolved, dependency_unresolved)
        are emitted by the resolver and used by `meshctl audit`.
      properties:
        event_type:
          type: string
          enum:
            [
              register,
              heartbeat,
              expire,
              update,
              unregister,
              unhealthy,
              rotate,
              dependency_resolved,
              dependency_unresolved,
            ]
          example: "register"
          description: Type of registry event
        agent_id:
          type: string
          example: "hello-world-abc123"
          description: ID of the agent this event relates to
        agent_name:
          type: string
          example: "hello-world"
          description: Human-readable agent name (if available)
        function_name:
          type: string
          example: "greet"
          description: Function name (for function-level events, null for agent-level)
        timestamp:
          type: string
          format: date-time
          example: "2024-01-20T10:30:45Z"
          description: When the event occurred
        data:
          type: object
          additionalProperties: true
          description: Additional event metadata (reason, old/new status, etc.)
          example:
            reason: "status_change"
            old_status: "healthy"
            new_status: "unhealthy"

    EventsHistoryResponse:
      type: object
      required: [events, count]
      description: Response containing recent registry events
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/RegistryEventInfo"
          description: List of events, most recent first
        count:
          type: integer
          minimum: 0
          example: 25
          description: Number of events returned

    # Schema registry (issue #547) — content-addressed canonical schemas.
    SchemaEntryInfo:
      type: object
      required: [hash, canonical, runtime_origin, created_at]
      description: |
        A single canonical normalized JSON Schema entry persisted in the
        registry's `schema_entries` table. Schemas are content-addressed by
        sha256 hash; identical canonical content always shares one row.
      properties:
        hash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
          description: Content hash (sha256:<hex>)
        canonical:
          type: object
          additionalProperties: true
          description: Canonical normalized JSON Schema
        runtime_origin:
          type: string
          enum: [python, typescript, java, unknown]
          description: |
            Runtime that first produced this canonical form. Informational only —
            content-addressed dedup means subsequent runtimes share the row.
        created_at:
          type: string
          format: date-time
          description: When this canonical schema was first registered

    SchemaEntriesResponse:
      type: object
      required: [schemas, count]
      description: Response containing canonical schema entries
      properties:
        schemas:
          type: array
          items:
            $ref: "#/components/schemas/SchemaEntryInfo"
          description: Schema entries, most recent first
        count:
          type: integer
          minimum: 0
          description: Number of schemas in this response (≤ limit)

    # ------------------------------------------------------------------
    # Jobs (MeshJob — see MESHJOB_DESIGN.org)
    # ------------------------------------------------------------------
    JobStatus:
      type: string
      enum: [working, input_required, completed, failed, cancelled]
      description: |
        Job lifecycle state. Terminal states are `completed`, `failed`, and
        `cancelled`. `input_required` is a non-terminal pause state.

    Job:
      type: object
      required:
        [
          id,
          capability,
          status,
          submitted_payload,
          attempt_count,
          max_retries,
          submitted_at,
          submitted_by,
        ]
      description: Full job record as persisted in the registry's `jobs` table.
      properties:
        id:
          type: string
          example: "8f2b4e6a-1c3d-4e5f-9a0b-1c2d3e4f5a6b"
          description: Server-assigned job identifier (UUID).
        capability:
          type: string
          minLength: 1
          example: "plan_trip"
          description: Capability the job will execute against.
        owner_instance_id:
          type: string
          nullable: true
          example: "claude-provider-replica-2"
          description: Instance currently leasing this job (null if unclaimed/orphaned).
        status:
          $ref: "#/components/schemas/JobStatus"
        progress:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 1
          example: 0.4
          description: Fractional progress, 0.0–1.0.
        progress_message:
          type: string
          nullable: true
          example: "searching flights"
          description: Free-form human-readable progress note.
        result:
          type: object
          additionalProperties: true
          nullable: true
          description: Terminal payload on `completed`. Free-form JSON object (MCP tool result).
        error:
          type: string
          nullable: true
          example: "deadline_exceeded"
          description: Failure reason on `failed`.
        submitted_payload:
          type: object
          additionalProperties: true
          description: Full args + headers captured at submit-time for replay.
        attempt_count:
          type: integer
          minimum: 0
          example: 0
          description: Number of times this job has been claimed/attempted.
        max_retries:
          type: integer
          minimum: 0
          default: 1
          example: 1
          description: |
            Number of retries on top of the initial attempt
            (Sidekiq/Celery/Resque convention). Default 1 ⇒ at most 2
            total claims (1 initial + 1 retry on crash/timeout). A job
            is claimable while `attempt_count <= max_retries`; the
            orphan-reroute sweep marks it failed once
            `attempt_count > max_retries`.
        max_duration:
          type: integer
          nullable: true
          minimum: 1
          example: 300
          description: Per-attempt soft timeout in seconds (registry stores as-is; agent applies default).
        total_deadline:
          type: integer
          nullable: true
          example: 1730000000
          description: Absolute Unix epoch deadline across all retries (opt-in).
        lease_expires_at:
          type: integer
          nullable: true
          example: 1729999700
          description: Unix epoch when the current owner's lease expires.
        last_heartbeat_at:
          type: integer
          nullable: true
          example: 1729999400
          description: Unix epoch of the last batch update from the owner.
        submitted_at:
          type: integer
          example: 1729999000
          description: Unix epoch when the job was created.
        submitted_by:
          type: string
          example: "orchestrate-replica-1"
          description: Instance ID of the submitting agent.

    CreateJobRequest:
      type: object
      required: [capability, submitted_payload, submitted_by]
      description: Producer-side request to register a new job.
      properties:
        capability:
          type: string
          minLength: 1
          example: "plan_trip"
          description: Capability the job will execute against.
        submitted_payload:
          type: object
          additionalProperties: true
          description: Full args + headers to persist for retry/replay.
        max_retries:
          type: integer
          minimum: 0
          default: 1
          example: 1
          description: |
            Number of retries on top of the initial attempt
            (Sidekiq/Celery/Resque convention). Default 1 ⇒ at most 2
            total claims (1 initial + 1 retry on crash/timeout). Set to
            0 to disable retry entirely (initial attempt only).
        max_duration:
          type: integer
          nullable: true
          minimum: 1
          example: 300
          description: Per-attempt soft timeout in seconds (no registry-side default — agent applies 300s soft default).
        total_deadline:
          type: integer
          nullable: true
          example: 1730000000
          description: Opt-in absolute Unix epoch deadline across all retries.
        submitted_by:
          type: string
          minLength: 1
          example: "orchestrate-replica-1"
          description: Instance ID of the submitting agent.
        owner_instance_id:
          type: string
          nullable: true
          description: |
            Optional. If set, registry pins the job to this specific replica from
            creation (push mode — submitter pre-resolved the target). If omitted,
            owner_instance_id starts NULL and a replica must claim via /jobs/claim
            (pull mode — used for orphan reroute and load-balanced submission).
          example: "claude-provider-replica-2"

    CreateJobResponse:
      type: object
      required: [id, status]
      description: Response after a successful job registration.
      properties:
        id:
          type: string
          example: "8f2b4e6a-1c3d-4e5f-9a0b-1c2d3e4f5a6b"
          description: Server-assigned job identifier (UUID).
        status:
          $ref: "#/components/schemas/JobStatus"
        owner_instance_id:
          type: string
          nullable: true
          example: "claude-provider-replica-2"
          description: |
            Instance reserved as owner for the first attempt. NULL when the
            request omitted `owner_instance_id` (pull mode — a replica must
            claim via /jobs/claim before execution).

    JobDelta:
      type: object
      required: [id]
      description: |
        A single delta to apply to one job. Only fields present are updated.
        `result` is meaningful only when `status=completed`; `error` only when
        `status=failed`.
      properties:
        id:
          type: string
          example: "8f2b4e6a-1c3d-4e5f-9a0b-1c2d3e4f5a6b"
          description: Job identifier this delta targets.
        status:
          allOf:
            - $ref: "#/components/schemas/JobStatus"
          nullable: true
          description: New status, if transitioning.
        progress:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 1
          example: 0.6
          description: Updated fractional progress.
        progress_message:
          type: string
          nullable: true
          example: "booking flights"
          description: Updated human-readable progress note.
        result:
          type: object
          additionalProperties: true
          nullable: true
          description: Terminal result payload (only on `status=completed`).
        error:
          type: string
          nullable: true
          example: "upstream_unavailable"
          description: Failure reason (only on `status=failed`).

    JobBatchRequest:
      type: object
      required: [instance_id, deltas]
      description: Coalesced job updates from a single producer instance.
      properties:
        instance_id:
          type: string
          minLength: 1
          example: "claude-provider-replica-2"
          description: Owning instance submitting these deltas.
        deltas:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/JobDelta"
          description: Per-job deltas to apply.

    JobBatchResponse:
      type: object
      required: [accepted, rejected]
      description: Per-batch outcome.
      properties:
        accepted:
          type: integer
          minimum: 0
          example: 3
          description: Number of deltas successfully applied.
        rejected:
          type: array
          items:
            type: object
            required: [id, reason]
            properties:
              id:
                type: string
                description: Job identifier of the rejected delta.
              reason:
                type: string
                description: Reason the delta was rejected (e.g. `not_owner`, `terminal`, `not_found`).
          description: Per-job rejection records.

    ClaimJobsRequest:
      type: object
      required: [capability, instance_id]
      description: Atomic single-claim request for unclaimed jobs in a capability.
      properties:
        capability:
          type: string
          minLength: 1
          example: "plan_trip"
          description: Capability to claim work for.
        instance_id:
          type: string
          minLength: 1
          example: "claude-provider-replica-3"
          description: Replica attempting to claim.

    ClaimedJob:
      type: object
      required: [id, submitted_payload, attempt_count]
      description: A single job successfully claimed in this round-trip.
      properties:
        id:
          type: string
          description: Job identifier the caller now owns.
        submitted_payload:
          type: object
          additionalProperties: true
          description: Full args + headers captured at submit-time for replay.
        attempt_count:
          type: integer
          minimum: 1
          description: Updated attempt count after this claim.
        lease_expires_at:
          type: integer
          nullable: true
          description: Unix epoch when the new lease expires.
        max_duration:
          type: integer
          nullable: true
          minimum: 1
          description: Per-attempt soft timeout in seconds (as recorded on the job).

    ClaimJobsResponse:
      type: object
      required: [claimed]
      description: Outcome of the claim attempt — empty array means no work was available.
      properties:
        claimed:
          type: array
          items:
            $ref: "#/components/schemas/ClaimedJob"
          description: Jobs newly claimed by the calling instance (length 0 or 1 in Phase 1).

    CancelJobRequest:
      type: object
      description: Optional cancellation reason. Body may be empty or absent.
      properties:
        reason:
          type: string
          example: "user_requested"
          description: Free-form reason persisted alongside the cancellation.

    ReleaseJobRequest:
      type: object
      required: [instance_id]
      description: |
        Producer-side voluntary lease release. Caller's `instance_id` must
        match the current `owner_instance_id` of the job — release is
        owner-only (403 otherwise).
      properties:
        instance_id:
          type: string
          example: "claude-provider-replica-2"
          description: Caller's instance ID; must match current owner_instance_id.
        reason:
          type: string
          example: "OSError: connection refused"
          description: |
            Human-readable reason (e.g., the exception type + message that
            triggered the release). Recorded in the `error` field only if
            the release tips the row over `max_retries` and marks it failed.

    ReleaseJobResponse:
      type: object
      required: [status, attempt_count]
      description: |
        Result of a voluntary release. `status=working` is the typical
        outcome — the job was released and is ready to be re-claimed by a
        peer replica. `status=failed` only fires in the boundary case
        where the row's `attempt_count` was already greater than
        `max_retries` when release was called (i.e. the final allowed
        claim's handler raised), so no further retries are possible and
        the registry marks the job exhausted.
      properties:
        status:
          $ref: "#/components/schemas/JobStatus"
        attempt_count:
          type: integer
          minimum: 0
          example: 2
          description: |
            Current attempt count. Note: release does NOT increment this
            field — only the claim path does. The value returned here is
            the same value that was set by the claim that produced the
            now-released owner.

    CancelJobResponse:
      type: object
      required: [status]
      description: Result of a cancellation request.
      properties:
        status:
          $ref: "#/components/schemas/JobStatus"
        forwarded_to_instance_id:
          type: string
          nullable: true
          example: "claude-provider-replica-2"
          description: Owner instance the cancel was forwarded to (null if owner was already dead/orphaned).
