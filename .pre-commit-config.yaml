repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: |
          (?x)^(
            helm/.*/templates/.*\.yaml|
            k8s/base/registry/(rbac|pvc)\.yaml|
            k8s/base/agents/mcpagent-sample\.yaml|
            mkdocs\.yml
          )$
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
      - id: detect-private-key
        exclude: '^src/runtime/core/src/tls\.rs$'
      - id: mixed-line-ending

  # Python formatters (black, isort, ruff, mypy, bandit) removed from
  # pre-commit to avoid commit loops from conflicting auto-fixes.
  # TODO: Re-enable CI lint jobs (currently disabled with if: false) or
  # add a single ruff hook once black/isort/ruff config is consolidated.

  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        # Override the entry so pre-commit's docker_image language gets BOTH
        # the image name AND the command — issue #1017. The repo manifest
        # ships ``entry: ghcr.io/hadolint/hadolint hadolint`` (image + cmd);
        # the previous local override was ``entry: hadolint`` only, which
        # made pre-commit treat ``hadolint`` as the IMAGE NAME (Docker Hub
        # default tag), with NO command appended. Because the upstream image's
        # ENTRYPOINT is empty, ``docker run`` then tried to exec each
        # Dockerfile path as a binary → "permission denied" on every file.
        # Restore the upstream image+cmd shape. NB: there is no
        # ``v2.13.1-beta`` image on ghcr.io (the git tag exists, the image
        # build doesn't — same empty-entrypoint bug in v2.12.0 anyway), so
        # pin the image to ``v2.12.0`` while leaving the repo rev at the
        # ``v2.13.1-beta`` git tag pre-commit needs to clone the manifest.
        entry: ghcr.io/hadolint/hadolint:v2.12.0 hadolint
        language: docker_image
        # Match real Dockerfiles including extension variants like
        # `Dockerfile.dev`, `Dockerfile.base`, `Dockerfile.debian`.
        # Exclude `.tmpl` files, which are scaffold templates containing
        # Go template syntax (`{{ .Port }}`) and aren't valid Dockerfiles
        # on their own — hadolint would try to exec them and fail.
        files: Dockerfile
        exclude: \.tmpl$

  # 🤖 CONTRACT-FIRST DEVELOPMENT HOOKS
  # These hooks enforce OpenAPI-first development

  # 1. Validate OpenAPI specification
  - repo: local
    hooks:
      - id: validate-openapi-spec
        name: Validate OpenAPI Specification
        entry: python3 tools/validation/validate_schema.py api/mcp-mesh-registry.openapi.yaml
        language: system
        files: ^api/.*\.yaml$
        description: "🤖 Validates OpenAPI specification syntax and schema"

  # 2. Detect unauthorized endpoints in registry core
  - repo: local
    hooks:
      - id: detect-unauthorized-endpoints
        name: Detect Unauthorized Endpoints
        entry: bash
        args:
          - -c
          - >-
            python3 tools/detection/detect_endpoints.py
            api/mcp-mesh-registry.openapi.yaml
            api/mcp-mesh-agent.openapi.yaml
            src/core/registry
        language: system
        files: ^(src/core/registry/.*\.(go|py)|api/.*\.yaml)$
        description: "🤖 Ensures all endpoints exist in OpenAPI specification"

  # 3. Validate generated code is up to date
  - repo: local
    hooks:
      - id: check-generated-code
        name: Check Generated Code Up to Date
        entry: bash
        args:
          - -c
          - >-
            echo "Checking if generated code is up to date...";
            if ! make generate;
            then echo "make generate failed — install oapi-codegen and retry";
            exit 1;
            fi;
            if ! git diff --exit-code -- src/core/registry/generated/ > /dev/null 2>&1;
            then echo "Generated code is out of date or hand-edited!";
            echo "Run: make generate";
            exit 1;
            fi;
            echo "Generated code is up to date"
        language: system
        files: '^(api/.*\.(yaml|yml)|src/core/registry/generated/.*)$'
        description: "🤖 Ensures generated code matches OpenAPI specification"

  # 4. Contract validation for Go code
  - repo: local
    hooks:
      - id: validate-go-contract
        name: Validate Go Contract Compliance
        entry: bash
        args:
          - -c
          - >-
            echo "Validating Go code contract compliance...";
            if ! go build -o /tmp/registry ./src/core/registry > /dev/null 2>&1;
            then echo "Go code does not compile with generated handlers!";
            echo "Fix compilation errors in business logic";
            exit 1;
            fi; echo "Go contract validation passed"
        language: system
        files: ^src/core/registry/.*\.go$
        exclude: ^src/core/registry/generated/.*$
        description: "🤖 Validates Go code compiles with generated handlers"
